un styrkt á CRF. Þetta er hlutfallslegar styrkingaráhrif (partial reinforcement effect / PRE). Skýring: á CRF er auðvelt að greina á milli styrkingar og slokknunar; á hlutfallslegum háttum líkist slokknun hlutfallslegri styrkingu.", "src": "K"}, {"q": "Hvað er scallop-mynstur (scallop pattern) og við hvaða styrkingarhætti kemur það fram?", "opts": ["Lítil hegðun rétt eftir styrk, smám saman aukist hegðun yfir tímabilið, hraðast rétt fyrir næsta styrk — kemur fram á föstum tímaháttum (FI)", "Þétt og stöðug hegðun á öllu tímabilinu — kemur fram á VR", "Hegðun sem fer í bylgjum yfir tímabilið — kemur fram á VI", "Þétt hegðun rétt eftir styrk og minnkar svo — kemur fram á FR"], "ans": 0, "exp": "Scallop-mynstur kemur fram á föstum tímaháttum (FI): lítil eða engin hegðun rétt eftir styrk (post-reinforcement pause), síðan eykst hegðun smám saman yfir tímabilið, og hraðar mest rétt áður en tímabilið lýkur. Þetta mynstur endurspeglar tímatengda hegðun þar sem lífvera 'veit' hvenær styrk er fáanlegur.", "src": "K"}, {"q": "Hvað er breytilegt gildishlutfall (variable ratio / VR) og hvers vegna þróar það hæstu tíðni?", "opts": ["VR þróar hæstu tíðni vegna þess að hlutfallið er alltaf lágt", "VR þróar hæstu tíðni vegna þess að hvert viðbragð getur verið það sem skilar styrk — ekki er hægt að vita hvenær, svo best er að svara sem mest", "VR þróar hæstu tíðni vegna þess að styrkir kemur alltaf á ákveðnum tíma", "VR þróar lægstu tíðni vegna þess að lífvera veit aldrei hvenær styrk kemur"], "ans": 1, "exp": "VR þróar hæstu tíðni vegna þess að styrk gæti komið við hvert einasta viðbragð. Þar sem lífvera getur aldrei útilokað næsta viðbragð sem styrkt verður, er best að svara eins oft og mögulegt er. Þetta útskýrir hvers vegna spilakassar, félagsleg miðill og aðrar VR-legar aðstæður eru svo gríðarlega hvetjandi.", "src": "K"}, {"q": "Hvað er stöðugur grunnstig (steady-state performance) á styrkingarháttum og hvers vegna rannsaka hegðunarfræðingar hann frekar en umskiptatil (transition state)?", "opts": ["Stöðugur grunnstig er þegar hegðun er á hæsta mögulega gildi", "Umskiptatil er alltaf rannsakat vegna þess að það endurspeglar raunverulegar aðstæður betur", "Stöðugur grunnstig: stöðugt mynstur eftir langa útsetningu við óbreytt skilyrði — auðveldara að greina áhrif breytna þar sem hegðun er fyrirsjáanleg og endurtekinn", "Stöðugur grunnstig þróast aðeins á föstum háttum (FR og FI) en ekki á breytilegum"], "ans": 2, "exp": "Stöðugur grunnstig (steady-state performance) þróast eftir langa útsetningu við óbreytt skilyrði. Hegðunarfræðingar rannsaka hann frekar en umskiptatil vegna þess að hann er stöðugt, endurtekinn og fyrirsjáanlegt — auðveldara að greina áhrif breytna á stöðugum grunni. Umskiptatil er of kvikur til samanburðar.", "src": "K"}, {"q": "Hvernig er líklegt að aðlögunin á milli þjálfunartímabila (transitions) tengist mikilvægum mannlegum breytingum í lífi?", "opts": ["Aðlögunin á milli þjálfunartímabila á eingöngu við um dýratilraunir", "Mannleg hegðun er alltaf fljót að laga sig að nýjum skilyrðum án streitu", "Umskiptatil eru ómerkilegur hluti af styrkingarsniðum og hafa engin hagnýt gildi", "Umskipti á milli styrkingarskilyrða (t.d. frá CRF yfir í FR 100) geta valdið hlutfallsþreytu — líkjast lífsumskiptum (t.d. frá skóla yfir í vinnu) þar sem kröfur aukast skyndilega"], "ans": 3, "exp": "Umskipti á milli styrkingarskilyrða líkjast mikilvægum mannlegum lífsbreytingum: frá CRF í þétt hlutfallshætti (eins og frá 'þúinnan fær alltaf styrk' í skóla yfir í 'þú þarft að vinna hart fyrir viðurkenningu' í vinnu) geta valdið hlutfallsþreytu. Eins geta lífsbil eins og eftirlaunaaldur (frá virkni yfir í 'engar kröfur') valdið vandræðum.", "src": "K"}, {"q": "Hvað eru helstu munir á FI og VI styrkingarháttum að því er varðar mynstur hegðunar og viðnám gegn slokknun?", "opts": ["FI: scallop-mynstur með PRP, lítið viðnám gegn slokknun; VI: jöfn og stöðug hegðun án PRP, meira viðnám gegn slokknun", "FI og VI þróa sömu mynstur vegna þess að bæðar eru tímaháttir", "FI: jöfn hegðun; VI: scallop-mynstur", "FI þróar meira viðnám gegn slokknun en VI vegna lengri tímatengingu"], "ans": 0, "exp": "FI þróar scallop-mynstur með post-reinforcement pause (PRP) og sýnir lítið viðnám gegn slokknun vegna þess að FI er fremur líkt CRF — styrkur kemur alltaf á ákveðnum tíma. VI þróar jafna og stöðuga hegðun án PRP og sýnir meira viðnám vegna þess að slokknun líkist VI-skilyrðum þar sem styrkur kemur á breytilegu tímabili.", "src": "K"}, {"q": "Hvað er klíptiðlæknisfræðilegt styrkingarsnið (fixed interval scallop) og hvenær kemur það einnig fram hjá mönnum?", "opts": ["FI scallop kemur aðeins fram hjá dýrum, aldrei hjá mönnum", "FI scallop: hækkandi mynstur hegðunar sem nálgast tímamark; kemur fram hjá mönnum við hvers kyns tímabundnar skuldbindingar — t.d. lokaprófunartexti", "FI scallop þróast eingöngu þegar lífvera fær mat sem styrk", "FI scallop er sama mynstur og þróast á VR styrkingarháttum"], "ans": 1, "exp": "FI scallop þróast við föstan tímahátt: hegðun er lítil rétt eftir styrk og eykst smám saman þegar nálgast tímamark. Hjá mönnum kemur þetta fram við hvers kyns tímabundnar skuldbindingar — lokaprófunarnám (minni lestur í byrjun missers, meira við lok), skýrslur sem skila á ákveðnum degi, og þvottaðgerðir sem safnast upp.", "src": "AI"}, {"q": "Hvað er þversögnin í hegðunarþreytu (behavioral fatigue) á háum FR-gildum og hvernig er hún frábrugðin hlutfallsþreytu?", "opts": ["Hegðunarþreyta og hlutfallsþreyting eru það sama — bæðar þýða að hegðun minnkar við há FR gildi", "Hegðunarþreyta kemur aðeins fram á VI háttum; hlutfallsþreyting á FR", "Hegðunarþreyta: líkamleg þreyta af of mikilli hegðun; hlutfallsþreyting: þegar hlutfallsháttur er aukinn of hratt og mynstur hegðunar brotnar — tengist ekki líkamlegri þreytu", "Hlutfallsþreyting kemur fram þegar lífvera er of fljótt þjálfuð"], "ans": 2, "exp": "Hegðunarþreyta (behavioral fatigue) er líkamleg þreyta af of mikilli hegðun á stuttum tíma — minnkar við hvíld. Hlutfallsþreyting (ratio strain) er þegar hlutfallsháttur er aukinn of hratt og mynstur hegðunar brotnar (óregluleg hegðun, löngu hlé) — tengist ekki líkamlegri þreytu heldur missamræmi á milli krafna og sögu styrkingar.", "src": "AI"}, {"q": "Hvað er takmarkað hlé (limited hold) og hvernig breytir það hegðun á VI hætti?", "opts": ["Takmarkað hlé þýðir að lífvera má eingöngu svara í stuttan tíma á hverju þjálfunartímabili", "Takmarkað hlé er form hlutfallsþreytu þar sem of mikið er krafist", "Takmarkað hlé á eingöngu við um FI styrkingarhátta", "Lífvera þarf að svara innan tiltekins tíma eftir að styrkur er fáanlegur; þetta eykur tíðni hegðunar á VI hætti þar sem styrkur tapast ef lífvera svarar ekki hratt"], "ans": 3, "exp": "Takmarkað hlé (limited hold): ef lífvera svarar ekki innan tiltekins tíma eftir að styrkur er fáanlegur, tapast styrkurinn. Þetta eykur tíðni hegðunar á VI hætti vegna þess að lífvera þarf að vera viðbragðsfær stöðugt — hún getur ekki beðið endalaust. Limited hold á VI breytir honum í átt að VI-líklegri hegðun.", "src": "K"}]}, {"id": "areitastyring", "title": "Áreitastýring og aðgreining", "subtitle": "Ch8", "questions": [{"q": "Hvað er áreitastýring (stimulus control) og hvernig þróast hún?", "opts": ["Þegar tíðni, styrkur eða form hegðunar breytist kerfisbundið með tilteknum áreiti vegna sögu greinistyrkingar", "Þegar áreiti framkallar hegðun beint án sögu styrkingar", "Þegar lífvera er þvinguð til að framkvæma hegðun í návist tiltekinna áreita", "Þegar hegðun er stjórnað af meðfæddri viðbragðstilhneigingu"], "ans": 0, "exp": "Áreitastýring (stimulus control) þróast þegar tíðni, styrkur eða form hegðunar breytist kerfisbundið í návist eða fjarveru tiltekinna áreita — vegna sögu greinistyrkingar í tengslum við þau áreiti. SD þróar sterkara áreitastýringu þegar hegðun hefur verið styrkt oft í návist hennar.", "src": "K"}, {"q": "Hvað er greiningarstuðull (discrimination index) og hvernig er hann reiknaður?", "opts": ["Fjöldi skipta sem lífvera bregst rétt við SD deilt með heildartilraunum", "Hlutfallsleg mæling á aðgreiningu: hegðun í návist SD deilt með heildarhegðun; gildi nærri 1.0 gefur til kynna góða aðgreiningu", "Munurinn á tíðni við SD og S-delta, mælt í hegðunum á mínútu", "Hlutfallsleg tíðni hegðunar við S-delta deilt með tíðni við SD"], "ans": 1, "exp": "Greiningarstuðull (discrimination index / DI) = tíðni hegðunar í návist SD / (tíðni í návist SD + tíðni í návist S∆). Gildi nærri 1.0 gefur til kynna góða aðgreiningu — lífvera bregst næstum eingöngu við SD. Gildi nærri 0.5 gefur til kynna litla aðgreiningu — lífvera bregst jafnt við SD og S∆.", "src": "K"}, {"q": "Hvað er hegðunarlegt samspil (behavioral contrast) og hvernig kemur það fram á margföldum styrkingarhátti (multiple schedule)?", "opts": ["Þegar tíðni hegðunar minnkar í báðum hlutum margfalds styrkingarsniðs samtímis", "Þegar lífvera lærir ekki að greina á milli hluta margfalds styrkingarsniðs", "Þegar tíðni hegðunar í einum hluta margfalds styrkingarsniðs eykst þegar styrkir í öðrum hluta minnkar — jákvætt samspil", "Þegar hegðun í báðum hlutum verður eins óháð breytingum á styrkingarhlutfalli"], "ans": 2, "exp": "Hegðunarlegt samspil (behavioral contrast) kemur fram á margföldum styrkingarhátti: þegar styrkur í einum hluta er minnkaður eða tekinn burtu (slokknun), eykst tíðni hegðunar í öðrum hlutanum — jákvætt samspil (positive contrast). Þetta er þar sem hlutfallsleg styrkingartíðni í hinum hlutanum hefur breyst.", "src": "K"}, {"q": "Hvað eru alhæfingargradienter (generalization gradients) og hvað sýndu Guttman og Kalish (1956)?", "opts": ["Myndrit þar sem hegðun eykst stöðugt við öll áreiti sem eru lík SD", "Gradientar sem sýna að alhæfing er alltaf jöfn í allar stefnur", "Mynstur þar sem hegðun er jafnt dreifð yfir öll áreiti í umhverfinu", "Mynstur þar sem CR/hegðun er sterkust við upprunalegt CS/SD og minnkar smám saman við áreiti sem víkja frá því; Guttman og Kalish sýndu þetta með litum hjá dúfum"], "ans": 3, "exp": "Alhæfingargradienter sýna að hegðun er sterkust við upprunalegt CS/SD og minnkar smám saman eftir því sem áreiti víkja frá því á areitissvið (stimulus dimension). Guttman og Kalish (1956) sýndu þetta með dúfur sem voru þjálfaðar á tilteknum lit — þær bregðast einnig við öðrum litum en minnkar eftir fjarlægð frá upprunalega litnum.", "src": "K"}, {"q": "Hvað er hámarksstigsbreyting (peak shift) og hvernig skýrist hún?", "opts": ["Eftir aðgreiningar-þjálfun, þegar hápunktur alhæfingargradientsins færist frá upprunalega SD í átt frá S-delta — vegna hlutfægs áreitastýringar", "Þegar hápunktur hegðunar færist í átt að S-delta eftir langa þjálfun", "Þegar lífvera hættir að bregðast við upprunalega SD og svarar aðeins S-delta", "Þegar alhæfingargradienti flatar út eftir langa aðgreiningar-þjálfun"], "ans": 0, "exp": "Hámarksstigsbreyting (peak shift) á sér stað eftir aðgreiningar-þjálfun: hápunktur alhæfingargradientsins færist frá upprunalega SD í gagnstæða átt frá S∆. Þetta skýrist af hlutfægri áreitastýringu (relative stimulus control) — lífvera bregst við hlutfallslegum eiginleikum á milli SD og S∆, ekki eingöngu við algildum eiginleikum SD.", "src": "K"}, {"q": "Hvað er villulaus aðgreining (errorless discrimination) og hvers vegna er hún betri en hefðbundin aðgreining?", "opts": ["Aðferð þar sem lífvera lærir aðgreiningu án nokkurra mistaka sem gæti valdið skaða", "Aðferð þar sem S∆ er kynnt smám saman þegar SD-hegðun er þegar sterk — lífvera bregst nánast aldrei við S∆; forðast tilfinningaleg aukaáhrif hefðbundinnar aðgreiningar", "Aðferð þar sem við styrkjum S∆-viðbrögð til að gera aðgreininguna skýrari", "Aðferð þar sem aðgreiningur verður til án þjálfunar"], "ans": 1, "exp": "Villulaus aðgreining (errorless discrimination) er aðferð þar sem S∆ er kynnt smám saman á meðan SD-hegðun er þegar sterk — þannig bregst lífvera nánast aldrei við S∆ (engar 'villur'). Kosti: enginn tilfinningalegur örvi tengdur S∆ (pirringur, streita) og aðgreiningur er nákvæmari. Terrace (1963) sýndi þetta með dúfur.", "src": "K"}, {"q": "Hvað er dofnun (fading) og hvernig er hún notuð í fræðslu?", "opts": ["Niðurfærsla á styrk styrkis til að gera hegðun sjálfstæðari", "Hækkun á kröfur í mótun þar sem við flytjum okkur smám saman að markmiðshegðun", "Smám saman breyting á eiginleikum SD til að flytja áreitastýringu yfir á nýtt áreiti — notuð til að kenna lestur, myndir og hlutlæga hugmyndir", "Smám saman fjarlæging á líkamlegri hjálp (physical prompt) þegar hegðun þróast"], "ans": 2, "exp": "Dofnun (fading) er smám saman breyting á eiginleikum SD til að flytja áreitastýringu yfir á nýtt áreiti. Til dæmis: við höfum áberandi SD, þjálfum hegðun, og drögum svo smám saman úr áberandi (e.g. minnkum stærð, minnkum birtustigið) þar til lítill eða óáberandi SD stýrir hegðuninni. Notuð í fræðslu og ABA til að kenna fjölmargar kunnáttur.", "src": "K"}, {"q": "Hvað er kynlæg aðgreining (identity discrimination) og skilyrðis-aðgreining (conditional discrimination)?", "opts": ["Kynlæg: lífvera aðgreinir á milli tveggja ólíkra áreita; skilyrðis: sama áreiti hefur alltaf sömu virkni", "Kynlæg: lífvera bregst aðeins við einu ákveðnu áreiti; skilyrðis: lífvera bregst við mörgum áreitum", "Kynlæg og skilyrðis-aðgreining eru það sama — munurinn er eingöngu í orðalagi", "Kynlæg: lífvera samsvarar áreiti við sjálft sig; skilyrðis: rétt val á milli áreitanna fer eftir þriðja samhengislegu áreiti"], "ans": 3, "exp": "Kynlæg aðgreining (identity discrimination): lífvera samsvarar líkan — velur áreitið sem er eins og dæmisýni. Skilyrðis-aðgreining (conditional discrimination): rétt val á milli áreitanna fer eftir samhengislegu áreiti (context stimulus) — þ.e. sama áreiti getur leitt til mismunandi rétt svars eftir samhengi. Þetta er undirstaða flókinnar mannlegrar hegðunar.", "src": "K"}, {"q": "Hvað er áreitissamgildi (stimulus equivalence) og hvaða þrjú lykilsambönd þarf að sýna?", "opts": ["Þegar lífvera bregst við mismunandi áreitum sem þóttast sama flokkur; þrjú sambönd: endurspeglun (reflexivity), samhverfa (symmetry) og þvergengi (transitivity)", "Þegar tveir ólíkir áreiti framleiða sömu hegðun vegna þjálfunar", "Þegar áreiti eru meðvitað túlkuð sem jafngildir af lífverunni", "Þegar áreitastýring flyst sjálfkrafa yfir á öll áreiti í sama flokki"], "ans": 0, "exp": "Áreitissamgildi (stimulus equivalence): lífvera bregst við mismunandi áreitum sem eins og þóttast sama flokk, án beinna þjálfunar á öllum samböndunuð. Þrjú lykilsambönd: 1) endurspeglun (reflexivity) — A=A, 2) samhverfa (symmetry) — ef A=B þá B=A, og 3) þvergengi (transitivity) — ef A=B og B=C þá A=C.", "src": "K"}, {"q": "Hvað er samsvaranlega-við-dæmisýni (matching to sample / MTS) og hvernig er þetta notað til að rannsaka minni?", "opts": ["Lífvera velur hlut sem er gagnstæður dæmisýni — mælir aðgreiningar-getu", "Lífvera velur hlut sem samsvarar dæmisýni á milli annarra valmöguleika; seinuð MTS (DMTS) metur hvernig bilið á milli dæmisýnis og vals hefur áhrif á nákvæmni", "Lífvera sýnir dæmisýnið sjálf og er styrkt — mælir spontan skilyrðingu", "MTS mælir aðeins sjónrænar hæfni, ekki minni eða hugsun"], "ans": 1, "exp": "Í matching to sample (MTS) er lífvera sýnd dæmisýni og velur svo á milli þriggja eða fleiri hluta þann sem samsvarar. Seinuð MTS (DMTS) — þar sem bil er sett milli dæmisýnis og vals — mælir hvernig lengd bils hefur áhrif á nákvæmni. Þetta er hegðunarlegt mat á minni án þess að gera ráð fyrir innri geymslum.", "src": "K"}, {"q": "Hvað er marglæg styrkingarsnið (multiple schedule) og hvernig getur skiptingin á rauð/græn þættirnir þykkja niðurstöður?", "opts": ["Tvær eða fleiri aðskildar styrkingarskilyrðar eru í boði samtímis — lífvera velur á milli þeirra", "Margfalt snið þar sem sömu skilyrðar eru endurteknar mörg sinnum til að auka trúverðugleika", "Tvær eða fleiri aðskildar styrkingarskilyrðar í röð, hverri af sinni áreitismerki; skiptingin ein sér getur skapað samspilsáhrif og sýnt falskar breytingar á tíðni", "Margfalt snið þar sem tíðni í hverjum hluta er meðalað til heildar"], "ans": 2, "exp": "Margfalt styrkingarsnið (multiple schedule): tvær eða fleiri aðskildar styrkingarskilyrðar koma í röð, hverri tengd sér áreitismerki (t.d. rauð og græn lykill). Vandinn: skiptingin sjálf getur skapað samspilsáhrif (behavioral contrast) þar sem breyting á einum hluta hefur áhrif á annan hluta — þetta getur gefið ranga mynd af áhrifum breytna.", "src": "K"}, {"q": "Hvað er fjarlæg vs. náin áreitastýring (distal vs. proximal stimulus control)?", "opts": ["Náin stýring er alltaf sterkari en fjarlæg stýring", "Fjarlæg stýring er aðeins möguleg hjá mönnum vegna tungumáls", "Náin og fjarlæg stýring hafa sömu áhrif á hegðun", "Náin stýring: áreiti er í beinum tengslum við hegðun; fjarlæg stýring: áreiti er lengra frá hegðun í tíma eða rúmi — bæðar geta haft áhrif"], "ans": 3, "exp": "Náin áreitastýring (proximal): áreiti er í beinum, tafarlausum tengslum við hegðun. Fjarlæg áreitastýring (distal): áreiti er í fjarlægari tengslum — lengra í tíma eða rúmi frá hegðun. Bæðar geta haft áhrif á hegðun, en náin stýring er venjulega sterkari. Mannleg hegðun getur verið stjórnað af mjög fjarlægum (e.g. framtíðarmarkmið).", "src": "K"}, {"q": "Hvað er nákvæm áreitastýring (precision stimulus control) og hvernig er hún frábrugðin alhæfðri áreitastýringu?", "opts": ["Nákvæm stýring: hegðun er mjög sértæk gagnvart afmarkaðar eiginleikum áreita; alhæfð stýring: hegðun kemur fram við fjölbreytt áreiti — báðar hafa aðlögunargildi", "Nákvæm stýring er alltaf betri en alhæfð stýring", "Alhæfð stýring þróast eingöngu þegar nákvæm stýring misfarst", "Nákvæm og alhæfð stýring eru það sama — munurinn er eingöngu í mælingum"], "ans": 0, "exp": "Nákvæm áreitastýring (precision stimulus control): hegðun er mjög sértæk gagnvart afmarkaðra eiginleika SD og kemur ekki fram við aðeins lítið öðruvísi áreiti. Alhæfð stýring: hegðun kemur fram við fjölbreytt áreiti sem likjast upprunalega SD. Báðar hafa aðlögunargildi eftir aðstæðum — stundum er nákvæmni mikilvæg (lyf og skammt), stundum alhæfing (þekka hættu í mismunandi myndum).", "src": "K"}, {"q": "Hvað er samhliða aðgreining (simultaneous discrimination) og hvernig er hún frábrugðin þreifandi aðgreiningu (successive discrimination)?", "opts": ["Samhliða: SD og S∆ eru sett fram í röð; þreifandi: báðar eru til staðar samtímis", "Samhliða: báðar SD og S∆ eru til staðar samtímis og lífvera velur; þreifandi: SD og S∆ eru sett fram í röð og lífvera bregst eða bregst ekki við", "Samhliða aðgreining er alltaf auðveldari en þreifandi", "Þreifandi aðgreining krefst meira þjálfunar og leiðir aldrei til jafn nákvæmrar aðgreiningar"], "ans": 1, "exp": "Samhliða aðgreining (simultaneous discrimination): SD og S∆ eru báðar til staðar samtímis og lífvera velur á milli þeirra. Þreifandi aðgreining (successive discrimination): SD og S∆ eru sett fram í röð á aðskildum tímabilum og lífvera bregst við eða bregst ekki við. Samhliða aðgreining er venjulega auðveldari vegna beins samanburðar.", "src": "K"}, {"q": "Hvað eru aukaáhrif villulausrar aðgreiningar (errorless discrimination) og hvað sýndu Terrace (1963)?", "opts": ["Villulaus aðgreining sýnir meiri pirring en hefðbundin aðgreining", "Villulaus aðgreining er alltaf hægar að kenna en hefðbundin aðgreining", "Lítið eða ekkert tilfinningaleg viðbrögð við S∆ og enginn hámarksstigsbreyting — Terrace sýndi þetta með dúfur þar sem hefðbundin aðgreining sýndi pirring við S∆", "Terrace sýndi að villulaus aðgreining leiðir alltaf til hámarksstigsbreytingu"], "ans": 2, "exp": "Terrace (1963) sýndi að dúfur þjálfaðar með villulausri aðgreiningu (fading) sýndu lítið eða ekkert tilfinningaleg viðbrögð (pirring) þegar S∆ var birt — ólíkt dúfum þjálfaðum með hefðbundinni aðgreiningu (þar sem S∆ var birt á fullu magni strax). Einnig kom ekki fram hámarksstigsbreyting (peak shift) hjá villulaust þjálfaðum dúfum.", "src": "K"}, {"q": "Hvað er hlutlæg og afstæð áreitastýring (absolute vs. relative stimulus control) og hvernig er hámarksstigsbreyting dæmi um afstæða stýringu?", "opts": ["Hlutlæg stýring er alltaf sterkari en afstæð", "Afstæð stýring þróast eingöngu hjá mönnum", "Hámarksstigsbreyting er dæmi um hlutlæga stýringu", "Hlutlæg: hegðun ræðst af nákvæmum eiginleikum SD; afstæð: hegðun ræðst af hlutfallslegum eiginleikum á milli SD og S∆ — hámarksstigsbreyting er afstæð vegna þess að hápunktur flytur í átt frá S∆"], "ans": 3, "exp": "Hlutlæg áreitastýring (absolute): hegðun ræðst af nákvæmum, algildum eiginleikum SD (t.d. nákvæmur litur). Afstæð stýring (relative): hegðun ræðst af hlutfallslegum eiginleikum á milli SD og S∆ — ekki af algildum gildum. Hámarksstigsbreyting er dæmi: hápunktur alhæfingargradientsins flytur í gagnstæða átt frá S∆ — þetta sýnir að lífvera lærir hlutfallslegt samband.", "src": "K"}, {"q": "Hvað sýndu Herrnstein og Loveland (1964) um hugtakaformun (concept formation) hjá dúfum?", "opts": ["Dúfur gátu lært að bera kennsl á menn í ljósmyndum — jafnvel í nýjum myndum sem þær höfðu aldrei séð — sem sýnir að dýr geta myndað hugmyndalega flokka", "Dúfur gátu eingöngu lært að bera kennsl á einstaklinga en ekki flokka", "Dúfur gátu ekki lært hugtakaformun — þetta er eingöngu mannlegt", "Dúfur lærðu hugtakaformun aðeins þegar myndir voru alltaf þær sömu"], "ans": 0, "exp": "Herrnstein og Loveland (1964) þjálfuðu dúfur til að bera kennsl á menn í ljósmyndum með greinistyrk. Dúfurnar bregðast rétt við nýjum myndum sem þær höfðu aldrei séð áður — jafnvel við myndir af mönnum í ólíkum aðstæðum, klæðnaði og hlutföllum. Þetta sýnir að dýr geta myndað hugmyndalega flokka (concepts) sem fara langt út fyrir bein kennslu.", "src": "K"}, {"q": "Hvað er gagnkvæm (reciprocal) áreitastýring í hegðunargreiningu málnotkunar?", "opts": ["Þegar tveir einstaklingar skipta á styrkingarhlutverkum", "Þegar tveir áreiti sem hafa verið pörað saman geta báðir stjórnað hegðun — t.d. ef A→B er lært getur B→A komið fram sjálfkrafa (symmetry)", "Þegar sömu áreiti stjórnar gagnstæðar hegðanir hjá sömu lífveru", "Þegar áreitistýring flyst sjálfkrafa á öll áreiti í sama flokki"], "ans": 1, "exp": "Gagnkvæm áreitastýring tengist samgildi (stimulus equivalence): þegar A→B tengsl eru lærð getur B→A tengsl komið fram sjálfkrafa (symmetry/samhverfa). Þetta er grundvöllur skilnings og merkingarfræðinnar í hegðunargreiningarlegu samhengi — þar sem orð og hlutur geta hvort tveggja stjórnað hegðun án beinar þjálfunar á báðar stefnur.", "src": "AI"}, {"q": "Hvað eru klínískar hagnýtar hliðar villulausrar aðgreiningar (errorless discrimination) í fræðslu?", "opts": ["Villulaus aðgreining er aðeins hagnýt hjá dýrum í rannsóknarstofunni", "Villulaus aðgreining er hraðari en hefðbundin aðgreining en minnkar nákvæmni", "Minnkar þjáningarlegar tilfinningar tengdar mistökum, eykur nákvæmni og sjálfstraust, og er sérstaklega gagnlegt hjá börnum með þroskafrávik", "Klínískar hagnytjar villulausrar aðgreiningar eru óþekktar vegna skorts á rannsóknum"], "ans": 2, "exp": "Klínískar hagnýtar hliðar villulausrar aðgreiningar (errorless discrimination): 1) minnkar tilfinningarleg aukaáhrif tengd mistökum — minna pirring og stres, 2) eykur nákvæmni og sjálfstraust við læringu, 3) sérstaklega gagnlegt hjá börnum með þroskafrávik (t.d. einræðni á einhverfurófi) þar sem hefðbundin aðgreining getur valdið miklum tilfinningalegum vandræðum.", "src": "K"}, {"q": "Hvað er annars stigs skilyrt styrking (secondary/conditioned reinforcement) og hvernig víkkar hún út áreitistýringu?", "opts": ["Annars stigs styrking er sterkari en upprunalegi styrkir", "Annars stigs styrking þarf alltaf að vera birt samtímis upprunalega styrk til að hafa áhrif", "Annars stigs styrking hefur aðeins áhrif á hlutfallslegar styrkingarhátti", "Hlutlægar áreiti sem hafa verið pöruð við upprunalega styrki öðlast styrkingarmátt sjálfar; þær víkka áreitastýringu vegna þess að hægt er að nota þær til að styrkja hegðun í fjarlægar aðstæðum"], "ans": 3, "exp": "Skilyrt styrking (conditioned reinforcement): hlutlægar áreiti sem hafa verið pöruð við upprunalega styrki öðlast sjálfstæðan styrkingarmátt. Þetta víkkar út áreitastýringu verulega: við getum styrkt hegðun með áreitum sem eru fjarlægar í tíma og rúmi frá upprunalega styrk, gert flókin keðjuverkefni mögulega og kenna í samhengi þar sem upprunalegar styrkar eru ekki til staðar.", "src": "K"}]}, {"id": "skadleg", "title": "Skaðleg stjórnun", "subtitle": "Ch6", "questions": [{"q": "Hvað er jákvæð refsing (positive punishment) og hvernig er hún frábrugðin neikvæðri refsingu?", "opts": ["Jákvæð: fráreiti bætist við eftir hegðun og hún minnkar; neikvæð: styrkir hverfur eftir hegðun og hún minnkar", "Jákvæð: styrkir bætist við og hegðun minnkar; neikvæð: fráreiti bætist við og hegðun minnkar", "Jákvæð og neikvæð refsing eru það sama — munurinn er eingöngu í styrkleika refsingarinnar", "Jákvæð: refsing hefur jákvæð langtímaáhrif; neikvæð: refsing hefur neikvæð langtímaáhrif"], "ans": 0, "exp": "Jákvæð refsing (positive punishment): fráreiti bætist við umhverfið eftir hegðun og tíðni hennar minnkar. Neikvæð refsing (negative punishment): styrkir er tekinn burtu eftir hegðun og tíðni hennar minnkar. 'Jákvæð' og 'neikvæð' vísa til þess hvort eitthvað er bætt við (jákvæð) eða tekið burtu (neikvæð) — ekki hvort áhrifin eru gæðaleg eða slæm.", "src": "K"}, {"q": "Hvað eru helstu aukaáhrif refsingarinnar (side effects of punishment)?", "opts": ["Refsing eykur alltaf hegðunina í stað þess að minnka hana", "Tilfinningaleg viðbrögð (pirringur, hræðsla), flótti og forðun frá refsingaraðila, og þversögnin að refsing gæti aukið árásargirni", "Refsing leiðir alltaf til varanlegrar hegðunarbreytingar án aukaáhrifa", "Aukaáhrif refsingarinnar eru eingöngu tilfinningaleg og hafa engin hegðunarlega áhrif"], "ans": 1, "exp": "Helstu aukaáhrif refsingarinnar: 1) tilfinningaleg viðbrögð — hræðsla, pirringur og streita í tengslum við refsingaraðila, 2) flótti og forðun — lífvera forðast aðstæður þar sem refsing er gefin (t.d. skólasniðganga), 3) áhrif refsingarinnar eru oft tímabundin — hegðun kemur aftur þegar refsingaraðili er ekki til staðar.", "src": "K"}, {"q": "Hvað er tímabundin einangrun (timeout from reinforcement) og hvernig er hún form neikvæðrar refsingarinnar?", "opts": ["Lífvera er einangruð frá öðrum einstaklingum til að refsað sé henni líkamlega", "Lífvera er sett í aðstæður þar sem fráreiti er gefin til að tengja hann við hegðun", "Lífvera er fjarlægð frá styrkingaumhverfi í stuttan tíma eftir hegðun — hún missir tækifæri til styrkis og hegðun minnkar", "Lífvera er gefin til leyfi frá skóla sem refsing — þetta eykur hegðunina"], "ans": 2, "exp": "Tímabundin einangrun (timeout from reinforcement) er neikvæð refsing: lífvera er fjarlægð frá styrkingaumhverfi (eða styrkingarmöguleikar eru fjarlægðir) í stuttan tíma eftir hegðun. Þar sem styrkir er tekinn burtu (neikvæð) og hegðun minnkar, er þetta neikvæð refsing. Mikilvægt að umhverfið utan timeout sé styrkjandi.", "src": "K"}, {"q": "Hvað er kostnaðarviðbragð (response cost) og hvernig er það form neikvæðrar refsingarinnar?", "opts": ["Lífvera þarf að framkvæma ósækilega hegðun sem 'greiðslu' fyrir ósækilega hegðun", "Fráreiti er gefin sem fylgir beint ósækilegri hegðun", "Styrkir er tekinn burtu og lífvera fær meiri styrki seinna til bóta", "Styrkir (t.d. stig, pengar) er tekinn burtu eftir óæskilegri hegðun — þetta minnkar hegðunina"], "ans": 3, "exp": "Kostnaðarviðbragð (response cost): ákveðinn styrkir (t.d. stig í stigakerfi, fé) er tekinn burtu eftir ósækilegri hegðun. Þar sem styrkir er tekinn burtu (neikvæð) og hegðun minnkar, er þetta neikvæð refsing. Þetta er algengt í stigakerfum og tókna-hagfræðikerfum.", "src": "K"}, {"q": "Hvað er flótti (escape) og forðun (avoidance) og hvernig tengjast þau neikvæðri styrkingu?", "opts": ["Flótti: hegðun sem leiðir til þess að yfirstandandi fráreiti hætti — styrkt af neikvæðri styrkingu; forðun: hegðun sem kemur í veg fyrir að fráreiti komi fram", "Flótti: hegðun sem forðast fráreiti sem er kominn; forðun: hegðun sem leiðir til þess að yfirstandandi fráreiti hætti", "Flótti og forðun eru það sama — bæðar þýða að lífvera fjarlægir sig frá fráreiti", "Flótti er styrkt af jákvæðri styrkingu; forðun er styrkt af neikvæðri styrkingu"], "ans": 0, "exp": "Flótti (escape): hegðun sem leiðir til þess að yfirstandandi fráreiti hætti. Hún er styrkt af neikvæðri styrkingu — fjarlæging fráreita eykur hegðunina. Forðun (avoidance): hegðun sem kemur í veg fyrir að fráreiti komi fram yfirleitt. Bæðar eru styrkt af neikvæðri styrkingu en forðun er erfiðara að kenna.", "src": "K"}, {"q": "Hvað er Sidman-forðun (Sidman avoidance) og hvað ákvarðar hversu fljótt hún lærist?", "opts": ["Forðun þar sem SD spáir alltaf fyrir um fráreiti — lífvera bregst við SD til að forðast fráreiti", "Forðun án SD — lífvera þarf að gefa frá sér hegðun á intervalltímabili til að komast hjá fráreiti; S-S og R-S millibil ákvarða nám", "Forðun þar sem lífvera getur aldrei komist algerlega hjá fráreiti", "Forðun þar sem fráreiti er gefin þar til lífvera framkvæmir marklegðun"], "ans": 1, "exp": "Sidman-forðun (non-discriminative avoidance): engin SD spáir fyrir um fráreiti — lífvera þarf að gefa frá sér forðunarhegðun reglulega til að forðast fráreiti. S-S millibil (tíminn á milli fráreita án hegðunar) og R-S millibil (tíminn sem hegðun veitir hlé á fráreiti) ákvarða hversu fljótt og vel forðun lærist.", "src": "K"}, {"q": "Hvað er lærð hjálparvana (learned helplessness) og hvernig hefur hún verið tengd þunglyndi?", "opts": ["Þegar lífvera gefst upp við erfiðar verkefni vegna þreytu — ekki vegna sögu um óstjórnanlegan fráreita", "Þegar lífvera lærir aldrei flóttahegðun vegna þess að fráreiti er of veikur", "Þegar lífvera er útskýrð óstjórnanlegu fráreiti án tækifæris til flótta lærir hún að hegðun hennar hefur engin áhrif — þetta þýðir síðar yfir á stjórnanlegar aðstæður; Seligman tengdi þetta við þunglyndi", "Þegar lífvera er ofþjálfuð og byrjar að framkvæma marklegðun í röngu samhengi"], "ans": 2, "exp": "Lærð hjálparvana (learned helplessness): þegar lífvera er útskýrð óstjórnanlegu fráreiti (þar sem hegðun hennar hefur engin áhrif á hvort fráreiti kemur), lærir hún að hegðun og afleiðingar eru ótengar. Þessi lærdómur alhæfist síðan yfir á aðstæður þar sem hegðun gæti í raun haft áhrif. Seligman og félagar tengdu þetta við þunglyndi hjá mönnum.", "src": "K"}, {"q": "Hvað er sársaukaframkölluð árásargirni (pain-elicited aggression) og hvað eru hagnýtar afleiðingar þessa?", "opts": ["Þegar lífvera verður árásarsöm vegna þess að hún er svölt", "Þegar árásargirni er styrkt af neikvæðri styrkingu í félagslegu samhengi", "Þegar lífvera leggst á árásarsöm hegðun til að forðast fráreiti í framtíðinni", "Þegar fráreiti (t.d. rafskot) framkallar sjálfkrafa árásarsemi á næsta lifandi vera — þetta er skyldræn hegðun; hagnýtar afleiðingar: sársauki og refsing geta aukið árásargirni frekar en dregið úr henni"], "ans": 3, "exp": "Sársaukaframkölluð árásargirni: þegar fráreiti eins og rafskot framkallar sjálfkrafa árásarsemi gagnvart næsta lifandi vera — þetta er skyldrænt viðbragð. Hagnýt afleiðing: refsing og sársaukavaldandi aðstæður geta aukið árásargirni frekar en dregið úr henni — þetta er eitt af aukaáhrifum aversive control.", "src": "K"}, {"q": "Hvað er þvingunarfrelsi (coercion) samkvæmt Sidman (2001) og hvernig tengist það skólaúrfalli?", "opts": ["Notkun fráreita til að stjórna hegðun annarra; nemendur hoppa út úr skóla til að forðast óþægilegar skólaupplifanir — forðunarhegðun styrkt af neikvæðri styrkingu", "Notkun styrkja til að hafa svo mikil áhrif yfir öðrum að þeir geta ekki valið annað", "Þegar lífvera er þvinguð til að framkvæma hegðun sem hún myndi ekki annars gera", "Þegar nemendur forðast skóla vegna þess að þeir eru ekki nægilega hvataðir"], "ans": 0, "exp": "Þvingunarfrelsi (coercion) samkvæmt Sidman vísar til notkunar fráreita til að stjórna hegðun annarra. Í skólasamhengi: margir nemendur upplifa skólann sem aversive umhverfi (leiðindi, niðurlæging, mistök). Skólaúrfallið er forðunarhegðun — nemendur hoppa út til að forðast þessar óþægilegar upplifanir — styrkt af neikvæðri styrkingu.", "src": "K"}, {"q": "Hvað er mótmæli-stjórnun (countercontrol) og hvernig viðheldst árásarsöm hegðun í árásarsömum þáttaskipti?", "opts": ["Mótmæli-stjórnun: hegðun sem stjórnandinn notar til að viðhalda völdum", "Mótmæli-stjórnun: hegðun þolanda sem hefur áhrif á árásarmanninn — árásarsöm hegðun í þáttaskiptum viðheldst þegar undirgjöf minnkar árásarsemi (neikvæð styrking árásarmanns)", "Mótmæli-stjórnun: lífvera forðast alla félagslega samskipti til að forðast árás", "Árásarsöm hegðun viðheldst vegna þess að hún er alltaf jákvætt styrkt"], "ans": 1, "exp": "Mótmæli-stjórnun (countercontrol) er hegðun þolanda sem hefur áhrif á árásarmanninn — t.d. yfirgefa aðstæður, berjast við eða breyta hegðun. Í árásarsömum þáttaskiptum (aggressive episodes): árásarsöm hegðun viðheldst þegar undirgjöf þolanda (t.d. gefa eftir, afturkalla óskir) minnkar árásarsemi árásarmannsins — neikvæð styrking á árásarsemi.", "src": "K"}, {"q": "Hvað sýndi Azrin (1956) um samtímisviðbragð (reflexive behavior) og áhrif þess á virka hegðun við refsingu?", "opts": ["Azrin sýndi að refsing hefur aldrei nein áhrif á virka hegðun", "Samtímisviðbragð í tengslum við refsingu eykur alltaf virka hegðun", "Þegar fráreiti er gefin getur skyldrænt viðbragð (t.d. hopp, hreyfing) komið fram og truflað virkni hegðun — þetta getur blandað saman áhrifum refsingarinnar", "Reflexar í tengslum við refsingu eru alltaf gagnlegir og auðvelda nám"], "ans": 2, "exp": "Azrin (1956) sýndi að þegar fráreiti (rafskot) er gefinn getur skyldrænt viðbragð komið fram og truflað virka hegðun. Til dæmis getur hopp eða hreyfing í kjölfar rafskots blandast saman við refsinguna sjálfa, sem gerir erfitt að greina á milli áhrifa refsingarinnar og skyldræns viðbragðsins.", "src": "K"}, {"q": "Hvað er helsta niðurstaða Azrin, Holtz og Hake (1963) um matarskortur og áhrif refsingarinnar?", "opts": ["Matarskortur jók áhrif refsingarinnar — hungur gerði hegðun ónæmari fyrir refsingu", "Matarskortur hafði engin áhrif á áhrif refsingarinnar", "Matarskortur útrýmdi heildarlega áhrifum refsingarinnar", "Matarskortur minnkaði áhrif refsingarinnar — við lægra matargildi þarfnaðist meiri refsing til að fá sömu minnkun á hegðun"], "ans": 3, "exp": "Azrin, Holtz og Hake (1963) sýndu að matarskortur hefur mikilvæg áhrif á virkni refsingarinnar: við lægra matargildi (meiri matarskortur) varð refsingin minna áhrifarík — þurfti meiri refsingu til að ná sömu minnkun á hegðun. Þetta sýnir að hvatningarlegt ástand hefur áhrif á bæði styrki og refsingarvirkni.", "src": "K"}, {"q": "Hvað er varanleg refsing (permanence of punishment) og hvernig tengist hún umræðunni um notkun refsingarinnar?", "opts": ["Varanleg refsing vísar til þeirrar spurningar hvort hegðun sem er refsuð komi aftur þegar refsing hætti — rannsóknir sýna að hegðun getur komið aftur", "Varanleg refsing þýðir að refsing verður stöðugt sterkari með tímanum", "Varanleg refsing þýðir að hegðun hverfur alveg og kemur aldrei aftur", "Varanleg refsing er eingöngu möguleg þegar refsing er mjög sterk"], "ans": 0, "exp": "Varanleg refsing vísar til þeirrar spurningar hvort refsing leiðir til varanlegrar breytingar á hegðun eða einungis tímabundinni bælingu. Rannsóknir benda til þess að hegðun getur komið aftur þegar refsing hættir eða er ekki til staðar — þetta er eitt af meginrökum gegn notkun refsingarinnar í meðferð.", "src": "K"}, {"q": "Hvað eru svæðislegar og óskilyrðar forðunir (discriminated vs. non-discriminated avoidance)?", "opts": ["Svæðisleg forðun krefst meira þjálfunar en óskilyrð forðun", "Svæðisleg forðun: SD spáir fyrir um fráreiti og lífvera forðast í návist SD; óskilyrð: engin SD — lífvera þarf stöðugt að svara til að forðast fráreiti", "Óskilyrð forðun er alltaf auðveldari að kenna", "Svæðisleg og óskilyrð forðun leiða alltaf til sömu hegðunarmynsturs"], "ans": 1, "exp": "Svæðisleg forðun (discriminated avoidance): SD (t.d. tónn) spáir fyrir um fráreiti og lífvera lærir að framkvæma forðunarhegðun þegar SD kemur fram. Óskilyrð forðun (non-discriminated/Sidman avoidance): engin SD — lífvera þarf stöðugt að svara á tilteknum tímabili til að forðast fráreiti. Svæðisleg forðun lærist venjulega hraðar.", "src": "K"}, {"q": "Hvað er félagsleg truflun (social disruption) sem aukaáhrif refsingarinnar og hvers vegna kemur hún fram?", "opts": ["Félagsleg truflun kemur eingöngu fram þegar refsing er gefin á rangt tíma", "Félagsleg truflun er alltaf varanleg og er aldrei hægt að snúa við", "Refsing veldur því að þolandi forðast refsingaraðila og minnkar nándar- og gæðatengsl — hún kemur fram vegna þess að refsingaraðili verður S∆ (forðunar-SD)", "Félagsleg truflun kemur eingöngu fram við líkamlega refsingu, ekki aðrar gerðir"], "ans": 2, "exp": "Félagsleg truflun (social disruption) sem aukaáhrif refsingarinnar: þolandi forðast refsingaraðila og aðstæður tengdar refsingunni. Þetta kemur fram vegna þess að refsingaraðili verður skilyrt fráreiti (CS) og forðunar-SD — hann spáir fyrir um fráreiti. Þetta skaðar félagsleg tengsl og dregur úr gæðasamskiptum.", "src": "K"}, {"q": "Hvað eru viðbrögð við hlé frá forðun (timeout from avoidance) og hvernig virka þau sem neikvæð styrking?", "opts": ["Hlé frá forðun þjónar sem jákvæð styrking — lífvera fær eitthvað gott", "Hlé frá forðun veldur því að lífvera gleymir forðunarhegðun sinni", "Hlé frá forðun hefur engin áhrif á hegðun lífverunnar", "Lífvera getur fengið hvíld frá forðunarþörf í stuttan tíma — þetta virkar sem neikvæð styrking á þeirri hegðun sem leiðir til hvíldar"], "ans": 3, "exp": "Hlé frá forðun (timeout from avoidance): lífvera getur fengið hvíld frá forðunarþörf þegar tiltekin hegðun er framkvæmd. Þetta virkar sem neikvæð styrking: fjarlæging á þörfinni fyrir stöðuga forðun eykur þá hegðun sem leiðir til hvíldar. Frí og pásur frá stressandi vinnu eru dæmi um þetta.", "src": "K"}, {"q": "Hvað er hegðunarlegar aukaáhrif (behavioral side effects) refsingarinnar í tengslum við virk-skyldræn samspil?", "opts": ["Refsing framkallar skyldræn viðbrögð (hræðsla, grátur) sem geta komið fram sem virk hegðun og ruglað saman við minnkun á marklegðun", "Refsing hefur eingöngu virk aukaáhrif og hefur engin áhrif á skyldræna hegðun", "Skyldræn viðbrögð við refsingu eru alltaf gagnleg og auðvelda læringu", "Virk-skyldræn samspil koma aðeins fram þegar refsing er mjög sterk"], "ans": 0, "exp": "Refsing framkallar skyldræn viðbrögð — hræðsla, grátur, niðurþrýstingur — sem geta komið fram sem virk hegðun og þannig gert erfitt að greina á milli minnkunar á marklegðun og aukningu á óæskilegri skyldræni hegðun. Þetta er dæmi um virk-skyldræn samspil og er eitt af aukaáhrifum sem við þurfum að hafa í huga.", "src": "K"}, {"q": "Hvað er aðskilin forðun (discriminated avoidance) og hvað ákvarðar námshraðann?", "opts": ["Forðun þar sem engin SD er til staðar; nám ræðst af R-S millibili", "Forðun þar sem SD spáir fyrir um fráreiti; námshraði ræðst af S-S millibili (tíma frá SD að fráreiti) og skýrleika SD", "Forðun þar sem lífvera getur valið á milli tveggja forðunarhegðana", "Námshraði í aðskilinni forðun ræðst aðeins af styrkleika fráreita"], "ans": 1, "exp": "Aðskilin forðun (discriminated avoidance): SD (t.d. tónn) spáir fyrir um fráreiti og lífvera lærir að framkvæma forðunarhegðun í návist SD til að forðast fráreiti. Námshraði ræðst af: 1) S-S millibili (tíminn frá SD að fráreiti — stuttara millibil = hraðara nám) og 2) skýrleika og áberanda SD.", "src": "K"}, {"q": "Hvað sýndi Modaresi (1990) um hlutfall af svörun (rate of acquisition) í aðskilinni forðun?", "opts": ["Þegar SD var sterkur lærðu dýrin hraðar en þegar SD var veikur", "Forðunarhegðun var alltaf lærð á sama hraða óháð skilyrðum", "Þegar S-S millibilið var stutt lærðu dýrin hraðar; þegar R-S verndargildi var lítið var nám hægar", "Forðunarhegðun lærðist hraðar þegar refsing var gefin eftir forðunina"], "ans": 2, "exp": "Modaresi (1990) sýndi að nám í aðskilinni forðun ræðst af S-S millibilinu: þegar S-S millibilið er stutt (SD og fráreiti eru nær saman í tíma) lærðu dýr hraðar. Þegar R-S verndargildi (tíminn sem forðunarhegðun veitir hlé á fráreiti) var lítið var nám hægar vegna þess að hegðunin veitti minni hlé.", "src": "K"}, {"q": "Hvað eru þær félagslegar breytur sem hafa áhrif á árásgirni hjá mönnum samkvæmt rannsóknum?", "opts": ["Árásargirni hjá mönnum er eingöngu ákvarðaðri af líffræðilegum þáttum", "Félagsleg stuðningur eykur árásargirni á meðan einangrun minnkar hana", "Menning hefur engin áhrif á árásargirni — hún er náttúruleg", "Ósæmilegar athugasemdir (insults), menningarlegur heiðurskóði (culture of honor) og félagsleg útskúfun (social exclusion) auka árásargirni"], "ans": 3, "exp": "Rannsóknir sýna að eftirfarandi félagslegar breytur auka árásargirni hjá mönnum: 1) ósæmilegar athugasemdir (insults) sem snerta persónulegt æru, 2) menningarlegur heiðurskóði (culture of honor) — t.d. þar sem refsing af mögulegri sömunarlegu meiðslum er sett í forgang, og 3) félagsleg útskúfun — að finna sig útilokað úr hóp eykur árásarsemi.", "src": "K"}]}, {"id": "liffraedilegt", "title": "Líffræðilegt samhengi", "subtitle": "Ch7", "questions": [{"q": "Hvað er merkjafylgd (sign tracking / autoshaping) og hvers vegna er hún áhugaverð hegðunarfræðilega?", "opts": ["Lífvera nálgast og rannsakar áreiti sem spáir fyrir um styrk jafnvel þótt hegðunin þjóni engum hagnýtum tilgangi — sýnir líffræðilegar takmarkanir á virkri hegðun", "Merkjafylgd er heilbrigð lærdómsleg hegðun þar sem lífvera notar vísbendingar til að finna mat", "Merkjafylgd er form jákvæðrar styrkingar þar sem nálgun við SD er styrkt", "Merkjafylgd kemur eingöngu fram hjá fuglum og dýrum og er irrelevant fyrir mannlega hegðun"], "ans": 0, "exp": "Merkjafylgd (sign tracking / autoshaping): Brown og Jenkins (1968) sýndu að dúfur nálguðust og zobbuðu á lit sem spáði fyrir um mat — jafnvel þótt hegðunin gæti ekki leitt til matar. Þetta sýnir líffræðilegar takmarkanir á virkri hegðun: skyldræn hegðun (nálgun við CS) getur truflað virka hegðun (þrýsta á lykil).", "src": "K"}, {"q": "Hvað er sjálfskilyrðing (autoshaping) og hvernig tengist hún þversögnin við forðun?", "opts": ["Sjálfskilyrðing er þegar lífvera þjálfar sig sjálf án utanaðkomandi þjálfarans", "Sjálfskilyrðing þar sem lífvera þróar hegðun vegna CS-US tengsla án þess að hegðunin sé beint styrkt; þversögnin: dúfur zobbur á lykil sem slökkvar á mat — hegðun viðheldst þrátt fyrir að vera refsuð", "Sjálfskilyrðing og forðun eru gagnstæð ferli og geta aldrei komið saman", "Þversögnin við forðun kemur aðeins fram hjá mönnum"], "ans": 1, "exp": "Williams og Williams (1969) sýndu þversögnina: dúfur sem zobbur á lykil missir matinn (jákvæð refsing) en hegðunin viðheldst! Þetta er vegna þess að CS-US tengslum (sjálfskilyrðing) er upphafl sterkari en afleiðing virkrar skilyrðingar. Þetta sýnir að skyldræn og virk skilyrðing geta blandast og komist í þversögn.", "src": "K"}, {"q": "Hvað er bragðviðbjóður (conditioned taste aversion / CTA) og hvað sýnir hann um líffræðilegar takmarkanir á skilyrðingu?", "opts": ["Bragðviðbjóður er form virkar skilyrðingar þar sem forðun er styrkt af neikvæðri styrkingu", "Bragðviðbjóður þróast eingöngu þegar lífvera er veik og er þess vegna sjaldgæfur", "Lífvera forðast bragð sem tengdist veikindi jafnvel þótt veikindi hafi komið löngu seinna — sýnir að líffræðileg forhlutunin breytir grunnreglum skilyrðingarinnar (eitt par nóg, langur tímamunur)", "Bragðviðbjóður fylgir sömu reglum og önnur skyldræn skilyrðing að fullu"], "ans": 2, "exp": "Garcia og Koelling (1966) sýndu að bragðviðbjóður (CTA) brýtur grunnreglur skilyrðingar: 1) eitt par CS-US nóg (venjulega þarf mörg pör), 2) langur tímamunur á milli CS og US virkar (klukkustundir á meðan hefðbundin skilyrðing krefst sekúndna), og 3) bragð-veikindi tengsl lærist auðveldara en sjónrænt-veikindi. Þetta endurspeglar líffræðilegar forhlutanir.", "src": "K"}, {"q": "Hvað er líffræðileg aðlæg hegðun (instinctive drift) og hvaða dæmi gáfu Breland og Breland (1961)?", "opts": ["Þegar lífvera lærir nýja hegðun sem líkist meðfæddri hegðun", "Þegar þjálfuð hegðun verður svo föst að lífvera getur ekki breytt henni", "Þegar hegðun þróast smám saman án þjálfunar í náttúrulegum aðstæðum", "Þegar þjálfuð hegðun brotnar niður og lífvera snýr aftur í líffræðilega fyrirhugaða hegðun; grisin sem byrja að grúska myntirnar í stað þess að leggja þær í sparlykil"], "ans": 3, "exp": "Instinctive drift: Breland og Breland (1961) þjálfuðu dýr en komust að því að þjálfuð hegðun braut smám saman niður og líffræðileg hegðun yfirtók: grisin sem átti að leggja mynt í sparlykil fór að grúska hana og nefsa hana; kettir sem áttu að standa friðsælt fóru að sópa loft o.fl. Þetta sýnir að nám er ekki óendanlegt tægt (not infinitely flexible).", "src": "K"}, {"q": "Hvað sýndi Garcia og Koelling (1966) rannsóknin ('smakkandi rotta') um tilbúið nám (preparedness)?", "opts": ["Rottur lærðu auðveldlega að tengja bragð við veikindi og sjónrænar/hljóðrænar vísbendingar við sársauka — en ekki bragð við sársauka eða sjón/hljóð við veikindi; þetta sýnir að tilteknar CS-US tengsl eru líffræðilega 'tilbúin'", "Rottur geta lært hvaða CS-US tengsl sem eru með jöfnum hraða — líffræðileg forhlutun er ekki til", "Rannsóknin sýndi að líffræðileg forhlutun er eingöngu fyrir fæðu en ekki sársauka", "Garcia og Koelling sýndu að rottur geta aðeins lært bragðvísbendingar"], "ans": 0, "exp": "Garcia og Koelling (1966) sýndu selective associations: rottur lærðu auðveldlega bragð (CS) → veikindi (US) og sjón/hljóð (CS) → rafskot (US), en ekki bragð → rafskot eða sjón/hljóð → veikindi. Þetta er tilbúið nám (preparedness): tilteknar CS-US tengsl eru líffræðilega 'tilbúin' vegna þróunarsögu tegundarinnar.", "src": "K"}, {"q": "Hvað er kynæðisfræðileg hegðun (phylogenetic behavior) og hvernig tengjast óskilyrðar styrkingarmáttir við hana?", "opts": ["Kynæðisfræðileg hegðun er lærð í gegnum stofnaðgerðir", "Kynæðisfræðileg hegðun er meðfædd og hefur þróast vegna náttúruvalsins; óskilyrðar styrkingarmáttir (mat, kynlíf, vatn) eru líffræðilega ákvarðaðar vegna sömu ferlis", "Óskilyrðar styrkingarmáttir eru eingöngu félagslegir og breytast með menningunni", "Kynæðisfræðileg hegðun er alltaf refsunarviðnámsþrá og getur ekki verið breytt"], "ans": 1, "exp": "Kynæðisfræðileg hegðun (phylogenetic behavior) hefur þróast í gegnum náttúruval vegna verndarvildar — hún var valin vegna þess að hún yki líkur á lifun og fjölgun. Óskilyrðar styrkingarmáttir (mat, vatn, kynlíf, húsaskjól) eru líffræðilega ákvarðaðar af sömu þróunarferlum — þeir eru 'þvingaðir' af náttúrulegri þróun.", "src": "K"}, {"q": "Hvað er skilyrðaður staðarval (conditioned place preference / CPP) og hvernig er hann notaður til að rannsaka fíkn?", "opts": ["CPP er eingöngu notaður til að rannsaka náttúrulegar styrkingarmáttir, ekki lyf", "CPP mælir aðeins forðunarhegðun en ekki nálgunarhegðun", "Lífvera eyðir meiri tíma í aðstæðum þar sem lyf eða styrkar hafa verið gefin — mælir líffræðilegar og hegðunarlegar áhrif lyfja á skyldræna nálgum", "CPP er form virkar skilyrðingar þar sem nálgun er beint styrkt"], "ans": 2, "exp": "Skilyrðaður staðarval (CPP): lífvera eyðir meiri tíma í aðstæðum (t.d. herbergi með ákveðnum vísbendingum) þar sem lyf eða styrkar hafa verið gefin. Þetta er mæling á skyldrænum nálgunarhegðun og er mikið notað til að rannsaka fíknivald lyfja — einnig hvernig umhverfislegur vísbendingar tengdar fíkn geta framkallað löngun (craving).", "src": "K"}, {"q": "Hvað sýndu Shettleworth (1975) rannsóknirnar á gullhömstrum um takmarkanir á nám?", "opts": ["Gullhömstrar geta lært hvaða hegðun sem er jafn auðveldlega", "Rannsóknin sýndi að einungis matarleitarhegðun er hægt að þjálfa", "Shettleworth sýndi að hegðun sem tengist náttúrulegri aðlögun er alltaf erfiðari að þjálfa", "Tilteknar hegðanir (t.d. rifa, grafa) lærðust auðveldlega sem forðunarhegðun en aðrar (þvo kinnar) lærðust harðlega — ólíkar hegðanir eru m essara forhlutana: við getum auðveldlega þjálfað hegðanir sem falla vel að líffræðilegri samsetningu einstaklingsins, en við getum lent í líffræðilegri aðlægni (instinctive drift) ef við reynum að þjálfa hegðanir sem ganga gegn henni.", "src": "AI"}, {"q": "Hvað er samkeppni milli viðbragða (competition between responses) í tilraunum á sjálfskilyrðingu?", "opts": ["Þegar tvær virkar hegðanir keppaðst um sama styrk", "Þegar lífvera verður að velja á milli tveggja jafnsterkra CS", "Þegar skyldræn hegðun (merkjafylgd) og virk hegðun (þrýsta á lykil til styrkis) keppaðst og skyldræna hegðunin yfirtók — sýnir truflun skyldrænna ferla á virkar", "Samkeppni milli viðbragða kemur eingöngu fram þegar fráreiti er notaður"], "ans": 2, "exp": "Samkeppni milli viðbragða: Williams og Williams (1969) sýndu að dúfur sem zobbur á CS (merkjafylgd) misstu matinn — en hegðunin viðhaldist þrátt fyrir refsingu. Þetta er samkeppni á milli skyldrænnar hegðunar (merkjafylgd/CS-U tengsla) og virkrar hegðunar (þrýsta á lykil). Skyldræn hegðun getur truflað virka hegðun.", "src": "K"}, {"q": "Hvað sýndi Domjan (1994) um kynlægar skilyrðingarlegar forhlutanir?", "opts": ["Kynlæg skilyrðing er eingöngu mannleg fyrirbæri", "Kynlægar forhlutanir ganga gegn samræmingarreglunni", "Kynlæg skilyrðing þróast eingöngu á CRF styrkingarháttum", "Dúfar og önnur dýr kynlærast auðveldlega við CS sem líkist maka — þetta er líffræðileg forhlutun sem þjónar fjölgunarvildum"], "ans": 3, "exp": "Domjan og fleiri sýndu að dýr kynlærast auðveldlega við CS sem líkjast náttúrulegum kynlægar vísbendingum (t.d. útlit maka, lykt). Þetta er líffræðileg forhlutun sem þjónar fjölgunarvildum: kynlæg skilyrðing er hluti af náttúrulegum kynhegðunarkerfum og er mun auðveldara en tilviljunarlægar CS-US tengsl.", "src": "K"}, {"q": "Hvað er sjúklegur matarlyst (anorexia) í rotta-tilraunum og hvað skýrir hann um líffræðilegar takmarkanir?", "opts": ["Rottur á FI matarhætti með hjólþjálfun borðuðu minna en þær þurftu og létu lífið
