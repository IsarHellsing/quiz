const BOOK_ID = "__bookmarks__";
let S = {chapterId:null,questions:[],current:0,correct:0,wrong:0,fails:[],answered:false,mode:'all',navState:[],choiceState:[],orderState:[]};
let lastIndexed = [];
function $(id){return document.getElementById(id)}
function key(id){return 'pq_'+id} function fkey(id){return 'pq_f_'+id} function mkey(id){return 'pq_m_'+id}
function load(k,d){try{return JSON.parse(localStorage.getItem(k)) ?? d}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function getChapter(id){if(id===BOOK_ID)return {id:BOOK_ID,title:'Bookmarked Answers',desc:'Global saved question collection.',questions:load('pq_bookmarks',[])};return CHAPTERS.find(c=>c.id===id)}
function mastered(id){return load(mkey(id),[])}
function setMastered(id,arr){save(mkey(id),arr)}
function progress(id){return load(key(id),{navState:[],correct:0,wrong:0,current:0})}
function bookmarks(){return load('pq_bookmarks',[])}
function isBookmarked(q){const src=q.sourceChapter&&q.sourceChapter!==BOOK_ID?q.sourceChapter:(S&&S.chapterId&&S.chapterId!==BOOK_ID?S.chapterId:q.sourceChapter);return bookmarks().some(x=>x.q===q.q && (!src || !x.sourceChapter || x.sourceChapter===src || S.chapterId===BOOK_ID))}
function boot(){
 const inc=load('pq_includeMastered',false);
 $('includeMastered').checked=inc;
 $('includeMastered').onchange=()=>{
   save('pq_includeMastered',$('includeMastered').checked);
   if(S && S.chapterId){
     const currentId=S.chapterId;
     const currentMode=S.mode||'all';
     localStorage.removeItem(key(currentId));
     startChapter(currentId,currentMode);
   }else{
     showHome();
   }
 };
 showHome()
}
function showHome(){S.chapterId=null;$('subtitle').textContent='Chapter select';const app=$('app');const b=bookmarks();let html=examCard();if(b.length){html+=chapterCard({id:BOOK_ID,title:'★ Bookmarked Answers',desc:'Your saved questions across every chapter.',questions:b},true)}html+='<div class="grid">'+CHAPTERS.map(c=>chapterCard(c,false)).join('')+'</div>';app.innerHTML=html}
function chapterCard(c,special){const p=progress(c.id);const total=c.questions.length;const done=(p.navState||[]).filter(Boolean).length;const mast=mastered(c.id).length;const fails=load(fkey(c.id),[]).length;const pct=total?Math.round(done/total*100):0;return `<div class="card chapter" onclick="startChapter('${c.id}','all')"><h2>${esc(c.title)}</h2><p style="color:var(--muted)">${esc(c.desc||'')}</p><div class="bar"><span style="width:${pct}%"></span></div><div class="meta"><span class="pill">${total} questions</span><span class="pill">${pct}% done</span><span class="pill">${fails} fails</span><span class="pill">★ ${mast} mastered</span></div></div>`}
function startChapter(id,mode){const c=getChapter(id);let qs=[...c.questions].map(q=>({...q,sourceChapter:q.sourceChapter||id}));if(!qs.length){$('app').innerHTML=`<div class="card"><h2>${esc(c.title)}</h2><div class="empty">This chapter shell is ready, but the verbatim question bank has not been inserted yet.</div><div class="toolbar" style="margin-top:16px"><button class="btn" onclick="showHome()">Back</button></div></div>`;return}if(mode==='fails'){const fb=load(fkey(id),[]);qs=qs.filter(q=>fb.some(f=>f.q===q.q));}if(!$('includeMastered').checked && mode==='all'){
 const m=mastered(id);
 qs=qs.filter(q=>!m.includes(q.q));
}if(!qs.length){$('app').innerHTML=`<div class="card"><h2>${esc(c.title)}</h2><div class="empty">No questions available for this mode. Try including mastered questions or retaking all.</div><div class="toolbar" style="margin-top:16px"><button class="btn" onclick="startChapter('${id}','all')">Retake All</button><button class="btn" onclick="showHome()">Back</button></div></div>`;return}const p=progress(id);S={chapterId:id,questions:qs,current:Math.min(p.current||0,qs.length-1),correct:p.correct||0,wrong:p.wrong||0,fails:load(fkey(id),[]),answered:false,mode,navState:(p.navState||Array(qs.length).fill(null)).slice(0,qs.length),choiceState:(p.choiceState||Array(qs.length).fill(null)).slice(0,qs.length),orderState:(p.orderState||Array(qs.length).fill(null)).slice(0,qs.length)};$('subtitle').textContent=c.title;renderQuestion()}
function persist(){if(!S.chapterId)return;save(key(S.chapterId),{current:S.current,correct:S.correct,wrong:S.wrong,navState:S.navState,choiceState:S.choiceState,orderState:S.orderState});save(fkey(S.chapterId),S.fails)}
function sourceBadge(q){const src=String(q.source||'');return (/Study Questions|Lokapróf|Final Exam|Sample Exam/i.test(src))?'Teacher':'AI'}
function renderQuestion(){const q=S.questions[S.current];S.answered=Boolean(S.navState[S.current]);if(!S.orderState[S.current]){const fresh=q.opts.map((opt,i)=>({opt,origIdx:i}));shuffle(fresh);S.orderState[S.current]=fresh.map(x=>x.origIdx);persist()}lastIndexed=S.orderState[S.current].map(origIdx=>({opt:q.opts[origIdx],origIdx}));const m=mastered(S.chapterId);const isM=m.includes(q.q);const bm=isBookmarked(q);$('app').innerHTML=`<div class="quiz-layout"><section class="card questionCard"><div class="source"><span>${S.current+1}/${S.questions.length}</span><span class="badge ${sourceBadge(q).toLowerCase()}">${sourceBadge(q)}</span><span>${esc(q.source||q.sourceChapter||'')}</span>${isBookmarked(q)?'<span class="bookmarkHint">Bookmarked</span>':''}</div><h2 class="qtitle">${esc(q.q)}</h2><div class="opts">${lastIndexed.map((item,dispIdx)=>`<button class="opt" id="opt${dispIdx}" onclick="selectAnswer(${item.origIdx},${dispIdx})">${esc(item.opt)}</button>`).join('')}</div><div id="feedback" class="feedback hidden"></div><label class="check"><input type="checkbox" ${isM?'checked':''} onchange="toggleMastered(this.checked)"> Mark as mastered</label><div class="toolbar"><button class="btn" onclick="prevQ()">← Prev</button><button class="btn warn" onclick="dontKnow()">Don’t Know</button><button class="btn" onclick="nextQ()">Next →</button><button class="btn ${bm?'good':''}" onclick="toggleBookmark()">${bm?'Bookmarked':'Bookmark'}</button></div></section><aside class="card side"><h3>Progress</h3><div class="row"><span>Correct</span><b>${S.correct}</b></div><div class="row"><span>Wrong / Don’t know</span><b>${S.wrong}</b></div><div class="row"><span>Mode</span><b>${S.mode}</b></div><div class="navgrid" style="margin-top:14px">${S.questions.map((x,i)=>navButton(i)).join('')}</div><div class="toolbar" style="margin-top:16px"><button class="btn" onclick="confirmRetake('all')">Retake All</button><button class="btn bad" onclick="confirmRetake('fails')">Retake Fails</button><button class="btn primary" onclick="showResults()">Results</button></div></aside></div>`;if(S.navState[S.current])restoreAnswered()}
function navButton(i){const st=S.navState[i]||'';const q=S.questions[i];const m=mastered(S.chapterId).includes(q.q);const bm=isBookmarked(q);return `<button class="navbtn ${st} ${i===S.current?'current':''} ${m?'mastered':''} ${bm?'bookmarked':''}" title="${bm?'Bookmarked ':''}${m?'Mastered':''}" onclick="jumpQ(${i})">${i+1}</button>`}
function selectAnswer(origIdx,dispIdx){if(S.answered)return;const q=S.questions[S.current];const correct=origIdx===q.ans;S.answered=true;S.navState[S.current]=correct?'correct':'wrong';S.choiceState[S.current]=origIdx;if(correct)S.correct++;else{S.wrong++;addFail(q,q.opts[origIdx])}const correctDispIdx=lastIndexed.findIndex(item=>item.origIdx===q.ans);lastIndexed.forEach((item,i)=>{const b=$('opt'+i);b.classList.add('disabled');if(i===correctDispIdx)b.classList.add('correct');if(i===dispIdx&&!correct)b.classList.add('wrong')});showFeedback(correct?`Correct. ${q.exp}`:`Wrong. Correct answer: ${esc(q.opts[q.ans])}. ${q.exp}`);persist()}
function restoreAnswered(){const q=S.questions[S.current];const st=S.navState[S.current];const chosen=S.choiceState[S.current];const correctDispIdx=lastIndexed.findIndex(item=>item.origIdx===q.ans);lastIndexed.forEach((item,i)=>{const b=$('opt'+i);b.classList.add('disabled');b.onclick=null;if(i===correctDispIdx && st!=='dontknow')b.classList.add('correct');if(st==='wrong' && item.origIdx===chosen)b.classList.add('wrong')});showFeedback(st==='dontknow'?`Don’t know. Correct answer: ${esc(q.opts[q.ans])}. ${q.exp}`:`Answered. Correct answer: ${esc(q.opts[q.ans])}. ${q.exp}`)}
function dontKnow(){if(S.answered)return;const q=S.questions[S.current];S.answered=true;S.navState[S.current]='dontknow';S.choiceState[S.current]=null;S.wrong++;addFail(q,'Don’t Know');document.querySelectorAll('.opt').forEach(b=>{b.classList.add('disabled');b.onclick=null});showFeedback(`Don’t know. Correct answer: ${esc(q.opts[q.ans])}. ${q.exp}`);persist()}
function addFail(q,yourAns){if(!S.fails.some(f=>f.q===q.q)){S.fails.push({q:q.q,yourAns,correctAns:q.opts[q.ans]})}}
function showFeedback(text){const f=$('feedback');f.innerHTML=text;f.classList.remove('hidden')}
function nextQ(){if(S.current<S.questions.length-1){S.current++;persist();renderQuestion()}else showResults()}
function prevQ(){if(S.current>0){S.current--;persist();renderQuestion()}}
function jumpQ(i){S.current=i;persist();renderQuestion()}
function toggleMastered(checked){const q=S.questions[S.current];let m=mastered(S.chapterId);if(checked&&!m.includes(q.q))m.push(q.q);if(!checked)m=m.filter(x=>x!==q.q);setMastered(S.chapterId,m);renderQuestion()}
function toggleBookmark(){
 const current=S.questions[S.current];
 const originalChapter=current.sourceChapter&&current.sourceChapter!==BOOK_ID?current.sourceChapter:S.chapterId;
 const q={...current,sourceChapter:originalChapter};
 let b=bookmarks();
 const exists=b.some(x=>x.q===q.q && (x.sourceChapter||'')===(q.sourceChapter||''));
 if(exists){
   b=b.filter(x=>!(x.q===q.q && (x.sourceChapter||'')===(q.sourceChapter||'')));
   if(S.chapterId===BOOK_ID){
     S.questions=S.questions.filter((_,idx)=>idx!==S.current);
     S.navState=S.navState.filter((_,idx)=>idx!==S.current);
     S.choiceState=S.choiceState.filter((_,idx)=>idx!==S.current);
     S.orderState=S.orderState.filter((_,idx)=>idx!==S.current);
     if(S.current>=S.questions.length)S.current=Math.max(0,S.questions.length-1);
   }
 }else{
   b.push(q);
 }
 save('pq_bookmarks',b);
 if(S.chapterId===BOOK_ID && !S.questions.length){
   showHome();
 }else{
   renderQuestion();
 }
}
function showResults(){persist();const total=S.questions.length;const done=S.navState.filter(Boolean).length;const pct=total?Math.round(S.correct/total*100):0;$('app').innerHTML=`<section class="card"><h2 class="qtitle">Results</h2><div class="grid"><div class="card"><b>${pct}%</b><p style="color:var(--muted)">Score</p></div><div class="card"><b>${S.correct}</b><p style="color:var(--muted)">Correct</p></div><div class="card"><b>${S.wrong}</b><p style="color:var(--muted)">Wrong / Don’t know</p></div><div class="card"><b>${done}/${total}</b><p style="color:var(--muted)">Answered</p></div></div><div class="toolbar" style="margin-top:16px"><button class="btn primary" onclick="confirmRetake('all')">Retake All</button><button class="btn bad" onclick="confirmRetake('fails')">Retake Fails</button><button class="btn" onclick="showHome()">Chapter Select</button></div><h3 style="font-family:Syne;margin-top:28px">Fails Review</h3><div class="result-list">${S.fails.length?S.fails.map(f=>`<div class="failitem"><b>${esc(f.q)}</b><p style="color:var(--bad)">Your answer: ${esc(f.yourAns)}</p><p style="color:var(--good)">Correct: ${esc(f.correctAns)}</p></div>`).join(''):'<div class="empty">No fails in this chapter yet.</div>'}</div></section>`}
function confirmRetake(mode){$('overlay').classList.remove('hidden');$('ovTitle').textContent=mode==='fails'?'Retake fails?':'Retake all?';$('ovYes').onclick=()=>{hideOverlay();resetAndStart(mode)}}
function hideOverlay(){$('overlay').classList.add('hidden')}
function resetAndStart(mode){if(mode==='all'){localStorage.removeItem(key(S.chapterId));save(fkey(S.chapterId),[])}else{localStorage.removeItem(key(S.chapterId))}startChapter(S.chapterId,mode)}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

const EXAM_KEY='pq_final_exam_sim_v1';
let E=null;
let examTimerId=null;

function examCard(){
 const saved=load(EXAM_KEY,null);
 const resume=saved&&saved.questions&&saved.questions.length&&!saved.finished;
 return `<div class="card" style="margin-bottom:18px;border-color:rgba(124,92,255,.45)">
   <div class="examHeader">
     <div>
       <h2 style="margin:0;font-family:Syne">Final Exam Simulation</h2>
       <p style="color:var(--muted);margin-bottom:0">115 randomized questions · 3 hours · no instant feedback · final review after submission.</p>
     </div>
     <div class="toolbar">
       ${resume?'<button class="btn" onclick="resumeExamSimulation()">Resume Exam</button>':''}
       <button class="btn primary" onclick="startExamSimulation(true)">Start New Exam</button>
     </div>
   </div>
 </div>`;
}
function examPool(){
 const all=[];
 CHAPTERS.forEach(c=>{
   (c.questions||[]).forEach(q=>{
     if(q&&q.q&&q.opts&&q.opts.length===4&&Number.isInteger(q.ans)){
       all.push({...q,sourceChapter:c.id,chapterTitle:c.title});
     }
   });
 });
 return all;
}
function buildExamQuestions(){
 const pool=examPool();
 const high=['schedules','verbal','stimulus','conditioned','aba','ch5','ch8','ch10','ch12','ch13'];
 const weighted=[];
 pool.forEach(q=>{
   const hay=(q.sourceChapter+' '+(q.chapterTitle||'')+' '+q.q).toLowerCase();
   const w=high.some(x=>hay.includes(x))?2:1;
   for(let i=0;i<w;i++) weighted.push(q);
 });
 shuffle(weighted);
 const seen=new Set(), picked=[];
 weighted.forEach(q=>{
   if(picked.length>=115)return;
   const k=q.q;
   if(!seen.has(k)){seen.add(k);picked.push({...q});}
 });
 if(picked.length<115){
   shuffle(pool);
   pool.forEach(q=>{
     if(picked.length>=115)return;
     if(!seen.has(q.q)){seen.add(q.q);picked.push({...q});}
   });
 }
 return picked;
}
function startExamSimulation(reset){
 if(reset){localStorage.removeItem(EXAM_KEY);}
 const questions=buildExamQuestions();
 E={
   questions,
   current:0,
   answers:Array(questions.length).fill(null),
   navState:Array(questions.length).fill(null),
   orderState:Array(questions.length).fill(null),
   startedAt:Date.now(),
   durationMs:180*60*1000,
   finished:false
 };
 save(EXAM_KEY,E);
 renderExamQuestion();
}
function resumeExamSimulation(){
 const saved=load(EXAM_KEY,null);
 if(saved&&saved.questions&&saved.questions.length){E=saved;renderExamQuestion();}
 else startExamSimulation(true);
}
function persistExam(){if(E)save(EXAM_KEY,E)}
function examRemainingMs(){return Math.max(0,(E.startedAt+E.durationMs)-Date.now())}
function fmtMs(ms){
 const total=Math.ceil(ms/1000);
 const h=Math.floor(total/3600);
 const m=Math.floor((total%3600)/60);
 const s=total%60;
 return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function startExamTimer(){
 if(examTimerId)clearInterval(examTimerId);
 examTimerId=setInterval(()=>{
   const t=$('examTimer');
   if(!E||!t)return;
   const left=examRemainingMs();
   t.textContent=fmtMs(left);
   if(left<=0){clearInterval(examTimerId);finishExam(true);}
 },1000);
}
function renderExamQuestion(){
 if(!E){resumeExamSimulation();return;}
 const q=E.questions[E.current];
 if(!E.orderState[E.current]){
   const arr=q.opts.map((opt,i)=>({opt,origIdx:i}));
   shuffle(arr);
   E.orderState[E.current]=arr.map(x=>x.origIdx);
   persistExam();
 }
 const indexed=E.orderState[E.current].map(origIdx=>({opt:q.opts[origIdx],origIdx}));
 const selected=E.answers[E.current];
 const answered=E.navState.filter(Boolean).length;
 const left=examRemainingMs();
 $('subtitle').textContent='Final Exam Simulation';
 $('app').innerHTML=`<div class="quiz-layout">
   <section class="card">
     <div class="examHeader">
       <div class="source"><span>Question ${E.current+1}/${E.questions.length}</span><span class="badge ${sourceBadge(q).toLowerCase()}">${sourceBadge(q)}</span><span>${esc(q.chapterTitle||q.sourceChapter||'')}</span></div>
       <div><div id="examTimer" class="examTimer">${fmtMs(left)}</div><div style="color:var(--muted);font-size:12px;text-align:right">time left</div></div>
     </div>
     <h2 class="qtitle">${esc(q.q)}</h2>
     <div class="opts">${indexed.map((item,dispIdx)=>{
       const cls=selected===item.origIdx?' examChosen':(selected==='DK'?' examDontKnow':'');
       return `<button class="opt${cls}" id="eopt${dispIdx}" onclick="examSelect(${item.origIdx})">${esc(item.opt)}</button>`;
     }).join('')}</div>
     <div class="feedback">No instant feedback in simulation mode. You can change answers until you finish the exam.</div>
     <div class="toolbar">
       <button class="btn" onclick="examPrev()">← Prev</button>
       <button class="btn warn" onclick="examDontKnow()">Don’t Know</button>
       <button class="btn" onclick="examNext()">Next →</button>
       <button class="btn primary" onclick="finishExam(false)">Finish Exam</button>
       <button class="btn" onclick="showHome()">Chapter Select</button>
     </div>
   </section>
   <aside class="card side">
     <h3>Exam Progress</h3>
     <div class="row"><span>Answered</span><b>${answered}/${E.questions.length}</b></div>
     <div class="row"><span>Unanswered</span><b>${E.questions.length-answered}</b></div>
     <div class="row"><span>Mode</span><b>simulation</b></div>
     <div class="navgrid" style="margin-top:14px">${E.questions.map((x,i)=>examNavButton(i)).join('')}</div>
     <div class="toolbar" style="margin-top:16px"><button class="btn bad" onclick="startExamSimulation(true)">Restart Exam</button></div>
   </aside>
 </div>`;
 startExamTimer();
}
function examNavButton(i){
 const st=E.navState[i]||'';
 return `<button class="navbtn ${st} ${i===E.current?'current':''}" onclick="examJump(${i})">${i+1}</button>`;
}
function examSelect(origIdx){
 E.answers[E.current]=origIdx;
 E.navState[E.current]='answered';
 persistExam();
 renderExamQuestion();
}
function examDontKnow(){
 E.answers[E.current]='DK';
 E.navState[E.current]='dontknow';
 persistExam();
 renderExamQuestion();
}
function examNext(){if(E.current<E.questions.length-1){E.current++;persistExam();renderExamQuestion();}else finishExam(false)}
function examPrev(){if(E.current>0){E.current--;persistExam();renderExamQuestion();}}
function examJump(i){E.current=i;persistExam();renderExamQuestion();}
function finishExam(auto){
 if(!E)return;
 const unanswered=E.navState.filter(x=>!x).length;
 if(!auto && unanswered>0 && !confirm(`You still have ${unanswered} unanswered questions. Finish anyway?`))return;
 E.finished=true;
 persistExam();
 if(examTimerId)clearInterval(examTimerId);
 showExamResults();
}
function showExamResults(){
 const total=E.questions.length;
 let correct=0, wrong=0, dontknow=0, unanswered=0;
 const rows=E.questions.map((q,i)=>{
   const a=E.answers[i];
   const ok=a===q.ans;
   if(ok)correct++;
   else{
     if(a==='DK')dontknow++;
     else if(a===null||a===undefined)unanswered++;
     else wrong++;
   }
   const your=a==='DK'?'Don’t Know':(a===null||a===undefined?'Unanswered':q.opts[a]);
   return {q,i,ok,your,correct:q.opts[q.ans],chapter:q.chapterTitle||q.sourceChapter};
 });
 const pct=total?Math.round((correct/total)*100):0;
 $('subtitle').textContent='Final Exam Results';
 $('app').innerHTML=`<section class="card">
   <h2 class="qtitle">Final Exam Simulation Results</h2>
   <div class="grid">
     <div class="card"><b>${pct}%</b><p style="color:var(--muted)">Score</p></div>
     <div class="card"><b>${correct}</b><p style="color:var(--muted)">Correct</p></div>
     <div class="card"><b>${wrong}</b><p style="color:var(--muted)">Wrong</p></div>
     <div class="card"><b>${dontknow+unanswered}</b><p style="color:var(--muted)">Don’t know / unanswered</p></div>
   </div>
   <div class="toolbar" style="margin-top:16px">
     <button class="btn primary" onclick="startExamSimulation(true)">Start New Simulation</button>
     <button class="btn" onclick="showHome()">Chapter Select</button>
   </div>
   <h3 style="font-family:Syne;margin-top:28px">Full Review</h3>
   <div class="result-list">${rows.map(r=>`<div class="examReviewItem ${r.ok?'correct':'wrong'}">
      <div class="source"><span>${r.i+1}/${total}</span><span>${esc(r.chapter)}</span></div>
      <b>${esc(r.q.q)}</b>
      <p style="color:${r.ok?'var(--good)':'var(--bad)'}">Your answer: ${esc(r.your)}</p>
      <p style="color:var(--good)">Correct answer: ${esc(r.correct)}</p>
      <p style="color:var(--muted)">${esc(r.q.exp||'')}</p>
   </div>`).join('')}</div>
 </section>`;
}

boot();

</script>
</body>
