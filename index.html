     S.questions=S.questions.filter((_,idx)=>idx!==S.current);
     S.navState=S.navState.filter((_,idx)=>idx!==S.current);
     S.choiceState=S.choiceState.filter((_,idx)=>idx!==S.current);
     S.orderState=S.orderState.filter((_,idx)=>idx!==S.current);
     if(S.current>=S.questions.length)S.current=Math.max(0,S.questions.length-1);
   }
 }else{
   b.push(q);
 }
 save('pq_bookmarks',b);
 if(S.chapterId===BOOK_ID && !S.questions.length){
   showHome();
 }else{
   renderQuestion();
 }
}
function showResults(){persist();const total=S.questions.length;const done=S.navState.filter(Boolean).length;const pct=total?Math.round(S.correct/total*100):0;$('app').innerHTML=`<section class="card"><h2 class="qtitle">Results</h2><div class="grid"><div class="card"><b>${pct}%</b><p style="color:var(--muted)">Score</p></div><div class="card"><b>${S.correct}</b><p style="color:var(--muted)">Correct</p></div><div class="card"><b>${S.wrong}</b><p style="color:var(--muted)">Wrong / Don’t know</p></div><div class="card"><b>${done}/${total}</b><p style="color:var(--muted)">Answered</p></div></div><div class="toolbar" style="margin-top:16px"><button class="btn primary" onclick="confirmRetake('all')">Retake All</button><button class="btn bad" onclick="confirmRetake('fails')">Retake Fails</button><button class="btn" onclick="showHome()">Chapter Select</button></div><h3 style="font-family:Syne;margin-top:28px">Fails Review</h3><div class="result-list">${S.fails.length?S.fails.map(f=>`<div class="failitem"><b>${esc(f.q)}</b><p style="color:var(--bad)">Your answer: ${esc(f.yourAns)}</p><p style="color:var(--good)">Correct: ${esc(f.correctAns)}</p></div>`).join(''):'<div class="empty">No fails in this chapter yet.</div>'}</div></section>`}
function confirmRetake(mode){$('overlay').classList.remove('hidden');$('ovTitle').textContent=mode==='fails'?'Retake fails?':'Retake all?';$('ovYes').onclick=()=>{hideOverlay();resetAndStart(mode)}}
function hideOverlay(){$('overlay').classList.add('hidden')}
function resetAndStart(mode){if(mode==='all'){localStorage.removeItem(key(S.chapterId));save(fkey(S.chapterId),[])}else{localStorage.removeItem(key(S.chapterId))}startChapter(S.chapterId,mode)}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

const EXAM_KEY='pq_final_exam_sim_v1';
let E=null;
let examTimerId=null;

function examCard(){
 const saved=load(EXAM_KEY,null);
 const resume=saved&&saved.questions&&saved.questions.length&&!saved.finished;
 return `<div class="card" style="margin-bottom:18px;border-color:rgba(124,92,255,.45)">
   <div class="examHeader">
     <div>
       <h2 style="margin:0;font-family:Syne">Final Exam Simulation</h2>
       <p style="color:var(--muted);margin-bottom:0">115 randomized questions · 3 hours · no instant feedback · final review after submission.</p>
     </div>
     <div class="toolbar">
       ${resume?'<button class="btn" onclick="resumeExamSimulation()">Resume Exam</button>':''}
       <button class="btn primary" onclick="startExamSimulation(true)">Start New Exam</button>
     </div>
   </div>
 </div>`;
}
function examPool(){
 const all=[];
 CHAPTERS.forEach(c=>{
   (c.questions||[]).forEach(q=>{
     if(q&&q.q&&q.opts&&q.opts.length===4&&Number.isInteger(q.ans)){
       all.push({...q,sourceChapter:c.id,chapterTitle:c.title});
     }
   });
 });
 return all;
}
function buildExamQuestions(){
 const pool=examPool();
 const high=['schedules','verbal','stimulus','conditioned','aba','ch5','ch8','ch10','ch12','ch13'];
 const weighted=[];
 pool.forEach(q=>{
   const hay=(q.sourceChapter+' '+(q.chapterTitle||'')+' '+q.q).toLowerCase();
   const w=high.some(x=>hay.includes(x))?2:1;
   for(let i=0;i<w;i++) weighted.push(q);
 });
 shuffle(weighted);
 const seen=new Set(), picked=[];
 weighted.forEach(q=>{
   if(picked.length>=115)return;
   const k=q.q;
   if(!seen.has(k)){seen.add(k);picked.push({...q});}
 });
 if(picked.length<115){
   shuffle(pool);
   pool.forEach(q=>{
     if(picked.length>=115)return;
     if(!seen.has(q.q)){seen.add(q.q);picked.push({...q});}
   });
 }
 return picked;
}
function startExamSimulation(reset){
 if(reset){localStorage.removeItem(EXAM_KEY);}
 const questions=buildExamQuestions();
 E={
   questions,
   current:0,
   answers:Array(questions.length).fill(null),
   navState:Array(questions.length).fill(null),
   orderState:Array(questions.length).fill(null),
   startedAt:Date.now(),
   durationMs:180*60*1000,
   finished:false
 };
 save(EXAM_KEY,E);
 renderExamQuestion();
}
function resumeExamSimulation(){
 const saved=load(EXAM_KEY,null);
 if(saved&&saved.questions&&saved.questions.length){E=saved;renderExamQuestion();}
 else startExamSimulation(true);
}
function persistExam(){if(E)save(EXAM_KEY,E)}
function examRemainingMs(){return Math.max(0,(E.startedAt+E.durationMs)-Date.now())}
function fmtMs(ms){
 const total=Math.ceil(ms/1000);
 const h=Math.floor(total/3600);
 const m=Math.floor((total%3600)/60);
 const s=total%60;
 return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function startExamTimer(){
 if(examTimerId)clearInterval(examTimerId);
 examTimerId=setInterval(()=>{
   const t=$('examTimer');
   if(!E||!t)return;
   const left=examRemainingMs();
   t.textContent=fmtMs(left);
   if(left<=0){clearInterval(examTimerId);finishExam(true);}
 },1000);
}
function renderExamQuestion(){
 if(!E){resumeExamSimulation();return;}
 const q=E.questions[E.current];
 if(!E.orderState[E.current]){
   const arr=q.opts.map((opt,i)=>({opt,origIdx:i}));
   shuffle(arr);
   E.orderState[E.current]=arr.map(x=>x.origIdx);
   persistExam();
 }
 const indexed=E.orderState[E.current].map(origIdx=>({opt:q.opts[origIdx],origIdx}));
 const selected=E.answers[E.current];
 const answered=E.navState.filter(Boolean).length;
 const left=examRemainingMs();
 $('subtitle').textContent='Final Exam Simulation';
 $('app').innerHTML=`<div class="quiz-layout">
   <section class="card">
     <div class="examHeader">
       <div class="source"><span>Question ${E.current+1}/${E.questions.length}</span><span class="badge ${sourceBadge(q).toLowerCase()}">${sourceBadge(q)}</span><span>${esc(q.chapterTitle||q.sourceChapter||'')}</span></div>
       <div><div id="examTimer" class="examTimer">${fmtMs(left)}</div><div style="color:var(--muted);font-size:12px;text-align:right">time left</div></div>
     </div>
     <h2 class="qtitle">${esc(q.q)}</h2>
     <div class="opts">${indexed.map((item,dispIdx)=>{
       const cls=selected===item.origIdx?' examChosen':(selected==='DK'?' examDontKnow':'');
       return `<button class="opt${cls}" id="eopt${dispIdx}" onclick="examSelect(${item.origIdx})">${esc(item.opt)}</button>`;
     }).join('')}</div>
     <div class="feedback">No instant feedback in simulation mode. You can change answers until you finish the exam.</div>
     <div class="toolbar">
       <button class="btn" onclick="examPrev()">← Prev</button>
       <button class="btn warn" onclick="examDontKnow()">Don’t Know</button>
       <button class="btn" onclick="examNext()">Next →</button>
       <button class="btn primary" onclick="finishExam(false)">Finish Exam</button>
       <button class="btn" onclick="showHome()">Chapter Select</button>
     </div>
   </section>
   <aside class="card side">
     <h3>Exam Progress</h3>
     <div class="row"><span>Answered</span><b>${answered}/${E.questions.length}</b></div>
     <div class="row"><span>Unanswered</span><b>${E.questions.length-answered}</b></div>
     <div class="row"><span>Mode</span><b>simulation</b></div>
     <div class="navgrid" style="margin-top:14px">${E.questions.map((x,i)=>examNavButton(i)).join('')}</div>
     <div class="toolbar" style="margin-top:16px"><button class="btn bad" onclick="startExamSimulation(true)">Restart Exam</button></div>
   </aside>
 </div>`;
 startExamTimer();
}
function examNavButton(i){
 const st=E.navState[i]||'';
 return `<button class="navbtn ${st} ${i===E.current?'current':''}" onclick="examJump(${i})">${i+1}</button>`;
}
function examSelect(origIdx){
 E.answers[E.current]=origIdx;
 E.navState[E.current]='answered';
 persistExam();
 renderExamQuestion();
}
function examDontKnow(){
 E.answers[E.current]='DK';
 E.navState[E.current]='dontknow';
 persistExam();
 renderExamQuestion();
}
function examNext(){if(E.current<E.questions.length-1){E.current++;persistExam();renderExamQuestion();}else finishExam(false)}
function examPrev(){if(E.current>0){E.current--;persistExam();renderExamQuestion();}}
function examJump(i){E.current=i;persistExam();renderExamQuestion();}
function finishExam(auto){
 if(!E)return;
 const unanswered=E.navState.filter(x=>!x).length;
 if(!auto && unanswered>0 && !confirm(`You still have ${unanswered} unanswered questions. Finish anyway?`))return;
 E.finished=true;
 persistExam();
 if(examTimerId)clearInterval(examTimerId);
 showExamResults();
}
function showExamResults(){
 const total=E.questions.length;
 let correct=0, wrong=0, dontknow=0, unanswered=0;
 const rows=E.questions.map((q,i)=>{
   const a=E.answers[i];
   const ok=a===q.ans;
   if(ok)correct++;
   else{
     if(a==='DK')dontknow++;
     else if(a===null||a===undefined)unanswered++;
     else wrong++;
   }
   const your=a==='DK'?'Don’t Know':(a===null||a===undefined?'Unanswered':q.opts[a]);
   return {q,i,ok,your,correct:q.opts[q.ans],chapter:q.chapterTitle||q.sourceChapter};
 });
 const pct=total?Math.round((correct/total)*100):0;
 $('subtitle').textContent='Final Exam Results';
 $('app').innerHTML=`<section class="card">
   <h2 class="qtitle">Final Exam Simulation Results</h2>
   <div class="grid">
     <div class="card"><b>${pct}%</b><p style="color:var(--muted)">Score</p></div>
     <div class="card"><b>${correct}</b><p style="color:var(--muted)">Correct</p></div>
     <div class="card"><b>${wrong}</b><p style="color:var(--muted)">Wrong</p></div>
     <div class="card"><b>${dontknow+unanswered}</b><p style="color:var(--muted)">Don’t know / unanswered</p></div>
   </div>
   <div class="toolbar" style="margin-top:16px">
     <button class="btn primary" onclick="startExamSimulation(true)">Start New Simulation</button>
     <button class="btn" onclick="showHome()">Chapter Select</button>
   </div>
   <h3 style="font-family:Syne;margin-top:28px">Full Review</h3>
   <div class="result-list">${rows.map(r=>`<div class="examReviewItem ${r.ok?'correct':'wrong'}">
      <div class="source"><span>${r.i+1}/${total}</span><span>${esc(r.chapter)}</span></div>
      <b>${esc(r.q.q)}</b>
      <p style="color:${r.ok?'var(--good)':'var(--bad)'}">Your answer: ${esc(r.your)}</p>
      <p style="color:var(--good)">Correct answer: ${esc(r.correct)}</p>
      <p style="color:var(--muted)">${esc(r.q.exp||'')}</p>
   </div>`).join('')}</div>
 </section>`;
}

boot();

</script>
</body>
</html>
