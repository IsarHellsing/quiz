<script>
(() => {
'use strict';
const $ = id => document.getElementById(id);
const STORAGE = 'hegdun_quiz_fixed_v3_';
let chapters = Array.isArray(window.CHAPTERS) ? window.CHAPTERS : [];
let chIndex = 0, cur = null, questions = [], idx = 0, answers = [];
const letters = ['A','B','C','D','E','F'];
function showError(e) {
  const box = document.createElement('div'); box.id='error';
  box.innerHTML = '<h2>App villa</h2><p>Sendu mér þennan text ef þetta gerist aftur:</p><pre></pre><button class="back" onclick="location.reload()">Endurhlaða</button>';
  box.querySelector('pre').textContent = (e && (e.stack || e.message)) ? (e.stack || e.message) : String(e);
  document.body.appendChild(box);
}
window.addEventListener('error', ev => showError(ev.error || ev.message));
window.addEventListener('unhandledrejection', ev => showError(ev.reason));
function save(key, val) { try { localStorage.setItem(STORAGE+key, JSON.stringify(val)); } catch(e) {} }
function load(key, fallback) { try { const v=localStorage.getItem(STORAGE+key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; } }
function shuffle(a) { a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function setScreen(name) { ['home','quiz','results'].forEach(id => $(id).classList.toggle('hidden', id!==name)); }
function safeText(el, text) { el.textContent = text == null ? '' : String(text); }
function getFails(ch) { return load('fails_'+ch.id, []); }
function renderHome() {
  const grid=$('chapterGrid'); grid.innerHTML='';
  chapters.forEach((ch,i)=>{
    const total = ch.questions?.length || 0; const prog=load('progress_'+ch.id, {answered:0,total}); const fails=getFails(ch);
    const pct = total ? Math.round((prog.answered||0)/total*100) : 0;
    const card=document.createElement('button'); card.type='button'; card.className='card';
    card.innerHTML = `<div class="num">Kafli ${i+1}</div><div class="title"></div><div class="sub"></div><div class="bar"><div class="fill" style="width:${pct}%"></div></div>${fails.length?`<span class="badge">${fails.length} mistök</span>`:''}`;
    safeText(card.querySelector('.title'), ch.title || ('Kafli '+(i+1)));
    safeText(card.querySelector('.sub'), `${ch.subtitle || ''} · ${total} spurningar · ${pct}% búið`);
    card.addEventListener('click', () => startChapter(i, false));
    grid.appendChild(card);
  });
}
function startChapter(i, onlyFails) {
  chIndex=i; cur=chapters[i]; if(!cur) throw new Error('Kafli fannst ekki: '+i);
  let qs = cur.questions || [];
  if (onlyFails) { const f = new Set(getFails(cur)); qs = qs.filter((_,n)=>f.has(n)); if(!qs.length) { alert('Engin mistök til að æfa!'); return; } }
  else qs = shuffle(qs);
  questions=qs; idx=0; answers=Array(qs.length).fill(null);
  safeText($('quizTitle'), cur.title || 'Kafli');
  setScreen('quiz'); renderQuestion();
}
function renderDots() {
  const d=$('dots'); d.innerHTML='';
  questions.forEach((_,i)=>{ const b=document.createElement('button'); b.type='button'; b.className='dot'+(i===idx?' current':'')+(answers[i]?' '+answers[i].state:''); b.textContent=i+1; b.disabled=!answers[i]&&i!==idx; b.addEventListener('click',()=>{idx=i;renderQuestion();}); d.appendChild(b); });
}
function renderQuestion() {
  const q=questions[idx]; if(!q) throw new Error('Engin spurning á index '+idx);
  renderDots(); safeText($('qNum'), `Spurning ${idx+1} af ${questions.length}`); safeText($('quizProg'), `${idx+1}/${questions.length}`);
  safeText($('src'), {K:'Kennaraspur.', AI:'AI', P:'Prófspurning'}[q.src] || q.src || ''); safeText($('qText'), q.q || '[Spurning vantar texta]');
  const chosen=answers[idx]; const opts=$('opts'); opts.innerHTML=''; const list=Array.isArray(q.opts)?q.opts:[];
  list.forEach((text,i)=>{ const b=document.createElement('button'); b.type='button'; b.className='opt'+(chosen?' disabled':''); if(chosen){ if(i===q.ans) b.classList.add(chosen.state==='correct'?'correct':'reveal'); if(chosen.picked===i && chosen.state!=='correct') b.classList.add('wrong'); } const l=document.createElement('span'); l.className='letter'; l.textContent=letters[i]||String(i+1); const t=document.createElement('span'); t.textContent=text; b.append(l,t); if(!chosen) b.addEventListener('click',()=>select(i)); opts.appendChild(b); });
  const fb=$('feedback'); fb.className=''; fb.innerHTML='';
  if(chosen) { fb.className='feedback '+(chosen.state==='correct'?'ok':'bad'); const correctLetter=letters[q.ans]||q.ans; fb.textContent = chosen.state==='correct' ? '✓ Rétt! ' : (chosen.state==='skipped' ? `— Rétt svar: ${correctLetter}. ` : `✗ Rangt — rétt svar: ${correctLetter}. `); const exp=document.createElement('div'); exp.style.marginTop='6px'; exp.textContent=q.exp || ''; fb.appendChild(exp); $('skipBtn').classList.add('hidden'); $('nextBtn').classList.remove('hidden'); }
  else { $('skipBtn').classList.remove('hidden'); $('nextBtn').classList.add('hidden'); }
}
function select(picked) { const q=questions[idx]; answers[idx]={state:picked===q.ans?'correct':'wrong', picked, correct:q.ans}; save('progress_'+cur.id, {answered:answers.filter(Boolean).length,total:questions.length}); renderQuestion(); }
function skip() { const q=questions[idx]; answers[idx]={state:'skipped', picked:-1, correct:q.ans}; save('progress_'+cur.id, {answered:answers.filter(Boolean).length,total:questions.length}); renderQuestion(); }
function next() { if(idx<questions.length-1) {idx++; renderQuestion();} else showResults(); }
function showResults() {
  const correct=answers.filter(a=>a?.state==='correct').length, wrong=answers.filter(a=>a?.state==='wrong').length, skipped=answers.filter(a=>a?.state==='skipped').length, total=questions.length;
  const failIdx=[]; answers.forEach((a,i)=>{ if(a && a.state!=='correct') { const oi=(cur.questions||[]).indexOf(questions[i]); if(oi>=0) failIdx.push(oi); } }); save('fails_'+cur.id, failIdx);
  safeText($('score'), Math.round(correct/total*100)+'%'); safeText($('resultLabel'), `${correct} af ${total} rétt — ${cur.title}`); safeText($('stCorrect'), correct); safeText($('stWrong'), wrong); safeText($('stSkipped'), skipped); $('retryFails').classList.toggle('hidden', failIdx.length===0);
  const fl=$('failList'); fl.innerHTML=''; answers.forEach((a,i)=>{ if(a && a.state!=='correct') { const q=questions[i]; const div=document.createElement('div'); div.className='failitem'; const main=document.createElement('div'); main.textContent=q.q; const corr=document.createElement('small'); corr.textContent=`✓ ${letters[q.ans]}: ${q.opts[q.ans]}`; div.append(main,corr); if(a.picked>=0){const wr=document.createElement('small'); wr.style.color='var(--red)'; wr.textContent=`✗ Þú valdir ${letters[a.picked]}: ${q.opts[a.picked]}`; div.appendChild(wr);} fl.appendChild(div); } });
  if(!fl.innerHTML) fl.innerHTML='<p class="muted">🎉 Engin mistök!</p>'; setScreen('results');
}
$('homeBtn').addEventListener('click',()=>{renderHome();setScreen('home');}); $('homeBtn2').addEventListener('click',()=>{renderHome();setScreen('home');}); $('skipBtn').addEventListener('click',skip); $('nextBtn').addEventListener('click',next); $('retryAll').addEventListener('click',()=>startChapter(chIndex,false)); $('retryFails').addEventListener('click',()=>startChapter(chIndex,true));
renderHome(); setScreen('home');
})();
</script>
