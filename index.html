<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8" />

<title>Hegðunar- og námsfræði — Spurningaapp FIXED</title>
<style>
:root { --bg:#0f0f13; --bg2:#1a1a22; --bg3:#23232f; --border:rgba(255,255,255,.10); --border2:rgba(255,255,255,.20); --text:#e8e8f0; --muted:#9696b8; --purple:#8b6be8; --purple-light:#b29aff; --green:#4ade80; --red:#f87171; --amber:#fbbf24; --green-dim:rgba(74,222,128,.14); --red-dim:rgba(248,113,113,.14); --amber-dim:rgba(251,191,36,.14); --purple-dim:rgba(139,107,232,.16); }
*{box-sizing:border-box} body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif} button{font:inherit}
.screen{max-width:820px;margin:0 auto;padding:24px 16px 56px} .hidden{display:none!important}
.header{text-align:center;padding:28px 0 22px} h1{font-size:1.65rem;color:var(--purple-light);margin:0 0 8px} .muted{color:var(--muted);font-size:.92rem}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px} @media(max-width:620px){.grid{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:.15s} .card:hover{background:var(--bg3);border-color:var(--purple)}
.card .num{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em} .card .title{font-size:1rem;font-weight:700;margin-top:5px;line-height:1.25} .card .sub{font-size:.82rem;color:var(--muted);margin-top:5px}
.bar{height:5px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:12px} .fill{height:100%;background:var(--purple)} .badge{display:inline-block;margin-top:10px;color:var(--red);background:var(--red-dim);border-radius:6px;padding:2px 7px;font-size:.72rem}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px} .back,.ghost,.primary,.skip{border-radius:10px;padding:10px 14px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text)} .back:hover,.ghost:hover{border-color:var(--border2)} .primary{background:var(--purple);border-color:var(--purple);color:white;font-weight:700} .skip{background:var(--amber-dim);border-color:rgba(251,191,36,.3);color:var(--amber);font-weight:700}
.quiz-title{font-weight:700;flex:1} .prog{color:var(--muted);font-size:.9rem}
.dots{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px} .dot{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer} .dot.current{border-color:var(--purple);color:var(--purple-light);background:var(--purple-dim)} .dot.correct{border-color:var(--green);color:var(--green);background:var(--green-dim)} .dot.wrong{border-color:var(--red);color:var(--red);background:var(--red-dim)} .dot.skipped{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px} .qmeta{display:flex;gap:8px;align-items:center;margin-bottom:12px} .qnum{font-size:.82rem;color:var(--muted)} .src{font-size:.7rem;border-radius:6px;padding:3px 8px;background:var(--purple-dim);color:var(--purple-light);font-weight:700} .qtext{font-size:1.08rem;line-height:1.55;font-weight:650}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:18px} .opt{border:1px solid var(--border);background:var(--bg3);border-radius:12px;padding:13px 14px;display:flex;gap:12px;text-align:left;cursor:pointer;color:var(--text)} .opt:hover{border-color:var(--border2)} .opt.disabled{cursor:default} .letter{font-weight:800;color:var(--muted);min-width:20px} .opt.correct{border-color:var(--green);background:var(--green-dim)} .opt.wrong{border-color:var(--red);background:var(--red-dim)} .opt.reveal{border-color:var(--green);background:rgba(74,222,128,.08)}
.feedback{border-radius:12px;padding:14px;margin-top:16px;line-height:1.5} .feedback.ok{border:1px solid rgba(74,222,128,.25);background:var(--green-dim)} .feedback.bad{border:1px solid rgba(248,113,113,.25);background:var(--red-dim)} .actions{display:flex;gap:10px;flex-wrap:wrap}
.results{text-align:center} .score{font-size:3rem;color:var(--purple-light);font-weight:900;margin-top:20px} .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:22px 0} .stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px} .stat strong{font-size:1.55rem;display:block} .failitem{text-align:left;background:var(--bg2);border:1px solid var(--red-dim);border-radius:12px;padding:14px;margin:10px 0} .failitem small{display:block;color:var(--green);margin-top:6px}
#error{position:fixed;inset:16px;z-index:9999;background:#1a0f13;border:1px solid var(--red);color:var(--text);border-radius:14px;padding:18px;overflow:auto} pre{white-space:pre-wrap;color:#ffd0d0}
</style>
</head>

<div id="home" class="screen"><div class="header"><h1>Hegðunar- og námsfræði</h1><div class="muted">Veldu kafla til að æfa — 259 spurningar á 12 köflum</div></div><div id="chapterGrid" class="grid"></div></div>

<script>
window.CHAPTERS = [{"id": "lykilhugtok", "title": "Lykilhugtök", "subtitle": "Grunnskilgreiningar", "questions": [{"q": "Hvað er styrkir (reinforcer)?", "opts": ["Atburður eða áreiti sem fylgir hegðun og eykur hana", "Atburður eða áreiti sem fylgir hegðun og minnkar hana", "Áreiti sem kemur á undan hegðun og ræður líkum á henni", "Breytileiki í umhverfi sem dregur úr áhrifum afleiðinga"], "ans": 0, "exp": "Styrkir er atburður eða áreiti sem fylgir hegðun og eykur tíðni eða líkur á endurtekningu hennar. Lykilatriðið er að skilgreining styrkis byggist á áhrifum hans á hegðun — ekki á því hvort við teljum hann þægilegan.", "src": "K"}, {"q": "Hvað eru styrkingarskilmálar (contingencies of reinforcement)?", "opts": ["Tíðni þess að styrkir birtist á tilteknum tímabili", "Sambandið á milli hegðunar og afleiðinga sem ráða líkum á endurtekningu hennar", "Fjöldi hegðana sem þarf til að styrkir fáist", "Hlutfall af styrki sem lífvera fær miðað við heildaratvik"], "ans": 1, "exp": "Styrkingarskilmálar lýsa sambandinu á milli hegðunar og afleiðinga hennar og ráða því hversu líklegt er að hegðunin endurtaki sig. Þeir geta verið jákvæðir eða neikvæðir og eru kjarni virkrar skilyrðingar.", "src": "K"}, {"q": "Hvað er virk hegðun (operant)?", "opts": ["Hegðun sem kemur sjálfkrafa við birtingu óskilyrts áreitis", "Hegðun sem er meðfædd og þarf ekki að læra", "Hegðun sem velst úr í samspili lífverunnar við umhverfi sitt vegna styrkingarskilmála", "Hegðun sem er stjórnað af taugakerfi án meðvitundar"], "ans": 2, "exp": "Virk hegðun er hegðun lífveru sem velst úr í samspili við umhverfi vegna styrkingarskilmála sem eru til staðar. Hún er gefin frá sér (emitted) frekar en framkölluð (elicited) eins og skyldræn hegðun.", "src": "K"}, {"q": "Hvað er flokkur virkrar hegðunar (operant class / response class)?", "opts": ["Einstök og nákvæmlega skilgreind hreyfing líkamans", "Öll hegðun sem lífvera lærir á sama tímabili", "Hegðun sem er eingöngu styrkt með matargjöf", "Mismunandi atferli sem getur verið yfirborðslega ólíkt en veldur sömu breytingu í umhverfinu"], "ans": 3, "exp": "Flokkur virkrar hegðunar samanstendur af mismunandi atferli sem getur verið yfirborðslega ólíkt en veldur svipaðri eða sömu breytingu í umhverfinu og stýrist af sömu greinireitum. Til dæmis getur kveikt verið á ljósi með því að ýta á rofa, nota rödd eða hlusta á skipun.", "src": "K"}, {"q": "Hvað er greinireiti (discriminative stimulus / SD)?", "opts": ["Áreiti sem parast við styrkingu og hefur áhrif á líkurnar á hegðun í návist þess", "Áreiti sem kemur á undan hegðun og framkallar hana sjálfkrafa", "Áreiti sem fylgir hegðun og eykur hana", "Áreiti sem kemur á eftir hegðun og minnkar hana"], "ans": 0, "exp": "Greinireiti er atburður eða áreiti sem parast við styrkingu eða styrkingaleysi hegðunar og hefur þannig áhrif á líkurnar á því að hegðun eigi sér stað í framtíðinni í návist þess. Greinireiti framkallar ekki hegðun heldur setur hana í gang (sets the occasion).", "src": "K"}, {"q": "Hvað er áreitisflokkur (stimulus class)?", "opts": ["Öll sjónræn áreiti sem lífvera getur greint", "Atburðir og áreiti sem geta verið ólík ásýndar en hafa sömu áhrif á hegðun", "Áreiti sem eru alltaf eins og berast alltaf saman", "Flokkur áreita sem eru skilgreind eingöngu af líkamlegum eiginleikum þeirra"], "ans": 1, "exp": "Áreitisflokkur samanstendur af atburðum og áreitum sem geta verið ólík ásýndar en hafa sömu áhrif á hegðun eða flokk virkrar hegðunar. Til dæmis eru öll rauð umferðarljós í sama áreitisflokki þó þau séu örlítið mismunandi að stærð og lit.", "src": "K"}, {"q": "Hvað er greinistyrking (differential reinforcement)?", "opts": ["Þegar styrkir er gefinn fyrir hverja hegðun án tillits til forms hennar", "Þegar styrking er gefin á breytilegum tímaháttum", "Þegar ein hegðun er styrkt umfram aðra meðan önnur er ekki styrkt eða styrkt minna", "Þegar sterkur styrkir er notaður til að mynda nýja hegðun"], "ans": 2, "exp": "Greinistyrking á sér stað þegar ein hegðun eða formgerð hegðunar er styrkt umfram aðra á meðan önnur er ekki styrkt eða er styrkt minna. Greinistyrking er undirstaða aðgreiningar og er notuð til að kenna lífverum að bregðast mismunandi við ólíkum áreitum.", "src": "K"}, {"q": "Hvað er aðgreining (discrimination) í hegðunarfræðilegum skilningi?", "opts": ["Þegar lífvera bregst við nýjum áreitum á sama hátt og þekktum áreitum", "Þegar hegðun minnkar smám saman vegna slokknunar", "Þegar lífvera lærir að tengja tvo hlutlæga atburði saman", "Þegar lífvera hagar sér á ólíkan hátt gagnvart mismunandi áreitum — útkoma greinistyrkingar"], "ans": 3, "exp": "Aðgreining á sér stað þegar lífvera hagar sér á ólíkan hátt gagnvart mismunandi áreitum eða atburðum, eða gagnvart sömu áreitum í ólíku samhengi. Hún er útkoma greinistyrkingar þar sem ein hegðun er styrkt í návist SD en ekki í návist S-delta.", "src": "K"}, {"q": "Hvað er alhæfing (generalization) í hegðunarfræðilegum skilningi?", "opts": ["Þegar hegðun sem hefur verið styrkt á sér stað í nýjum aðstæðum án viðbótarstyrkingar", "Þegar hegðun lærist eingöngu í þeim aðstæðum þar sem hún var styrkt", "Þegar styrkir hefur áhrif á fleiri en eina tegund hegðunar", "Þegar lífvera sýnir sömu hegðun gagnvart öllum áreitum"], "ans": 0, "exp": "Alhæfing á sér stað þegar hegðun sem hefur verið styrkt og hefur valist úr á sér stað í nýjum aðstæðum án viðbótarstyrkingar. Þetta er aðlögunarlegt ferli — lífvera þarf ekki að læra hegðun upp á nýtt í hverju samhengi.", "src": "K"}, {"q": "Hvað er viðbragð (elicited response)?", "opts": ["Viðbragð sem kemur fram vegna styrkingar í fortíðinni", "Viðbragð sem kemur sjálfkrafa og ósjálfrátt við birtingu óskilyrts áreitis", "Viðbragð sem er viljandi og meðvitað", "Viðbragð sem er lært í gegnum virka skilyrðingu"], "ans": 1, "exp": "Viðbragð kemur sjálfkrafa og ósjálfrátt við birtingu óskilyrts áreitis. Dæmi eru munnvatn við mat, augnbragð við ljós og hnjáliðsspark við högg. Þetta er kjarni skyldrænar hegðunar — ólíkt virkri hegðun sem er gefin frá sér.", "src": "K"}, {"q": "Hvað er hvataaðgerð (motivational operation)?", "opts": ["Aðferð til að kenna nýja hegðun með því að styrkja nálgun hennar", "Ferli þar sem styrkir er tekinn burtu til að minnka hegðun", "Breytting í umhverfi sem eykur áhrif þekkts styrkis og eykur líkurnar á hegðuninni sem leiðir til hans", "Áreiti sem setur hegðun í gang án þess að styrkja hana beint"], "ans": 2, "exp": "Hvataaðgerð er breytting í umhverfi sem 1) eykur áhrif þekkts styrkis og 2) eykur líkurnar á hegðuninni sem leiðir til þess styrkis. Hungur er dæmi — það eykur áhrif matar sem styrkis og eykur líkur á matsleitarhegðun.", "src": "K"}, {"q": "Hvað er slokknun (extinction) sem hegðunarferli?", "opts": ["Þegar hegðun hverfur alveg og kemur aldrei aftur", "Þegar styrkir er tekinn burtu sem refsing", "Þegar hegðun minnkar vegna þess að lífvera gleymist", "Þegar tíðni hegðunar verður eins og hún var á grunnskeiði eftir að styrkir fylgir henni ekki lengur"], "ans": 3, "exp": "Slokknun sem hegðunarferli á sér stað þegar tíðni hegðunar verður eins og hún var áður en hegðun var styrkt, þ.e. á grunnskeiði. Slokknun sem aðferð þýðir að styrkir fylgir ekki lengur hegðun. Munurinn á aðferð og ferli er mikilvægur.", "src": "K"}, {"q": "Hvað er viðnám við slokknun (resistance to extinction)?", "opts": ["Tíminn sem það tekur hegðun að komast á grunnskeiðsstig eftir að slokknun hefst", "Hve oft hegðun kemur fram á slokknunartímabili", "Styrkleiki hegðunar þegar hún er á hámarki", "Hlutfall af styrki sem þarf til að viðhalda hegðun"], "ans": 0, "exp": "Viðnám við slokknun er tíminn sem það tekur hegðun að komast á grunnskeiðsstig eftir að slokknun hefst, ásamt slokknunartoppum sem koma þar til hegðun hættir alveg. Hegðun sem hefur verið styrkt á hlutfallslegum háttum sýnir almennt meira viðnám.", "src": "K"}, {"q": "Hvað er slokknunartoppur (extinction burst)?", "opts": ["Minnkun á hegðun þegar styrkir er tekinn burtu", "Aukning á hegðun í mörgum víddum eftir að slokknun hefst", "Endurkoма hegðunar eftir langt hlé", "Hágildisviðbragð við mjög sterkum styrki"], "ans": 1, "exp": "Slokknunartoppur er aukning á hegðun eftir að slokknun hefst. Hún er mælanleg út frá ýmsum víddum — tíðni, lengd, styrk og breytileika í hegðun. Þetta er dæmigert fyrsta viðbragð við slokknun og er mikilvægt að gera foreldrum og kennurum ljóst.", "src": "K"}, {"q": "Hvað er neikvæð styrking (negative reinforcement)?", "opts": ["Þegar óþægilegt áreiti fylgir hegðun og hún minnkar", "Þegar styrkir er tekinn burtu og hegðun minnkar", "Þegar atburður hættir eða áreiti hverfur eftir hegðun og hún eykst", "Þegar hegðun er refsuð með niðurfellingu á góðum hlut"], "ans": 2, "exp": "Neikvæð styrking á sér stað þegar atburður hættir eða áreiti hverfur eftir tiltekna hegðun og hún eykst vegna þess. Hegðunin kallast flótti (escape) eða forðun (avoidance). Neikvæð styrking EYKUR hegðun — hún er styrking, ekki refsing.", "src": "K"}, {"q": "Hvað er fráreiti (aversive stimulus)?", "opts": ["Áreiti sem eykur virkni taugakerfisins án þess að vera óþægilegt", "Áreiti sem dregur úr líkum á hegðun með því að fylgja henni", "Áreiti sem er notað sem styrkir í neikvæðri skilyrðingu", "Atburður eða áreiti sem lífvera flýr frá eða forðast"], "ans": 3, "exp": "Fráreiti er atburður eða áreiti sem lífvera flýr frá eða forðast. Það getur verið frumstætt (t.d. sársauki) eða skilyrtt (t.d. hótun). Fráreitar eru grunnurinn að neikvæðri styrkingu, refsingu og forðunarhegðun.", "src": "K"}, {"q": "Hvað er neikvæð refsing (negative punishment)?", "opts": ["Þegar styrkir er tekinn burtu eftir hegðun og hún minnkar en eykst aftur ef styrkir kemur aftur", "Þegar óþægilegt áreiti fylgir hegðun og hún minnkar", "Þegar hegðun er hunsuð og minnkar vegna þess", "Þegar styrkir er gefinn í tengslum við hegðun sem við viljum minnka"], "ans": 0, "exp": "Neikvæð refsing á sér stað þegar styrkir er tekinn burtu eða hverfur eftir hegðun og hún minnkar. Ef styrkirinn birtist aftur þá eykst hegðunin á ný. Dæmi eru einangrun (time-out) og fjárhagsleg sekt (response cost).", "src": "K"}, {"q": "Hvað er jákvæð styrking (positive reinforcement)?", "opts": ["Þegar hegðun er lofsöng þótt hún minnki", "Þegar styrkir fylgir hegðun og hegðunin eykst", "Þegar légt frá óþægilegu ástandi fylgir hegðun", "Þegar hegðun er viðhaldið með hlutfallslegum tímaháttum"], "ans": 1, "exp": "Jákvæð styrking á sér stað þegar styrkir fylgir hegðun og hegðunin eykst í kjölfarið. Orðið 'jákvæð' þýðir að eitthvað er bætt við (added) — styrkir bætist við umhverfið. Þetta er ein af fjórum grundvallarskilmálum í hegðunarfræði.", "src": "K"}, {"q": "Hvað er jákvæð refsing (positive punishment)?", "opts": ["Þegar styrkir er tekinn burtu eftir hegðun", "Þegar hegðun er sniðgenginn til að hún minnki", "Þegar fráreiti fylgir hegðun og hegðunin minnkar", "Þegar lítill styrkir er notaður til að kenna flóknari hegðun"], "ans": 2, "exp": "Jákvæð refsing á sér stað þegar fráreiti fylgir hegðun og hegðunin minnkar. Orðið 'jákvæð' þýðir að eitthvað er bætt við — fráreiti bætist við umhverfið. Dæmi eru sársauki, hlutlæg óþægindi og niðurlæging.", "src": "K"}, {"q": "Hvað er styrkingarsnið eða styrkingarháttur (schedule of reinforcement)?", "opts": ["Tíðni þess að styrkir er gefinn á meðan lífvera lærir nýja hegðun", "Magn styrkis sem þarf til að viðhalda hegðun á ákveðnum hraða", "Hlutfall af hegðun sem er styrkt samanborið við heildarfjölda hegðana", "Regla sem segir til um hversu oft hegðun þarf að eiga sér stað eða hversu langur tími líður áður en hún leiðir til styrkis"], "ans": 3, "exp": "Styrkingarsnið eða styrkingarháttur segir til um hversu oft hegðun þarf að eiga sér stað eða hversu langur tími líður áður en hegðun leiðir til styrkis. Þeir fjórir grunnstyrkingarhættir eru: fastur hlutfallsháttur (FR), breytilegur hlutfallsháttur (VR), fastur tímaháttur (FI) og breytilegur tímaháttur (VI).", "src": "K"}, {"q": "Hvert er helsta munurinn á virkri hegðun (operant) og skyldrænu viðbragði (elicited response)?", "opts": ["Virk hegðun er gefin frá sér og valin út af afleiðingum; skyldrænt viðbragð er framkallað af áreiti", "Virk hegðun er meðfædd en skyldrænt viðbragð er lært", "Virk hegðun krefst meðvitundar en skyldrænt viðbragð gerist ómeðvitað", "Virk hegðun hefur alltaf jákvæðar afleiðingar en skyldrænt viðbragð hefur neikvæðar"], "ans": 0, "exp": "Virk hegðun er gefin frá sér (emitted) og valin út af afleiðingum hennar — hún eykst eða minnkar eftir styrkingarskilmálum. Skyldrænt viðbragð er framkallað (elicited) sjálfkrafa af áreiti. Þessi greinarmunur er grundvöllur hegðunarfræðinnar.", "src": "AI"}, {"q": "Hvernig tengist hvataaðgerð (motivational operation) greinireitum (discriminative stimuli)?", "opts": ["Greinireiti breyta gildi styrkis en hvataaðgerð setur hegðun í gang", "Hvataaðgerð og greinireiti eru það sama — bæði framkalla hegðun beint", "Báðar hafa áhrif á líkur hegðunar: hvataaðgerð breytir gildi styrkis; greinireiti setja hegðun í gang þar sem styrking er líkleg", "Hvataaðgerð hefur aðeins áhrif á skyldræna hegðun en greinireiti á virka hegðun"], "ans": 1, "exp": "Hvataaðgerð breytir gildi styrkis (t.d. hungur eykur gildi matar) og eykur tíðni hegðunar sem leiðir til þess styrkis. Greinireiti setja hegðun í gang í viðeigandi samhengi þar sem styrking er líkleg. Báðir hafa áhrif á líkur hegðunar án þess að framleiða hana beint.", "src": "AI"}, {"q": "Lífvera lærir að ýta á hnapp þegar grænt ljós er kveikt en ekki þegar rautt ljós er kveikt. Hvað heitir þetta ferli?", "opts": ["Slokknun (extinction)", "Greinistyrking (differential reinforcement)", "Alhæfing (generalization)", "Aðgreining (discrimination)"], "ans": 2, "exp": "Þetta er aðgreining — lífveran hagar sér á ólíkan hátt gagnvart mismunandi áreitum (grænt vs. rautt ljós). Aðgreining er útkoma greinistyrkingar þar sem ýting er styrkt þegar grænt ljós er kveikt (SD) en ekki þegar rautt ljós er kveikt (S-delta).", "src": "AI"}, {"q": "Barn lærir að biðja um ís í búð og gerir það sama í öðrum verslunum án þess að hafa verið styrkt þar. Hvað heitir þetta ferli?", "opts": ["Slokknun (extinction)", "Viðnám við slokknun (resistance to extinction)", "Alhæfing (generalization)", "Aðgreining (discrimination)"], "ans": 3, "exp": "Þetta er alhæfing — hegðunin (að biðja um ís) sem var styrkt í einni búð á sér stað í nýjum aðstæðum (aðrar verslanir) án þess að hafa verið styrkt þar sérstaklega. Alhæfing er aðlögunarlegt ferli sem sparar tíma og orku við nám.", "src": "AI"}]}, {"id": "grunnskilgreiningar", "title": "Grunnskilgreiningar og aðferðir", "subtitle": "Ch1 + Ch2", "questions": [{"q": "Hvað er hegðunargreining (behavior analysis) og hvernig er hún frábrugðin beittri hegðunargreiningu (applied behavior analysis)?", "opts": ["Hegðunargreining rannsakar grunnlög hegðunar í stýrðum aðstæðum; beitt er notkun þessara laga til að breyta hegðun í hagnýtum aðstæðum", "Hegðunargreining beitir hegðunarlögum á klínískar aðstæður; beitt rannsakar grunnlögin eingöngu í rannsóknarstofunni", "Hegðunargreining fjallar eingöngu um dýr; beitt hegðunargreining fjallar eingöngu um mannlega hegðun", "Hegðunargreining og beitt hegðunargreining eru það sama — munurinn er eingöngu í nafninu"], "ans": 0, "exp": "Hegðunargreining (behavior analysis) rannsakar grunnlög hegðunar — hvernig hegðun er valin, viðhaldið og breytt af umhverfislegum afleiðingum. Beitt hegðunargreining (applied behavior analysis) beitir þessum lögum til að breyta félagslega mikilvægri hegðun í hagnýtum aðstæðum.", "src": "K"}, {"q": "Hvað er tilraunagreining hegðunar (experimental analysis of behavior)?", "opts": ["Greining á hegðun með því að fylgjast með henni í náttúrulegum aðstæðum án afskipta", "Rannsóknarsvið sem greinir tengsl hegðunar og umhverfis í gegnum meðferðarskyld tilraunauppstillingar", "Kenningarleg nálgun sem skýrir hegðun út frá innri hugrænum ferlum", "Lyfjarannsóknir á hegðun með því að nota stjórnunarflokkana"], "ans": 1, "exp": "Tilraunagreining hegðunar (experimental analysis of behavior — EAB) er rannsóknarsvið sem greinir tengsl hegðunar og umhverfis með því að meðhöndla umhverfislegar breytur og mæla áhrif þeirra á hegðun. Skinner var brautryðjandinn í þessari nálgun.", "src": "K"}, {"q": "Hvernig skýrir val með afleiðingum (selection by consequences) hegðun á þremur stigum?", "opts": ["Náttúruval velur hegðun hópa, virkni skilyrðing velur genotýpu, menningarval velur hegðun einstaklings", "Náttúruval og virkni skilyrðing eru það sama ferli á ólíkum tímakvörðum", "Náttúruval velur genotýpu, virkni skilyrðing velur hegðun einstaklings, menningarval velur hegðunarmynstur hópa", "Val með afleiðingum á eingöngu við um dýr — mannleg hegðun er stjórnað af frjálsum vilja"], "ans": 2, "exp": "Val með afleiðingum (selection by consequences) á sér stað á þremur stigum: 1) náttúruval velur genotýpu (erfðafræðileg einkenni), 2) virkni skilyrðing velur hegðun einstaklings á líftíma hans, og 3) menningarval velur hegðunarmynstur og venjur hópa sem ganga í arv.", "src": "K"}, {"q": "Hvað er munurinn á beinni orsök (immediate causation) og fjarlægri orsök (remote causation) í hegðunarfræði?", "opts": ["Bein orsök vísar til meðvitaðra ákvarðana; fjarlæg orsök vísar til ómeðvitaðra ferla", "Bein orsök er alltaf lífeðlisfræðileg; fjarlæg orsök er alltaf umhverfisleg", "Þessar tvær orsakategundir eru alltaf óskyldur og þarf að rannsaka þær aðskilið", "Bein orsök vísar til tafarlausra lífeðlisfræðilegra og umhverfislegra aðstæðna; fjarlæg orsök vísar til sögulegra atburða og þróunar"], "ans": 3, "exp": "Bein orsök (immediate causation) vísar til tafarlausra aðstæðna sem útskýra hegðun — lífeðlisfræðileg eða umhverfisleg ferli sem gerast beint. Fjarlæg orsök (remote causation) vísar til sögulegra atburða og þróunarlegra ferla sem útskýra af hverju þessir beinir orsök eru til.", "src": "K"}, {"q": "Hvað er epigenetík og hvaða dæmi má gefa þar um í bjöllum?", "opts": ["Breyting á tjáningu gena án breytinga á DNA-röðinni sjálfri; í bjöllum ræður næringarfæði lirfna hvort þær verða drottningar eða vinnubýflugur", "Breytingar í DNA-röðinni vegna umhverfisþátta; í bjöllum breytist DNA-röðin eftir hitastig", "Erfðafræðileg einangrun tiltekinna stofna; í bjöllum aðskilur hér í mismunandi hlutverk", "Rannsókn á hegðun tvíbura til að greina erfðir frá umhverfi; bjöllur eru notaðar sem dæmi um erfðaveikt hegðun"], "ans": 0, "exp": "Epigenetík fjallar um breytingar á tjáningu gena án breytinga á DNA-röðinni sjálfri. Í bjöllum ræður næringarfæði lirfna hvort þær verða drottningarbjöllur eða vinnubjöllur — þrátt fyrir að hafa sömu DNA ræður mataræðið hvaða gen eru virkjuð.", "src": "K"}, {"q": "Hvers vegna hafnar hegðunarfræðin hugrænum skýringum eins og 'þetta gerðist vegna þess að hann vildi það'?", "opts": ["Hugrænar skýringar eru alltaf rangar — til eru engar innri hugsunanir eða tilfinningar", "Slíkar skýringar eru hringrök — þær nota hegðunina til að skýra sig sjálfar án óháðra gagna", "Hegðunarfræðin hafnar öllum skýringum sem eru ekki mælanlegarar á lífeðlisfræðilegu stigi", "Hugrænar skýringar eru of flóknar — hegðunarfræðin kýs einfaldari líkön af öllum ástæðum"], "ans": 1, "exp": "Hugrænar skýringar eins og 'hann gerði þetta vegna þess að hann vildi það' eru hringrök (circular reasoning) — við vitum að hann 'vildi' það eingöngu vegna þess að við sáum hann gera það. Þær bjóða ekki upp á óháð mælanleg gögn og spá ekki fyrir um hegðun í nýjum aðstæðum.", "src": "K"}, {"q": "Hvernig er Watson-Watson áreitisviðbrags-líkanið (S-R) frábrugðið valslíkani Skinners á virkri hegðun?", "opts": ["Watson sá hegðun sem valinn af afleiðingum; Skinner sá hegðun sem tafarlaus viðbrögð við áreiti", "Bæði líkönin eru í grundvallaratriðum eins — Skinner endurskipulagði Watson hugmyndirnar", "Watson sá hegðun sem tafarlaus viðbrögð við áreiti; Skinner sá hegðun sem valinn af afleiðingum hennar í umhverfinu", "Watson rannsóknaði eingöngu dýr en Skinner eingöngu menn"], "ans": 2, "exp": "Watson sá hegðun sem tafarlaus viðbrögð (R) við áreitum (S) — stjórnað og fyrirsjáanlegt. Skinner gerði greinarmun á skyldrænum viðbrögðum (sem fylgja S-R líkanu) og virkri hegðun sem er valinn af afleiðingum hennar — hegðun er gefin frá sér og valin af umhverfislegum skilyrðingum.", "src": "K"}, {"q": "Hvað er virknigreining (functional analysis) og hvernig er hún frábrugðin uppbyggingargreiningu (structural analysis)?", "opts": ["Virknigreining flokkar hegðun eftir útliti; uppbyggingargreining greinir eftir hlutverki í umhverfinu", "Virknigreining og uppbyggingargreining eru það sama — munurinn er eingöngu fræðilegur", "Virknigreining er notuð eingöngu á klínískar aðstæður; uppbyggingargreining er notuð í rannsóknum", "Virknigreining greinir hegðun eftir hlutverki hennar í umhverfinu; uppbyggingargreining flokkar hegðun eftir útliti hennar eða aldri"], "ans": 3, "exp": "Virknigreining (functional analysis) greinir hegðun eftir hlutverki hennar í tengslum við umhverfið — hvernig hún tengist áreiti og afleiðingum. Uppbyggingargreining (structural analysis) flokkar hegðun eftir yfirborðslegum einkennum eins og aldri eða útliti, án tillits til virkni.", "src": "K"}, {"q": "Hvað er stofnaðgerð (establishing operation / EO) samkvæmt Michael (1982)?", "opts": ["Umhverfisleg breyting sem eykur áhrifamátt tiltekins styrkis og eykur tíðni hegðunar sem leiðir til hans", "Aðferð til að kenna nýja hegðun með því að skipta henni upp í smærri þætti", "Áreiti sem framkallar hegðun beint án fyrirgengnar styrkingar", "Mæling á grundvallartíðni hegðunar áður en meðferð hefst"], "ans": 0, "exp": "Stofnaðgerð (establishing operation / EO) er umhverfisleg breyting sem hefur tvær helstu afleiðingar: 1) eykur áhrifamátt tiltekins styrkis og 2) eykur tíðni þeirrar hegðunar sem hefur leitt til þess styrkis í fortíðinni. Hungur er klassískt dæmi — það eykur gildi matar og tíðni matsleitarhegðunar.", "src": "K"}, {"q": "Hvað er eyðingaraðgerð (abolishing operation / AO) og hvernig er hún frábrugðin stofnaðgerð?", "opts": ["Eyðingaraðgerð eykur áhrifamætti styrkis; stofnaðgerð dregur úr honum", "Eyðingaraðgerð dregur úr áhrifamætti styrkis og minnkar tíðni tengdrar hegðunar; stofnaðgerð eykur þær báðar", "Eyðingaraðgerð og stofnaðgerð eru það sama ferli — munurinn er eingöngu í stigi", "Eyðingaraðgerð hefur aðeins áhrif á skyldræna hegðun; stofnaðgerð hefur aðeins áhrif á virka hegðun"], "ans": 1, "exp": "Eyðingaraðgerð (abolishing operation / AO) dregur úr áhrifamætti tiltekins styrkis og minnkar tíðni hegðunar sem leiðir til hans. Stofnaðgerð gerir þvert á móti — hún eykur áhrifamætti og tíðni. Mettur maður dregur úr gildi matar sem styrkis — þetta er eyðingaraðgerð.", "src": "K"}, {"q": "Hvað er A-B-A-B snúningsuppstilling (reversal design) í hegðunarrannsóknum?", "opts": ["Rannsóknaruppsetnig þar sem tveir hópar fá mismunandi meðferð á sama tíma", "Rannsóknaruppsetnig þar sem hegðun er mæld einungis á einu tímabili", "Rannsóknaruppsetnig þar sem grunnskeiðs- og meðferðarstigum er skipt á víxl til að sýna orsakatengsl milli breytna", "Rannsóknaruppsetnig þar sem þátttakendur skipta sjálfir um meðferðarskilyrði"], "ans": 2, "exp": "A-B-A-B snúningsuppstillingin er rannsóknaruppsetnig þar sem grunnskeiði (A) og meðferð (B) er skipt á víxl til að sýna að breyting í hegðun tengist meðferðinni. Þetta er grundvallaruppsetningin í hegðunarrannsóknum og sýnir orsakatengsl milli óháðrar og háðrar breytu.", "src": "K"}, {"q": "Hverjir eru þrír skilyrðar sem þarf að uppfylla til að sýna orsakatengsl milli breytna X og Y?", "opts": ["X og Y þurfa að berast alltaf saman, X þarf að vera mælanleg, og Y þarf að vera mælanleg", "X þarf að vera sterkari en Y, þær þurfa að berast saman, og rannsóknin þarf að vera endurtekinn", "X og Y þurfa að vera í náttúrulegum aðstæðum, þær þurfa að berast saman, og þátttakendur þurfa að vera margir", "X og Y þurfa að berast saman (covariation), X þarf að koma á undan Y (temporal order), og önnur skýring þarf að vera útilokuð (elimination of alternatives)"], "ans": 3, "exp": "Til að sýna orsakatengsl milli X og Y þarf: 1) fylgni (covariation) — X og Y breytast saman, 2) tímaröð (temporal order) — X kemur á undan Y, og 3) útilokun á öðrum skýringum (elimination of alternatives) — aðrar mögulegar ástæður eru útilokaðar með rannsóknaruppstillingunni.", "src": "K"}, {"q": "Hvað er einstaklingmiðuð rannsókn (single-subject research) og hvernig er hægt að alhæfa niðurstöður hennar?", "opts": ["Rannsókn þar sem einn einstaklingur er beinaðgerð við mismunandi skilyrði; alhæfing kemst með beinni og kerfisbundinni endurtekningu", "Rannsókn á einum einstaklingi sem er alltaf alhæfanleg á alla einstaklinga", "Rannsókn þar sem einn einstaklingur er notaður eingöngu til að búa til tilgátur", "Rannsókn þar sem aðeins ein breyting er gerð í hvert skipti án endurtekningar"], "ans": 0, "exp": "Einstaklingmiðuð rannsókn rannsakar einn einstakling eða fáa einstaklinga sem fara í gegnum mismunandi skilyrði. Alhæfing kemst ekki með tilviljunarkenndu úrtaki heldur með beinni endurtekningu (direct replication) á sama einstaklingi og kerfisbundinni endurtekningu (systematic replication) á öðrum einstaklingum og í öðrum aðstæðum.", "src": "K"}, {"q": "Hvað er stöðug grunnstig (steady-state performance) og af hverju er það mikilvægt í hegðunarrannsóknum?", "opts": ["Mynstur hegðunar á fyrstu dögum rannsóknar áður en lífvera lærir", "Stöðug mynstur hegðunar sem þróast við óbreytt skilyrði; það gefur skýran samanburðargrunn til að meta áhrif breytna", "Hæsta tíðni hegðunar sem lífvera nær á tilraunartímabili", "Hegðun sem breytist ekki við neinar aðstæður og er þess vegna gagnslaus sem mæling"], "ans": 1, "exp": "Stöðug grunnstig (steady-state performance) er stöðugt mynstur hegðunar sem þróast eftir langa útsetningu fyrir óbreyttum skilyrðum. Það er mikilvægt vegna þess að það gefur skýran og áreiðanlegan samanburðargrunn til að meta áhrif breytna. Án stöðugs grundvals er erfitt að meta hvort breyting sé vegna meðferðar.", "src": "K"}, {"q": "Hvað er grunnstig (baseline) og hvert er hlutverk þess í mati á hegðunarbreytingu?", "opts": ["Lægsta tíðni hegðunar sem mælist á öllum tímabilum rannsóknar", "Tímabil þar sem lífvera er þjálfuð til að sýna marklegðun á stöðugu stigi", "Mæling á hegðun áður en meðferð hefst; það gefur samanburðargrunn til að meta hvort meðferð olli breytingunni", "Mæling á hegðun eftir að meðferð hefst til að staðfesta að hún hafi áhrif"], "ans": 2, "exp": "Grunnstig (baseline) er mæling á hegðun áður en meðferð hefst. Það gefur samanburðargrunn — við berum saman hegðun á meðan meðferð er til staðar við hegðun á grunnskeiði til að meta hvort meðferðin olli breytingunni. Stöðugt grunnstig (e. baseline stability) er mikilvægt til að gefa skýran samanburð.", "src": "K"}, {"q": "Hvað er reflexi (reflex) í hegðunarfræðilegum skilningi?", "opts": ["Lært viðbragð sem kemur fram eftir endurteknar styrkingarnar", "Hegðun sem er bæði meðfædd og lært í jöfnum hlutföllum", "Viðbragð sem krefst meðvitundar og sjálfræðrar ákvarðanatöku", "Meðfætt, lífefnafræðilegt viðbragð við tilteknum áreitum sem hefur þróast vegna náttúruvalsins"], "ans": 3, "exp": "Reflexi er meðfætt, lífefnafræðilegt viðbragð við tilteknum áreitum sem hefur þróast vegna náttúruvalsins vegna verndarvildar. Reflexi eru dæmi um kynæðisfræðilega (phylogenetic) hegðun — hún er hluti af erfðafræðilegum búnaði lífverunnar, ekki lærð í gegnum reynslu.", "src": "AI"}, {"q": "Rannsókn sýnir að strákar fá hæstu einkunnir í stærðfræði þegar þeir fá meira af athygli kennara. Hvað er óháða breytan (independent variable) og hvað er háða breytan (dependent variable)?", "opts": ["Óháða breytan er athygli kennara; háða breytan eru einkunnirnar", "Óháða breytan eru einkunnirnar; háða breytan er athygli kennara", "Báðar eru háðar breytur — enginn stjórnar þeim", "Báðar eru óháðar breytur — þær breytast sjálfkrafa"], "ans": 0, "exp": "Óháða breytan (independent variable) er sú sem rannsakandinn stjórnar eða meðhöndlar — hér er það athygli kennara. Háða breytan (dependent variable) er sú sem er mæld og gæti breyst í kjölfar meðferðar — hér eru einkunnirnar. Við segjum 'breytan sem við breytum' og 'breytan sem við mælum'.", "src": "AI"}, {"q": "Hvað þýðir það að hegðun lífvera sé lögbundin og ákvarðaðri (lawful and deterministic)?", "opts": ["Hegðun er alltaf hin sama og breytist aldrei", "Hegðun fylgir kerfisbundnum tengslum við umhverfisaðstæður og er þess vegna fyrirsjáanleg og skýranleg", "Hegðun ræðst eingöngu af erfðum og er þess vegna óháð umhverfinu", "Hegðun er alltaf meðvituð og ráðlögð af einstaklingnum"], "ans": 1, "exp": "Að hegðun sé lögbundin og ákvarðaðri þýðir að hún fylgir kerfisbundnum tengslum við umhverfisaðstæður — hún er không handahófskennd heldur fyrirsjáanleg og skýranleg þegar við þekkjum umhverfisskilyrðin. Þetta er grundvallarforsenda hegðunarfræðinnar sem vísindagreinar.", "src": "AI"}, {"q": "Kennari tekur eftir að nemandi truflast oft í tíma. Hvað er fyrsti skrefurinn í virknigreiningu (functional analysis) á þessari hegðun?", "opts": ["Hefja strax meðferð til að draga úr truflunarhegðun", "Spyrja nemandann af hverju hann truflar", "Mæla tíðni truflunarhegðunar og bera kennsl á þær aðstæður þar sem hún á sér stað og þar sem hún á sér ekki stað", "Senda nemandann í sálfræðilegt mat"], "ans": 2, "exp": "Fyrsti skrefurinn í virknigreiningu er að mæla tíðni hegðunar og bera kennsl á þær aðstæður — antecedents og consequences — þar sem hún á sér stað og þar sem hún á sér ekki stað. Virknigreining svarar spurningunni: 'Hvaða virkni gegnir þessi hegðun?' — t.d. að fá athygli, forðast verkefni eða fá skynfræðilega örvun.", "src": "AI"}, {"q": "Hvað eru einkennandi einkenni áreiðanlegra mælinga (reliable measurement) í hegðunarrannsóknum?", "opts": ["Mælingarnar eru alltaf nákvæmlega þær sömu í hvert skipti sem hegðun er mæld", "Mælingarnar eru gerðar með flóknasta mælitækinu sem til er", "Mælingarnar eru alltaf gerðar á náttúrulegum aðstæðum, aldrei í rannsóknarstofunni", "Tvær eða fleiri óháðar mælingaraðilar eru sammála um að tiltekna hegðun hafi átt sér stað — samræmi í milli mæla (interobserver agreement)"], "ans": 3, "exp": "Áreiðanleiki mælinga í hegðunarrannsóknum er oft metinn með samræmi í milli mæla (interobserver agreement / IOA) — tveir eða fleiri óháðir mælingaraðilar eru sammála um hvort og hvenær tiltekin hegðun átti sér stað. Hátt IOA gefur til kynna að skilgreining á hegðuninni sé skýr og mælingarnar séu áreiðanlegar.", "src": "AI"}, {"q": "Hvernig er eðli einkennianna (nature of response topography) mikilvægt þegar við skilgreinum hegðun í rannsóknum?", "opts": ["Skilgreining á hegðun þarf að vera nákvæm og mælanleg svo að mismunandi mælingaraðilar geti komist að sömu niðurstöðu", "Hegðun þarf alltaf að vera skilgreind með vísun í innri hugsanaferla einstaklings", "Skilgreining þarf eingöngu að lýsa tilgangi hegðunar, ekki líkamlegu formi hennar", "Eðlilegar skilgreiningar á hegðun eru alltaf of þröngar og takmarkaðar"], "ans": 0, "exp": "Skilgreining á hegðun í rannsóknum þarf að vera nákvæm, skýr og mælanleg svo að mismunandi mælingaraðilar geti komist að sömu niðurstöðu — þetta tryggir trúverðugleika mælinga (reliability). Þrjár kröfur Kazdin fyrir góða hegðunarskilgreiningu eru: hún þarf að vera hlutlæg, skýr og heildstæð.", "src": "K"}, {"q": "Hvað er hlutfallslegar tíðnimæling (time sampling) og hvenær er hún notuð?", "opts": ["Mæling á hversu lengi hegðun varir í hvert skipti sem hún á sér stað", "Tímabundin skráning þar sem hegðun er mæld á tilteknum tímabilum en ekki samfellt; notuð þegar hegðun er of tíð til að skrá í hvert skipti", "Mæling á tíðni hegðunar á heilu degi án þess að skipta í minni tímabil", "Aðferð þar sem hegðun er mæld eingöngu þegar rannsakandi er viðstaddur"], "ans": 1, "exp": "Hlutfallsleg tíðnimæling (time sampling) er aðferð þar sem hegðun er mæld á tilteknum, skilgreindum tímabilum en ekki samfellt. Hún er sérstaklega gagnleg þegar hegðun er of tíð til að skrá hvert tilvik, eða þegar margar hegðanir þarf að fylgjast með samtímis.", "src": "K"}]}, {"id": "skyldraen", "title": "Skyldræn skilyrðing", "subtitle": "Ch3", "questions": [{"q": "Hvað er kynæðisfræðileg hegðun (phylogenetic behavior) og af hverju er hún oft ómeðlærð?", "opts": ["Hegðun sem hefur þróast í gegnum kynþróun vegna náttúruvalsins og gegnir hlutverki í lifun og fjölgun", "Hegðun sem er lærð á fyrstu vikum lífsins og er seinna staðfest", "Hegðun sem er eingöngu til hjá dýrum og hefur engin hliðstæður hjá mönnum", "Hegðun sem er ákvarðaðri af taugabyggingu og er óbreytileg"], "ans": 0, "exp": "Kynæðisfræðileg hegðun (phylogenetic behavior) er hegðun sem hefur þróast í gegnum náttúruval yfir kynþróunarsögu tegundarinnar. Hún er oft ómeðlærð vegna þess að hún hefur verið valin vegna náttúrulegrar verndarvildar — hún þjónaði líkams- og fjölgunarvildar forfeðranna.", "src": "K"}, {"q": "Hverjir eru þrír grundvallarlagar reflxanna (laws of the reflex)?", "opts": ["Lögmál nákvæmni, lögmál hraða og lögmál aukins styrk", "Lögmál styrkleika-viðbragðs, lögmál latenstíma og lögmál þversagnar", "Lögmál alhæfingar, lögmál mottun og lögmál aðgreiningar", "Lögmál þóf, lögmál aðlögunar og lögmál endurtekningar"], "ans": 1, "exp": "Þrír grundvallarlagarnir reflxanna eru: 1) lögmál styrkleika-viðbragðs (law of intensity-magnitude) — sterkara áreiti framkallar sterkara viðbragð, 2) lögmál latenstíma (law of latency) — sterkara áreiti framkallar hraðara viðbragð, og 3) lögmál þversagnar (law of threshold) — áreiti þarf að vera yfir lágmarksgildi til að framkalla viðbragð.", "src": "K"}, {"q": "Hvað er vanið (habituation) og hvaða dæmi má gefa?", "opts": ["Aukning á viðbragð við endurteknum áreitum; dæmi er óttinn sem eykst við hluti", "Þegar lífvera lærir að tengja tvö áreiti; dæmi er að fá munnvatn við mat", "Minnkun á styrk eða tíðni viðbragðs við endurtekningunni á áreiti; dæmi er að hætta að taka eftir tiktaki úrs", "Þegar hegðun minnkar vegna þess að styrkir er tekinn burtu"], "ans": 2, "exp": "Vanið (habituation) er minnkun á styrk eða tíðni viðbragðs við endurteknum áreitum. Þetta er einfaldasta form náms. Dæmi eru: að hætta að taka eftir tiktaki úrs á vegg, að venjast hávaða frá umferð, og að hætta að hreyfast við kunnuglegum hljóðum.", "src": "K"}, {"q": "Útskýrðu skyldræna skilyrðingu (respondent conditioning) með dæmi um orðið 'sítróna'.", "opts": ["Orðið 'sítróna' er óskilyrtur áreiti sem framkallar munnvatn sjálfkrafa", "Munnvatn við orðið 'sítróna' er dæmi um virka hegðun sem er styrkt", "Orðið 'sítróna' verður að greinireitum (SD) sem setur munnvatn í gang", "Hlutlægt hlutlægt hlutlægt hlutlægt hlutlægt hlutlægt hlutlægt"], "ans": 3, "exp": "Þegar við heyrum orðið 'sítróna' myndast oft munnvatn — þetta er dæmi um skyldræna skilyrðingu. Upphaflega er munnvatn (UR) óskilyrð viðbragð við bragð af sítrónu (US). Vegna þess að orðið hefur fylgt reynslunni af sítrónu margsinnis verður það skilyrtur áreiti (CS) sem framkallar skilyrtar munnvatnsmyndun (CR).", "src": "K"}, {"q": "Hvað er skilyrðið bragðviðbjóður (conditioned taste aversion / CTA) og hvað er skilyrðið staðarval (conditioned place preference / CPP)?", "opts": ["CTA er þegar lífvera forðast mat sem tengst er veikindi; CPP er þegar lífvera sækir í stað tengdan jákvæðri reynslu", "CTA er þegar lífvera sækir í mat sem tengst er veikindi; CPP er þegar lífvera forðast staði tengda jákvæðri reynslu", "CTA er þegar lífvera forðast allt mat eftir veikindi; CPP er þegar lífvera slakar á í tilteknum stað", "CTA og CPP eru bæði dæmi um virka skilyrðingu frekar en skylræna"], "ans": 0, "exp": "Skilyrðinn bragðviðbjóður (CTA) á sér stað þegar lífvera tengir bragð af mat við veikindi og forðast þar af leiðandi þetta mat í framtíðinni — þótt veikindi hafi komið tímum seinna. Skilyrðið staðarval (CPP) á sér stað þegar lífvera sækir í stað þar sem hún upplifði jákvæða reynslu (t.d. lyf).", "src": "K"}, {"q": "Hvað er skilmáli (contingency) í skyldrænum skilyrðingum og af hverju er hann mikilvægur?", "opts": ["Fjöldi skipta sem CS og US eru pöruð saman á þjálfunartíma", "Tölfræðileg tengsl milli CS og US — hversu vel CS spáir fyrir um US; hár skilmáli leiðir til sterkrar skilyrðingar", "Tímasetning CS miðað við US — hvort CS kemur á undan, samtímis eða á eftir US", "Styrkur US miðað við styrk CR sem þróast á þjálfunartíma"], "ans": 1, "exp": "Skilmáli (contingency) vísar til tölfræðilegra tengsla milli CS og US — hversu vel CS spáir fyrir um komu US. Rescorla (1968) sýndi að skilyrðing er ekki eingöngu vegna pörunar (contiguity) heldur vegna þess hvort CS gefur til kynna að US muni koma. Hár jákvæður skilmáli leiðir til sterkrar skilyrðingar.", "src": "K"}, {"q": "Lýstu yfirtökuferli (acquisition) í skyldrænum skilyrðingum. Hvað ákvarðar topppunkt (asymptote) ferilsins?", "opts": ["CR þróast tafarlaust í fullum styrk við fyrstu pöruna CS og US", "CR þróast stig af stigi en nær aldrei hámarki", "CR eykst smám saman yfir endurteknar pöranir og nær hámarki sem ákvarðast af styrk US", "CR eykst fyrst, minnkar svo og stabilizes á miðgildi"], "ans": 2, "exp": "Yfirtaka (acquisition) í skyldrænum skilyrðingum er ferli þar sem CR eykst smám saman yfir endurteknar pöranir CS og US. Ferillinn er venjulega S-löguðum (sigmoidal). Topppunkturinn (asymptote) — hámark CR — ákvarðast af styrk US: sterkari US leiðir til hærra topps.", "src": "K"}, {"q": "Hvernig er CS-CR samband frábrugðið US-UR sambandinu?", "opts": ["CR og UR eru alltaf eins — skilyrðing afritar óskilyrta viðbragðið nákvæmlega", "CR er alltaf sterkari en UR þar sem lífvera lærir að bregðast sterkara við", "CS-CR og US-UR sambönd fylgja sömu lögmálum og eru þess vegna samjafnvirk", "CR er oft veikari og öðruvísi en UR; CR getur jafnvel verið andstæð UR við sum áreiti eins og lyf"], "ans": 3, "exp": "CS-CR samband fylgir ekki sömu lögmálum og US-UR samband. CR er oft veikari í styrk en UR og getur verið öðruvísi eðlislægt (topography). Við lyfjagjöf getur CR jafnvel verið andstæð UR (compensatory response) — líkaminn undirbýr sig á móti lyfjaáhrifunum.", "src": "K"}, {"q": "Hvað er skyldræn slokknun (respondent extinction) sem aðferð og sem ferli?", "opts": ["Sem aðferð: US fylgir ekki CS lengur; sem ferli: CR minnkar smám saman og hverur", "Sem aðferð: CS er fjarlægt; sem ferli: UR minnkar", "Sem aðferð: US er styrktur; sem ferli: CS verður sterkara", "Sem aðferð og ferli eru þetta sama hluturinn — engin munur er gerður"], "ans": 0, "exp": "Skyldræn slokknun sem aðferð: CS er framkvæmd án þess að US fylgi — skilyrðið áreiti er birt án óskilyrðs. Sem ferli: CR minnkar smám saman þegar CS kemur endurtekið fram án US. Mikilvægt er að greina á milli þessara tveggja þátta — aðferðin er það sem við gerum, ferlið er það sem gerist í hegðun.", "src": "K"}, {"q": "Hvað er sjálfvirk endurkoma (spontaneous recovery) í skyldrænum skilyrðingum?", "opts": ["CR eykst smám saman þegar CS og US eru pöruð aftur eftir slokknun", "CR kemur aftur fram í veikara formi eftir hvíldartíma eftir slokknun — þrátt fyrir að US hafi ekki fylgt CS", "CR hverfur alveg eftir slokknun og kemur aldrei aftur", "CR kemur aftur fram í fullum styrk við endurpöruna CS og US"], "ans": 1, "exp": "Sjálfvirk endurkoma (spontaneous recovery) á sér stað þegar CR kemur aftur fram í veikara formi eftir hvíldartíma eftir slokknun, án þess að CS og US hafi verið pöruð á ný. Þetta bendir til þess að slokknun feli í sér nýtt nám (inhibition) frekar en að CSR-tengslin hafi verið þurrkuð út.", "src": "K"}, {"q": "Hvað er skyldræn alhæfing (respondent generalization) og skyldræn aðgreining (respondent discrimination)?", "opts": ["Alhæfing: CR kemur aðeins fram við upprunalega CS; aðgreining: CR kemur fram við öll áreiti", "Alhæfing og aðgreining eru það sama ferli — munurinn er eingöngu fræðilegur", "Alhæfing: CR kemur fram við áreiti sem likjast CS; aðgreining: CR kemur aðeins fram við upprunalega CS en ekki við önnur áreiti", "Alhæfing: UR eykst; aðgreining: CR minnkar"], "ans": 2, "exp": "Skyldræn alhæfing: CR kemur fram við áreiti sem likjast CS, þó þau hafi aldrei verið pöruð við US. Þetta er aðlögunarlegt — við þurfum ekki að læra aftur í nýjum aðstæðum sem líkjast upprunalegu aðstæðunum. Skyldræn aðgreining: með þjálfun kemur CR aðeins fram við upprunalega CS en ekki við svipuð áreiti.", "src": "K"}, {"q": "Berðu saman seinaðrar (delayed), samtímis (simultaneous), snerti (trace) og bakstæðrar (backward) skilyrðingar.", "opts": ["Seinuð: US kemur á undan CS; samtímis: CS og US byrja saman; snerti: CS og US skarast; bakstæð: CS kemur á undan US", "Seinuð er áhrifaríkust; samtímis er næst best; snerti er veikust; bakstæð er ómöguleg", "Allar fjórar gerðirnar eru jafn áhrifaríkar ef pörunarfjöldi er sá sami", "Seinuð: CS kemur á undan US og skarast við það; samtímis: CS og US byrja saman; snerti: CS lýkur áður en US byrjar; bakstæð: US kemur á undan CS"], "ans": 3, "exp": "Seinuð (delayed): CS kemur á undan US og þær skarast — CS er enn til staðar þegar US kemur. Samtímis (simultaneous): CS og US byrja og enda saman. Snerti (trace): CS byrjar og lýkur áður en US byrjar — hlé á milli þeirra. Bakstæð (backward): US kemur á undan CS. Seinuð skilyrðing er venjulega áhrifaríkust.", "src": "K"}, {"q": "Hvað er annars stigs skyldræn skilyrðing (second-order respondent conditioning) og af hverju er hún mikilvæg?", "opts": ["CS1 verður US fyrir CS2 — nýtt áreiti (CS2) er pörað við þegar skilyrtan CS1 og fær skilyrðingaráhrif; útskýrir hvernig skilyrðing dreifist í flóknum umhverfum", "CS1 og CS2 eru pöruð samtímis við sama US — þetta er áhrifaríkara en hefðbundin skilyrðing", "CS1 hverur eftir annars stigs skilyrðingu og CS2 tekur yfir virkni hans", "Annars stigs skilyrðing krefst mjög sterks US og er þess vegna sjaldgæf í náttúrunni"], "ans": 0, "exp": "Í annars stigs skyldrænum skilyrðingum verður upprunalegi CS1 (sem þegar hefur verið skilyrtur) að US fyrir nýtt áreiti CS2. CS2 fær skilyrðingaráhrif án þess að nokkru sinni vera pörað við upprunalega US. Þetta er mikilvægt því það útskýrir hvernig skilyrðing getur dreifst langt frá upprunalega US í flóknum umhverfum.", "src": "K"}, {"q": "Hvernig skýrir skyldræn skilyrðing lyfjaþol (drug tolerance) og ofskömmtun (drug overdose)?", "opts": ["Lyfjaþol þróast vegna þess að líkaminn venst lyfið og þarf meira til að ná sömu áhrifum", "Umhverfisáreiti tengd lyfjagjöf verða CS sem framkalla andstæð (compensatory) viðbrögð fyrir lyfjaáhrifin — í nýjum aðstæðum vantar þessi viðbrögð", "Ofskömmtun verður þegar einstaklingur tekur of margt af lyfi án tengingar við umhverfi", "Skyldræn skilyrðing hefur engin áhrif á lyfjaþol — það er eingöngu lífeðlisfræðilegt ferli"], "ans": 1, "exp": "Umhverfisáreiti tengd lyfjagjöf (t.d. sprautur, herbergi) verða CS sem framkalla andstæð (compensatory) viðbrögð sem ganga gegn lyfjaáhrifunum — þetta er lyfjaþolið. Ef lyf er tekið í nýjum aðstæðum (nýr CS) koma þessi andstæðu viðbrögð ekki fram og áhrif lyfsins eru sterkari — hætta á ofskömmtun.", "src": "K"}, {"q": "Hvað er hömlun (blocking) og skuggvarp (overshadowing) í skyldrænum skilyrðingum?", "opts": ["Hömlun: nýtt CS lærir lítið þegar það er bætt við þegar skilyrtan CS; skuggvarp: sterkara áreiti í samsettum CS dregur úr skilyrðingu veikara áreitis", "Hömlun: sterkara áreiti í samsettum CS eykur skilyrðingu veikara; skuggvarp: þegar þegar", "Hömlun: þegar þegar þegar þegar þegar þegar þegar", "Hömlun og skuggvarp eru það sama fyrirbæri en með mismunandi orsökum"], "ans": 2, "exp": "Hömlun (blocking): þegar CS1 hefur verið skilyrtur og CS2 er síðan bætt við pörunina við US, lærir CS2 lítið eða ekkert — CS1 hindrar CS2 í að öðlast skilyrðingargildi. Skuggvarp (overshadowing): þegar tvær CS eru birtar samtímis, dregur sterkara eða áberandi áreitið úr skilyrðingu hins veikara.", "src": "K"}, {"q": "Hvað er Rescorla-Wagner líkanið og hvert er grundvallarhugtak þess?", "opts": ["Líkan sem gerir ráð fyrir að styrkur tengsla aukist hlutfallslega við hverja pöruna óháð fyrri lærðum", "Líkan sem skýrir aðeins lyfjaþol og fjallar ekki um aðrar gerðir skilyrðingar", "Líkan sem gerir ráð fyrir að skilyrðing sé eingöngu háð fjölda pöringa en ekki tímasetningu", "Stærðfræðilegt líkan sem gerir ráð fyrir að styrkur CS-US tengla vaxi minna þegar nálgast er hámark þess sem hægt er að læra — skilyrðing er háð uppgreiðslugetu (surprise)"], "ans": 3, "exp": "Rescorla-Wagner líkanið er stærðfræðilegt líkan sem gerir ráð fyrir að breytingin á styrk CS-US tengla (ΔV) sé hlutfallsleg við mismun á milli hámarksgildi sem US getur stuðlað að (λ) og summu allra núverandi tenglagildi (ΣV). Lykilhugtak er 'uppgreiðsla' (surprise) — skilyrðing á sér aðeins stað þegar US er óvænt.", "src": "K"}, {"q": "Hvað eru samsett áreiti (compound stimuli) og hvernig víkkar skyldræn skilyrðing þeirra út grundvallarreglurnar?", "opts": ["Tveir eða fleiri CS birtar samtímis; skilyrðing við samsett áreiti víkkar reglurnar til að skýra flóknari umhverfi eins og veitingastaðar þar sem margar vísbendingar tengjast matarupplifun", "Tveir eða fleiri US birtir samtímis til að styrkja CR", "Samsett áreiti eru alltaf áhrifaríkari en einstök áreiti", "Samsett áreiti koma aðeins fram í rannsóknarstofunni, ekki í náttúrulegum aðstæðum"], "ans": 0, "exp": "Samsett áreiti (compound stimuli) eru tvær eða fleiri CS sem eru birtar samtímis. Skilyrðing við samsett áreiti víkkar grundvallarreglurnar — við getum skilið hvernig margar vísbendingar í umhverfinu (t.d. lykt, útlit og hljóð á veitingastað) geta öll orðið tengdar matarupplifun.", "src": "K"}, {"q": "Rannsakandi lætur rotta líða af ljósi (CS) og rafskoti (US). Hvað er óskilyrtt viðbragð (UR) og hvað er skilyrtt viðbragð (CR) í þessum tilraun?", "opts": ["UR er hræðsla við ljósið; CR er sársaukinn við rafskotið", "UR er sársaukinn og brettingur við rafskotið; CR er hræðsla og niðurþrýstingur við ljósið", "UR er ljósið; CR er rafskotið", "UR og CR eru það sama — skilyrðing afritar óskilyrta viðbragðið nákvæmlega"], "ans": 1, "exp": "Óskilyrtt viðbragð (UR) er tafarlaust, meðfætt viðbragð við óskilyrta áreiti (US): sársaukinn og brettingur við rafskotið. Skilyrtt viðbragð (CR) þróast við skilyrta áreiti (CS): hræðsla, niðurþrýstingur og hlaupaviðbragð við ljósið — þær þróast eftir pöranir. CR er oft líkur UR en getur verið öðruvísi.", "src": "AI"}, {"q": "Hvað er baktæ skilyrðing (backward conditioning) og hvenær getur hún gengið upp?", "opts": ["CS kemur á undan US; þetta er áhrifaríkasta tegund skilyrðingar", "CS og US koma samtímis; þetta er áhrifaríkara en seinuð skilyrðing", "US kemur á undan CS; venjulega gefur þetta lítil skilyrðingaráhrif nema CS sé líffræðilega marktækt", "US og CS koma aldrei samtímis — þetta er grundvallarregla skyldrænar skilyrðingar"], "ans": 2, "exp": "Baktæ skilyrðing (backward conditioning) á sér stað þegar US kemur á undan CS — þ.e. óskilyrtt áreiti kemur þegar skilyrtt áreiti. Venjulega gefur þetta lítil eða engin skilyrðingaráhrif. Eins og Timberlake og önnur sýndu, getur baktæ skilyrðing gengið upp þegar CS er líffræðilega marktækt — t.d. bragð tengt veikindi.", "src": "AI"}, {"q": "Maðurinn Ísak fékk matareitrun eftir að hafa borðað sjávarrétti. Í næstu vitjun fær hann munnvatn við lykt af sjávarrétti. Hvaða ferli lýsir þessu?", "opts": ["Virk skilyrðing þar sem að borða sjávarrétti er styrkt með veikindi", "Slokknun þar sem lykt af mat framkallar viðbragð vegna þess að matur er tekinn burtu", "Alhæfing þar sem hegðun við sjávarrétt alhæfist yfir á aðrar matartegundir", "Skyldræn skilyrðing þar sem lykt af sjávarrétti (CS) er pöruð við veikindi (US) og framkallar munnvatn (CR)"], "ans": 3, "exp": "Þetta er skyldræn skilyrðing — lykt af sjávarrétti (CS) var pöruð við veikindi (US) og framkallar nú munnvatn og tengda líkamleg viðbrögð (CR). Þetta er líffræðilega marktækt dæmi um skilyrðtan bragðviðbjóð (CTA) þar sem eitt par af CS-US getur gefið sterka skilyrðingu.", "src": "AI"}, {"q": "Þegar önn lýkur og þú ferð í frí, kemst þú svo aftur í skólann og finnur kvíða sem þú fannst ekki í leyfi. Hvaða fyrirbæri í skyldrænum skilyrðingum útskýrir þetta?", "opts": ["Samhengileg endurkoма (renewal) — þegar CR kemur aftur fram í upprunalegu samhengi eftir slokknun í öðru samhengi", "Sjálfvirk endurkoma (spontaneous recovery) — CR kemur aftur fram eftir hvíld", "Hömlun (blocking) — nýtt samhengi hindrar CR frá að koma fram", "Samsett áreiti — skólinn og frít eru CS sem keppast um sama CR"], "ans": 0, "exp": "Þetta er samhengileg endurkoма (renewal) — CR sem var slökkuð í einu samhengi (frí) kemur aftur fram þegar upprunalegt samhengi (skóli) er upplifað. Slokknun er samhengissértæk — hún hefur ekki þurrkað út upprunalegu CS-CR tengslin, heldur hefur lífveran lært að CR á ekki við í slokknunarsamhenginu.", "src": "AI"}]}, {"id": "virkstyrking", "title": "Virk styrking og slokknun", "subtitle": "Ch4", "questions": [{"q": "Hvað er þriggja þáttta skilmáli (three-term contingency) í virkri skilyrðingu?", "opts": ["SD → R → Sr: greinireiti setur sér stað fyrir hegðun, hegðun verður, styrkir fylgir", "R → Sr: hegðun verður og styrkir fylgir án greinireitisins", "SR: áreiti framkallar hegðun beint", "SD → Sr: greinireiti leiðir beint til styrkis án hegðunar"], "ans": 0, "exp": "Þriggja þáttta skilmálinn (three-term contingency) er grundvöllur virkrar hegðunar: SD (greinireiti) setur sér stað fyrir hegðun, R (hegðun/virki) er gefin frá sér, og Sr (styrkir) fylgir hegðuninni. Greinireitirinn ræður líkum á hegðun en framkallar hana ekki beint.", "src": "K"}, {"q": "Hvað er Premack-reglan og hvernig hjálpar hún okkur að bera kennsl á styrki?", "opts": ["Styrkir þarf alltaf að vera matur eða peningar — aðrar hlutir geta ekki verið styrkar", "Hegðun með hærri líkum (meira óskilyrt) getur styrkt hegðun með lægri líkum; þetta hjálpar okkur að bera kennsl á styrki út frá tíðni hegðunar", "Hegðun með lægri líkum styrktir hegðun með hærri líkum — við þurfum að notfæra okkur minni vinsælar hegðanir", "Premack-reglan gildir eingöngu um dýr í rannsóknarstofunni"], "ans": 1, "exp": "Premack-reglan: hegðun með hærri frjálsri tíðni (sem lífvera gerir meira af þegar frjálst er) getur styrkt hegðun með lægri tíðni. Þetta þýðir að hvað sem er getur verið styrkir — það fer eftir hlutfallslegri tíðni. Þetta hjálpar okkur að bera kennsl á styrki í hagnýtum aðstæðum.", "src": "K"}, {"q": "Hvað er mótun (shaping) og hvernig notar hún breytileika í hegðun?", "opts": ["Beinn kennsla á nýja hegðun með því að sýna hana og endurtaka", "Niðurfærsla á tíðni hegðunar með því að styrkja aðra hegðun", "Kerfisbundin notkun greinistyrkingar til að þróa nýja hegðun smám saman með því að styrkja nálganir að markmiðshegðun", "Bein styrking á markmiðshegðun strax frá upphafi án millistigsins"], "ans": 2, "exp": "Mótun (shaping) er kerfisbundin notkun greinistyrkingar til að þróa nýja hegðun smám saman. Við styrkjum fyrst hegðun sem líkist markmiðshegðun, síðan krefumst við meira og meira nákvæmni. Breytileiki í hegðun (behavioral variability) er nauðsynlegur — án breytileika er ekkert að velja úr.", "src": "K"}, {"q": "Hvað er virkt grunnstig (operant level) og hvernig tengist það mótun?", "opts": ["Hæsta tíðni hegðunar sem hægt er að ná með styrkingu", "Stig virkrar hegðunar þegar lífvera er full og styrkir hefur lítil áhrif", "Lágmarkstíðni hegðunar sem þarf til að styrkingarháttur hafi áhrif", "Tíðni hegðunar áður en hún er styrkt — þetta er upphafsstaðan sem mótun þróast úr"], "ans": 3, "exp": "Virkt grunnstig (operant level) er tíðni hegðunar áður en hún er nokkru sinni styrkt — þetta er náttúruleg tíðni hegðunar án áhrifa af styrkingarskilmálum. Mótun þarf að byrja þar sem lífvera er — við styrkjum hegðun sem líkist markmiðinu sem kemur for af sjálfu sér á grunnskeiðinu.", "src": "K"}, {"q": "Hvað gerist við hegðun á slokknunartímabili (extinction)? Hvaða fjórar breytingar eiga sér stað?", "opts": ["Tíðni eykst (slokknunartoppur), kraftur eykst, breytileiki eykst, og tilfinningaleg viðbrögð koma fram", "Tíðni minnkar strax og jafnt, kraftur minnkar, breytileiki minnkar, tilfinningar koma ekki fram", "Tíðni heldur sig stöðug í langan tíma og minnkar svo snögglega", "Hegðun hverfur alveg á fyrsta degi slokknunar án slokknunartopps"], "ans": 0, "exp": "Á slokknunartímabili eiga sér stað fjórar breytingar: 1) slokknunartoppur — tíðni eykst tímabundið, 2) aukin kraftur — sterkari og lengri hegðun, 3) aukinn breytileiki — lífvera prófar nýjar hegðanir, og 4) tilfinningaleg viðbrögð — pirringur og frjálsleg hegðun koma fram. Þetta hefur þróunarlegt gildi.", "src": "K"}, {"q": "Hvað er hlutfallsleg styrkingaráhrif (partial reinforcement effect / PRE)?", "opts": ["Hegðun sem er styrkt við hvert tilfelli tekur lengri tíma að slökkva en hegðun styrkt hlutfallslega", "Hegðun sem hefur verið styrkt á hlutfallslegum háttum tekur lengri tíma að slökkva en hegðun styrkt á CRF", "Slokknun á hlutfallslegum hætti er hraðari en slokknun á samfelldum hætti", "Hlutfallsleg styrking og CRF leiða til sömu viðnáms gegn slokknun"], "ans": 1, "exp": "Hlutfallsleg styrkingaráhrif (PRE): hegðun sem hefur verið styrkt hlutfallslega (intermittent reinforcement) — þ.e. ekki við hvert tilfelli — sýnir meira viðnám gegn slokknun en hegðun sem hefur verið styrkt við hvert tilfelli (CRF). Þetta skýrist m.a. af þeirri staðreynd að lífvera kann ekki að greina á milli slokknunar og hlutfallslegrar styrkingar.", "src": "K"}, {"q": "Hvað er sjálfvirk endurkoma (spontaneous recovery) í virkri skilyrðingu?", "opts": ["Hegðun kemur aftur fram í fullum styrk þegar styrkir er gefinn aftur", "Hegðun þróast upp á nýtt í nýjum aðstæðum án sögulegrar styrkingar", "Hegðun sem var slökkuð kemur aftur fram í minni styrk eftir hvíldartíma — án þess að hafa verið styrkt á ný", "Hegðun kemur aftur fram þegar lífvera kemur aftur í upprunalegar aðstæður"], "ans": 2, "exp": "Sjálfvirk endurkoma (spontaneous recovery): hegðun sem var slökkuð kemur aftur fram með minni styrk eftir hvíldartíma — þótt styrkir hafi ekki verið gefinn á hvíldartímanum. Þetta sýnir að slokknun hefur ekki þurrkað út hegðunina heldur leggst yfir hana. Hegðunin sloknar aftur hraðar en í fyrsta sinn.", "src": "K"}, {"q": "Hvað er endurreisn (reinstatement) og endurnýjun (renewal)?", "opts": ["Endurreisn og endurnýjun eru það sama — bæðar þýða að hegðun kemur aftur", "Endurreisn: hegðun kemur aftur eftir sjálfvirka endurkomu; endurnýjun: hegðun þróast upp á nýtt", "Endurreisn: lyfjaáhrif endurnýjast; endurnýjun: umhverfisleg vísbendingar endurnýjast", "Endurreisn: hegðun kemur aftur þegar US/frumstígur styrkir er gefinn eftir slokknun; endurnýjun: slökkuð hegðun kemur aftur þegar lífvera er sett aftur í upprunalegt samhengi"], "ans": 3, "exp": "Endurreisn (reinstatement): slökkuð hegðun kemur aftur fram þegar upprunalegi styrkir (eða hluti af upprunalegu aðstæðunum) er gefinn eftir slokknun — jafnvel á slokknunarstaðnum. Endurnýjun (renewal): slökkuð hegðun kemur aftur þegar lífvera er flutt aftur í upprunalegt samhengi þar sem hegðun var upprunalega styrkt. Þetta hefur mikilvægar hagnýtar afleiðingar varðandi meðferð á fíkn.", "src": "K"}, {"q": "Hvað er munurinn á gleymsku (forgetting) og slokknun (extinction) samkvæmt tilraun Skinners (1938)?", "opts": ["Gleymska er tímaháð minnkun án slokknunarmeðferðar; Skinner sýndi að slökkuð hegðun er ekki gleymt heldur þverrað", "Gleymska og slokknun eru það sama — bæðar þýða að hegðun tíðni minnkar", "Gleymska er hraðari en slokknun í öllum tilvikum", "Gleymska á eingöngu við um mannlega hegðun; slokknun á við um öll dýr"], "ans": 0, "exp": "Skinner sýndi að gleymska (forgetting) er mismunandi frá slokknun: gleymska er tímaháð minnkun á hegðun sem hefur verið styrkt, án slokknunarmeðferðar. Slokknun krefst þess að hegðun sé beint framkvæmd án styrkis. Skinner setti dýr í svar við prófaði eftir hvíld og fann að styrkt hegðun er lítið gleymast.", "src": "K"}, {"q": "Hvað er aðgreind slokknun (discriminated extinction) og hvernig tengist hún S-delta (S∆)?", "opts": ["Slokknun þar sem við notum aðskilin slokknunarskilyrði fyrir hverja tegund hegðunar", "Hegðun sloknar í nærveru tiltekins áreitis (S∆) sem hefur aldrei fylgt styrkir — þetta er grunnurinn að aðgreiningu", "Þegar hegðun sloknar vegna þess að greinireiti er tekinn burtu", "Þegar lífvera lærir að framkvæma hegðun aðeins í návist styrkis"], "ans": 1, "exp": "Aðgreind slokknun (discriminated extinction) á sér stað þegar hegðun sloknar í návist tiltekins áreitis (S∆ — S-delta) sem hefur aldrei fylgt styrkir. S∆ er áreiti sem spáir fyrir um styrkingaleysi. Þetta er grundvöllur aðgreiningar — lífvera lærir að hegðast á ólíkan hátt í návist SD (styrkir líklegur) og S∆ (styrkir ólíklegur).", "src": "K"}, {"q": "Hvað er samfellt styrkingarsnið (continuous reinforcement / CRF) og hvernig er það frábrugðið hlutfallslegum styrkingarhætti?", "opts": ["CRF þýðir að styrkur er gefinn á tímaháttum; hlutfallslegur háttur byggist á fjölda hegðana", "CRF er áhrifaríkara til langtíma viðhalds en hlutfallslegur háttur", "CRF þýðir að hvert tilviki hegðunar fær styrk; hlutfallslegur háttur styrkt aðeins hluta af tilvikunum", "CRF og hlutfallslegur háttur leiða alltaf til sömu tíðni"], "ans": 2, "exp": "Samfellt styrkingarsnið (CRF) þýðir að hvert eitt tilviki marklegðunar fær styrk. Hlutfallslegur háttur (intermittent reinforcement) styrkar aðeins hluta af tilvikunum. CRF er bestur til að kenna nýja hegðun hraðlega. Hlutfallslegur háttur er betri til viðhalds og gefur meira viðnám gegn slokknun.", "src": "AI"}, {"q": "Foreldrar hunsa þar þrjátíu sekúndna grátfæra barns áður en þau ganga inn. Hvaða slokknunarfyrirbæri á hér helst við þegar grátið magnast upp fyrst?", "opts": ["Endurreisn (reinstatement)", "Slokknunartoppur (extinction burst)", "Aðgreind slokknun (discriminated extinction)", "Sjálfvirk endurkoma (spontaneous recovery)"], "ans": 3, "exp": "Þetta er slokknunartoppur (extinction burst) — þegar styrking er tekin burtu (foreldrar ganga ekki inn), eykst tíðni og kraftur hegðunar (grátur) tímabundið áður en hún sloknar. Þetta er dæmigert fyrsta viðbragð við slokknun og er algeng ástæða þess að foreldrar gefast upp og fara inn — sem styrkir þá grátið á sterkari hátt.", "src": "AI"}, {"q": "Hvað er þrjár stöðu skilyrðing (three-term contingency) og hvernig kemur hún fram í daglegu lífi?", "opts": ["SD setur sér stað fyrir hegðun, hegðun verður, og styrkir eða refsing fylgir; dæmi: rautt ljós (SD) → hemla (R) → forðun frá sektum (Sr-)", "Tveir styrkar og ein hegðun — lífvera velur á milli styrkjanna", "Þrjár gerðir hegðunar sem þróast samtímis í sama aðstæðum", "Þrír einstaklingar í samstyrkt kerfi þar sem hegðun hvers hefur áhrif á styrk hinna"], "ans": 0, "exp": "Þriggja þáttta skilmálinn kemur fram stöðugt í daglegu lífi: rautt ljós (SD) → hemla (R) → forðun frá sektum (Sr-). Sími hringir (SD) → svara (R) → samtal (Sr+). Hungur (EO sem eykur gildi matar) → leita að mat (R) → fá mat (Sr+). Skilningur á þriggja þáttta skilmálanum er grundvöllur hegðunargreiningar.", "src": "AI"}, {"q": "Hvað er ontogenetískt val (ontogenetic selection) og hvernig er það samtvinnað við náttúruval?", "opts": ["Ontogenetískt val er annað nafn á náttúrvali — þau eru það sama", "Ontogenetískt val er val á hegðun á líftíma einstaklings í gegnum styrkingarskilmála; náttúruval valdi fram þá tækni sem gerir þessa nám mögulegt", "Ontogenetískt val á eingöngu við um mannlega hegðun; náttúruval á við um öll dýr", "Ontogenetískt val er ferli þar sem erfðir ákvarða hvaða hegðun lífvera lærir"], "ans": 1, "exp": "Ontogenetískt val (ontogenetic selection) er val á hegðun á líftíma einstaklings í gegnum styrkingarskilmála — eins og náttúruval en á líftímastiginu. Náttúruval valdi fram þá tækni (e.g. getu til náms) sem gerir ontogenetískt val mögulegt. Báðar tegundir vals vinna saman til að forma hegðun.", "src": "AI"}, {"q": "Hvað er fjölbreytni í hegðun (behavioral variability) og hvers vegna er hún nauðsynleg fyrir mótun?", "opts": ["Óreiðukennd hegðun sem við reynum að draga úr með mótun", "Breytileiki sem kemur eingöngu fram á slokknunartímabilum", "Mismunandi forms af hegðun sem lífvera gefur frá sér; án hennar er ekkert að velja úr við mótun", "Breyting á hegðun sem kemur af aukinni þreytu"], "ans": 2, "exp": "Fjölbreytni í hegðun (behavioral variability) er mismunandi forms af hegðun sem lífvera gefur frá sér náttúrulega. Hún er nauðsynleg fyrir mótun vegna þess að við getum aðeins styrkt það sem gerist — án breytileika eru engar nálganir að markmiðshegðun til að velja úr. Breytileiki í hegðun er einnig undirstaða uppfinninga og sköpunar.", "src": "K"}, {"q": "Hvað er frjálst virkniferli (free operant method) og hvert er kost þess?", "opts": ["Tilraunauppsetting þar sem lífvera getur gefið frá sér hegðun hvenær sem er á tilraunartímabilinu; gerir það kleift að mæla tíðni sem aðal mælingu", "Aðferð þar sem lífvera er þvinguð til að gefa frá sér hegðun á tilteknum tímabilum", "Aðferð þar sem enginn styrkir er notaður og hegðun er mæld á náttúrulegum aðstæðum", "Aðferð þar sem tilraunin er gerð án þess að lífveran viti af rannsókninni"], "ans": 0, "exp": "Frjálst virkniferli (free operant method) er tilraunauppsetting þar sem lífvera getur gefið frá sér marklegðuna hvenær sem er á tilraunartímabilinu án takmarkana á tíðni eða millibili. Kost þess er að við getum mælt tíðni hegðunar (rate of responding) sem viðkvæma og samfellda mælingu.", "src": "K"}, {"q": "Hvað er mismunurinn á skammtanlegri og hlutfallslegri mælikvarða hegðunar?", "opts": ["Tíðni (rate) er skammtanleg; biðtími er hlutfallslegur", "Skammtanlegar og hlutfallslegar mælingar gefa alltaf sömu niðurstöður", "Tíðni (rate) er hlutfallsleg — fjöldi hegðana á tímabili; leyfir samanburð á milli skilyrða; biðtími (latency) er skammtanlegur — tími frá SD að fyrstu hegðun", "Tíðni (rate) er aðeins notuð í rannsóknarstofunni; biðtími er notaður í hagnýtum aðstæðum"], "ans": 2, "exp": "Tíðni (rate) er hlutfallsleg mæling — fjöldi hegðana á tímaeiningu (t.d. smellir á mínútu). Hún gerir kleift að bera saman hegðun undir mismunandi skilyrðum á tilraunum af mismunandi lengd. Biðtími (latency) er skammtanleg mæling — tíminn frá SD að fyrstu hegðun. Skinner taldi tíðni æskilegustu mælikvarðann.", "src": "K"}, {"q": "Hvað er magasinn-þjálfun (magazine training) og hvers vegna er hún fyrsta skref í mótun?", "opts": ["Þjálfun þar sem lífvera lærir að nálgast matargjafa þegar hann hljómar — þetta skapar skilyrtan styrki sem gerir fleiri pása möguleg í mótun", "Þjálfun þar sem lífvera er þvinguð til að eta matinn í magasíni til að koma í veg fyrir ofát", "Þjálfun þar sem við kennum lífverunni að bíða eftir mat á tilteknum stað", "Þjálfun þar sem lífvera lærir að greina á milli mats og annarra hluta"], "ans": 0, "exp": "Magasinn-þjálfun (magazine training) er þjálfun þar sem lífvera lærir að nálgast matargjafa þegar hann hljómar (t.d. smellur). Þetta skapar skilyrtan styrki (conditioned reinforcer) — smellurinn — sem gerir kleift að styrkja hegðun á nákvæmum tíma í mótun. Án þessarar þjálfunar er erfitt að mótun hegðun með nákvæmni.", "src": "AI"}, {"q": "Hvað eru fjórir grundvallarskilmálar (four basic contingencies) í virkri skilyrðingu?", "opts": ["Styrking, refsing, slokknun og mótan — þetta eru fjórar leiðirnar til að breyta hegðun", "Fastur hlutfallsháttur, breytilegur hlutfallsháttur, fastur tímaháttur og breytilegur tímaháttur", "Jákvæð styrking, neikvæð styrking, jákvæð refsing og neikvæð refsing — þar sem 'jákvæð' þýðir bætt við og 'neikvæð' þýðir tekið burtu", "Bein styrking, óbein styrking, bein refsing og óbein refsing"], "ans": 2, "exp": "Fjórir grundvallarskilmálar: 1) jákvæð styrking — styrkir bætist við og hegðun eykst, 2) neikvæð styrking — fráreiti hverfur og hegðun eykst, 3) jákvæð refsing — fráreiti bætist við og hegðun minnkar, 4) neikvæð refsing — styrkir hverfur og hegðun minnkar. 'Jákvæð' = bætt við; 'neikvæð' = tekið burtu.", "src": "K"}, {"q": "Hvað er hegðunarlegt þungi (behavioral momentum) og hvernig tengt það styrkingarsögu?", "opts": ["Viðnám hegðunar gegn breytingum er hlutfallslegt við styrkingarfortíð hennar — hegðun með ríkari styrkingarsögu er viðnámsþráð", "Hraði hegðunar sem þróast eftir margar endurtekningar á sama styrkingarsniði", "Tilhneiging hegðunar til að aukast við tíma óháð styrkingarskilyrðum", "Þungi líkamslegrar hreyfingarinnar sem leiðir til þess að hegðun er endurtekin"], "ans": 0, "exp": "Hegðunarlegt þungi (behavioral momentum) vísar til þess að viðnám hegðunar gegn breytingum (t.d. við slokknun eða truflun) er hlutfallslegt við styrkingarfortíð hennar. Hegðun með ríka styrkingarsögu (margar og tíðar styrkingarnar) sýnir meira viðnám við breytingum — eins og þungur hlutur sem er erfitt að stöðva.", "src": "K"}]}, {"id": "styrkingarhattir", "title": "Styrkingarhættir", "subtitle": "Ch5", "questions": [{"q": "Hvað er fastur hlutfallsháttur (fixed ratio / FR) og hvaða mynstur hegðunar þróast á honum?", "opts": ["Styrkur fæst eftir föstan fjölda hegðana; þróar þéttlega hegðun með stuttum hlé eftir hvern styrk (post-reinforcement pause)", "Styrkur fæst eftir breytilegan fjölda hegðana; þróar jafna og stöðuga hegðun", "Styrkur fæst eftir fast tímabil; þróar hækkandi mynstur (scallop) með tíðum stigshækkun", "Styrkur fæst eftir breytilegt tímabil; þróar jafna og stöðuga hegðun"], "ans": 0, "exp": "Fastur hlutfallsháttur (FR): styrkur fæst eftir föstan, fyrirfram ákveðinn fjölda hegðana. Þróar þétta, hraða hegðun með skammri hlé eftir hvern styrk (post-reinforcement pause / PRP). Á FR 100 er hlé lengra en á FR 10. FR þróar hæsta meðaltíðni allra styrkingarhætta.", "src": "K"}, {"q": "Hvað er breytilegur hlutfallsháttur (variable ratio / VR) og hvers vegna er hann svo mikilvægur í hagnýtum aðstæðum?", "opts": ["Styrkur fæst eftir fast tímabil; þróar scallop-mynstur", "Styrkur fæst eftir breytilegan fjölda hegðana með meðaltali; þróar mjög stöðuga, hraða hegðun án hlé — spilakassar eru dæmi", "Styrkur fæst við hvern fjórða hegðun; þróar hlé eftir hvern styrk", "Styrkur fæst eingöngu þegar lífvera er mett; þróar hegðun aðeins þegar hvataaðgerð er sterk"], "ans": 1, "exp": "Breytilegur hlutfallsháttur (VR): styrkur fæst eftir breytilegan fjölda hegðana með meðaltali (t.d. VR 20 = meðaltal 20 hegðana á styrk). Þróar mjög stöðuga og hraða hegðun án merkjanlegra hlé — þetta er kraftmesta styrkingarsniðið. Spilakassar eru klassískt dæmi — þú veist aldrei hvenær næsti sigurvegari kemur.", "src": "K"}, {"q": "Hvað er fastur tímaháttur (fixed interval / FI) og hvaða mynstur kemur fram?", "opts": ["Styrkur fæst eftir föstan fjölda hegðana; þróar þétta hegðun með PRP", "Styrkur fæst við fyrstu hegðun eftir breytilegt tímabil; þróar jafna stöðuga hegðun", "Styrkur fæst við fyrstu hegðun eftir fast tímabil; þróar scallop-mynstur — lítil hegðun rétt eftir styrk, aukin hegðun þegar nálgast tímamark", "Styrkur fæst eftir breytilegan fjölda hegðana; þróar hraða hegðun án hlé"], "ans": 2, "exp": "Fastur tímaháttur (FI): styrkur fæst við fyrstu hegðun eftir fast, fyrirfram ákveðið tímabil. Þróar scallop-mynstur (FI scallop) — lítil eða engin hegðun rétt eftir styrk, stigvaxandi aukning á hegðun eftir því sem tímamarkið nálgast. Þetta er klassískt mynstur er kemur fram hjá mörgum tegundum.", "src": "K"}, {"q": "Hvað er breytilegur tímaháttur (variable interval / VI) og hvers vegna er hann gagnlegur í rannsóknum?", "opts": ["Styrkur fæst eftir föstan fjölda hegðana; þróar scallop-mynstur", "Styrkur fæst eingöngu þegar lífvera er í bestu hvataaðstæðum; þróar hámarkshegðun", "Styrkur fæst við hlutfallslega hverja aðra hegðun; þróar PRP", "Styrkur fæst við fyrstu hegðun eftir breytilegt tímabil með meðaltali; þróar jafna, stöðuga hegðun — gagnlegur þar sem þarf stöðugt grunnstig"], "ans": 3, "exp": "Breytilegur tímaháttur (VI): styrkur fæst við fyrstu hegðun eftir breytilegt tímabil með meðaltali (t.d. VI 2 min = meðaltal 2 mínútur). Þróar jafna, stöðuga og hóflega hegðun án marklegra hlé. Gagnlegur í rannsóknum þar sem þörf er á stöðugu grunnstigi til að meta áhrif annarra breytna.", "src": "K"}, {"q": "Hvað er hlé eftir styrk (post-reinforcement pause / PRP) og við hvaða styrkingarhætti kemur hann mest fram?", "opts": ["Hlé á hegðun sem kemur tafarlaust eftir styrk; kemur mest fram á FI og FR hætti — meira á stærri FR gildum", "Hlé á hegðun sem kemur tafarlaust áður en styrk fæst; kemur fram á VR", "Hlé sem kemur eingöngu á grunnskeiðinu áður en hegðun er lærð", "Hlé sem gefur til kynna slokknun eins og hegðun minnkar"], "ans": 0, "exp": "Post-reinforcement pause (PRP) er hlé á hegðun sem kemur tafarlaust eftir að styrk er fenginn. Kemur mest fram á föstum hættum (FI og FR) — á stærri FR gildum (t.d. FR 100) er hlét lengra en á smærri gildum (FR 5). Á breytilegum hættum (VR, VI) er hlét minna vegna þess að lífvera veit ekki hvenær næsti styrk er fáanlegur.", "src": "K"}, {"q": "Hvað er hlutfallsþreyting (ratio strain) og hvenær kemur hún fram?", "opts": ["Þreyta sem þróast þegar lífvera framkvæmir sömu hegðun of oft", "Brotnaður mynstur hegðunar þegar hlutfallsháttur er aukinn of hratt — of stór hlutfall er krafist án þjálfunar", "Hlé sem kemur fram þegar lífvera fær of marga styrki of hratt", "Þegar hegðun minnkar vegna þess að styrkir hefur of lítil áhrif"], "ans": 1, "exp": "Hlutfallsþreyting (ratio strain) þróast þegar hlutfallsháttur er aukinn of hratt — of stór hlutfall er krafist án nægjanlegrar þjálfunar. Hegðunarmynstrið brotnar: langt hlé, óregluleg hegðun, og loks slokknun. Þetta sýnir að þegar við mæðum með kröfurnar verður að gera það smám saman.", "src": "K"}, {"q": "Hvað er samfellt styrkingarssnið (CRF) og hvenær er hentugast að nota það?", "opts": ["Styrkur fæst aðeins í hverri aðra hegðun; gefur gott viðnám gegn slokknun", "Styrkur fæst eftir breytilegan fjölda hegðana; best til langtíma viðhalds", "Hvert tilviki hegðunar fær styrk; best til að kenna nýja hegðun hraðlega en gefur litið viðnám gegn slokknun", "Styrkur fæst einu sinni á dag óháð fjölda hegðana; best til þjálfunar"], "ans": 2, "exp": "CRF (continuous reinforcement) þýðir að hvert eitt tilviki marklegðunar fær styrk. Best til að kenna nýja hegðun hraðlega — lífvera lærir fljótt sambandið milli hegðunar og styrkis. Takmarkunin er að CRF gefur lítið viðnám gegn slokknun — hegðun sloknar hraðlega þegar styrkir fellur brott.", "src": "K"}, {"q": "Hvað er hlutfallslegur styrkingartími (interreinforcement time) og molar vs. molecular greining á hegðun?", "opts": ["Molar greining skoðar einstök hegðunartilvik; molecular greining skoðar heildarmynstur", "Molecular greining er nákvæmari og alltaf æskilegri en molar greining", "Molar og molecular greining gefa alltaf sömu niðurstöðurnar", "Molar greining skoðar stóra mynstur hegðunar yfir þjálfunartíma; molecular greining skoðar einstök tengsl hegðunar og afleiðinga"], "ans": 3, "exp": "Molar (heildræn) greining skoðar stóra mynstur hegðunar yfir þjálfunartíma — t.d. meðaltal hegðunar á tímaeiningu. Molecular (smæstu) greining skoðar einstök tengsl á milli hegðunar og afleiðinga — t.d. hvort hvert einstakt hegðunartilviki leiðir til styrks. Báðar greiningarlegar eru gagnlegar eftir rannsóknarspurningu.", "src": "K"}, {"q": "Hvað er hlutfallslegt styrkingarsnið (progressive ratio / PR) og hvað mælir það?", "opts": ["Hlutfallsháttur þar sem krafist er stöðugt meira á milli hvers styrks; brotpunktur (breakpoint) mælir styrk styrkis", "Hlutfallsháttur þar sem hlutfallið lækkar eftir hvern styrk", "Tímaháttur þar sem tímabil milli styrka eykst smám saman", "Styrkingarháttur þar sem styrkur er gefinn víxlvis á ólíkum hlutfallsgildum"], "ans": 0, "exp": "Hlutfallslegt styrkingarsnið (progressive ratio / PR): hlutfallið sem krafist er milli hvers styrks eykst stöðugt (t.d. 1, 2, 4, 8, 16...). Brotpunktur (breakpoint) er það gildi þar sem lífvera hættir að svara — þetta mælir styrk (reinforcing efficacy) styrkisins. Hár brotpunktur = sterkur styrkir.", "src": "K"}, {"q": "Hvað er hegðunarlegt þungi (behavioral momentum) og hvernig er hægt að nota það í hagnýtum aðstæðum?", "opts": ["Tíðni hegðunar eykst eftir langan tíma á sama styrkingarsniði", "Viðnám hegðunar gegn breytingum er hlutfallslegt við styrkingarfortíð; við getum notað ríkan VI til að auka viðnám marklegðunar og draga úr truflun", "Þungi líkamslegrar hegðunar sem gerir hana erfiðara að þjálfa", "Þegar hegðun er af tíð til að breyta jafnvel þótt skilyrðin breytist"], "ans": 1, "exp": "Hegðunarlegt þungi (behavioral momentum): viðnám hegðunar gegn truflun eða breytingum er hlutfallslegt við styrkingarfortíð hennar í viðkomandi aðstæðum. Í hagnýtum aðstæðum: við getum fyrst beðið einstakling að framkvæma hegðanir sem hann gerir gjarnan (ríkur VI) til að auka hegðunarlegt þungi — þá er auðveldara að fá hann til að gera ókær hegðun (high-p sequence).", "src": "K"}, {"q": "Hvað mælir hlutfallslegur biðtími (interresponse time / IRT) og hvernig má meðhöndla hann sem virka hegðun?", "opts": ["IRT er tíminn frá SD að fyrstu hegðun; hann er notaður eingöngu sem mæling", "IRT er fjöldi sekúnda sem hvert tilviki hegðunar tekur; styttri IRT gefur alltaf meira styrk", "IRT er tíminn á milli tveggja beinna hegðunartilvika; IRT getur verið meðhöndlaður sem virk hegðun með því að styrkja tilteknar IRT lengdir", "IRT mælist eingöngu á tímaháttum (FI, VI) en ekki á hlutfallsháttum (FR, VR)"], "ans": 2, "exp": "Biðtími milli viðbragða (interresponse time / IRT) er tíminn á milli tveggja beinna hegðunartilvika. Hann getur verið meðhöndlaður sem virk hegðun — við getum styrkt tilteknar IRT lengdir. Þetta er grundvöllur DRL (differential reinforcement of low rates) þar sem við styrkjum aðeins hegðun sem kemur eftir nógu langan IRT.", "src": "K"}, {"q": "Hvað sýndi rannsókn Hearst (1961) um CRF samanborið við hlutfallslega styrkt?", "opts": ["CRF sýndi meira viðnám gegn slokknun en hlutfallsleg styrkt", "CRF og hlutfallsleg styrkt sýndu eins mikið viðnám", "Viðnám við slokknun ræðst ekki af styrkingarsniðinu", "Hegðun styrkt á hlutfallslegum háttum (intermittent) sýndi meira viðnám gegn slokknun en hegðun styrkt á CRF"], "ans": 3, "exp": "Hearst (1961) sýndi að hegðun styrkt á hlutfallslegum háttum (intermittent reinforcement) sýndi meira viðnám gegn slokknun en hegð
