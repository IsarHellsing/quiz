álfa"], "ans": 2, "exp": "Dýr eru líffræðilega forhlutað til að leita upp ákveðnar vistgerðir þar sem forfeður þeirra náðu bestum árangri. Þetta hefur áhrif á lærðar hegðanir: í náttúrulegum aðstæðum eru hegðanir sem falla vel að vistvaridnum (e.g. matarleit í réttum aðstæðum) auðveldlega læranleg, en hegðanir sem ganga gegn þessari forhlutun lærast harðlega.", "src": "AI"}, {"q": "Hvað er meðfædd útgáfuhegðun (innate releasing mechanism) og hvernig tengist hún skyldrænum skilyrðingum?", "opts": ["Meðfædd útgáfuhegðun er eingöngu hjá fiska og fuglum", "Lyklisáreiti eru áhriðarsöm eingöngu vegna þess að þau líkjast CS", "Meðfædd útgáfuhegðun er sama ferli og virk skilyrðing", "Meðfædd kerfi sem framkalla sérhæfðar hegðanir við lyklisáreiti (key stimuli) — þessi áreiti geta orðið CS og styrkt aðrar tengdar hegðanir"], "ans": 3, "exp": "Meðfædd útgáfuhegðun (innate releasing mechanism): tilteknar áreiti (key stimuli) framkalla sérhæfðar hegðanir án náms — t.d. lyklisáreiti á stiki framkallar gapnun hjá mávum. Þessar áreiti geta orðið CS sem framkalla aðrar tengdar hegðanir í gegnum skyldræna skilyrðingu. Þetta sýnir samspil milli kynæðisfræðilegrar hegðunar og náms.", "src": "K"}, {"q": "Hvað sýnir rannsóknin á villtar rottur og tamilar rotta um erfðafræðileg vs. umhverfisleg áhrif á hegðun?", "opts": ["Villirottur eru kvikari og þjálfanlegri í sumum hegðunum en tamlar rottur — sýnir erfðafræðileg áhrif á taugakerfi sem hafa áhrif á námseiginleika", "Tamlar rottur eru alltaf auðveldari að þjálfa en villirottur á öllum verkefnum", "Erfðafræðileg áhrif á hegðun eru alltaf sterkari en umhverfisleg áhrif", "Erfðafræðileg áhrif á hegðun geta aldrei breyst með þjálfun"], "ans": 0, "exp": "Rannsóknir á villum og tamlum rottum sýna erfðafræðileg áhrif á námseiginleika: villirottur eru kvikari og sýna sterkari forðunarnám í tilteknum aðstæðum, en tamlar rottur eru oft auðveldlegar að þjálfa í rannsóknarstofuverkefnum. Þetta sýnir að erfðafræðileg samsetting hefur áhrif á námseiginleika án þess að ákvarða þá algerlega.", "src": "AI"}, {"q": "Hvað er líffræðilegar forhlutun (biological preparedness) samkvæmt Seligman (1971) og hvernig víkkar hún út samræmingarregluna?", "opts": ["Líffræðileg forhlutun þýðir að öll nám er ákvarðað af erfðum", "Tilteknar CS-US tengsl eru 'tilbúin', 'hlutlæg' eða 'óþarfar' eftir þróunarlegri sögu — þetta víkkar samræmingarregluna til að gera grein fyrir mismunandi námsauðveldi", "Seligman hafnaði hugmyndinni um líffræðilegar forhlutanir", "Líffræðileg forhlutun á eingöngu við um skyldrænar skilyrðing, ekki virkar"], "ans": 1, "exp": "Seligman (1971) lagði fram preparedness theory: CS-US tengsl eru á stigi frá 'tilbúin' (prepared) yfir 'hlutlæg' (unprepared) til 'óþarfar' (contraprepared). Tilbúin tengsl (t.d. bragð-veikindi) lærast auðveldlega, með fáum pörum og löngu millibili. Óþarfar (t.d. bragð-rafskot) lærast harðlega. Þetta víkkar hegðunarfræðilegar reglur með þróunarlegum hlið.", "src": "K"}, {"q": "Hvað er lyfjavakt (drug priming) og hvernig er hún tengd skilyrttum vísbendingum í fíkn?", "opts": ["Lyfjavakt: þegar lyf er gefin til að byrja meðferð", "Lyfjavakt: þegar lyfjaáhrif eru styrkt af öðrum lyfjum", "Lyfjavakt: lítill skammtur af lyfi getur endurreist fíkniðjun eftir langa hlé — tengt skilyrttum CS sem eru bundnir við lyfjanotkun og geta framkallað löngun", "Lyfjavakt er eingöngu lífeðlisfræðilegt fyrirbæri og tengist ekki skilyrttum vísbendingum"], "ans": 2, "exp": "Lyfjavakt (drug priming): lítill skammtur af lyfi getur endurreist fíkniðjun (drug-seeking behavior) eftir langa hlé — jafnvel eftir mánuðum af abstinence. Þetta tengist skilyrttum CS: umhverfislegar vísbendingar sem hafa verið pöruðar við lyfjanotkun geta einnig framkallað löngun (craving) og fíkniðjun. Þetta útskýrir hvers vegna fíkn er svo viðvarandi.", "src": "AI"}, {"q": "Hvað er kynlæg innstunga eða líffræðileg pösun á CS í lystarleysis rannsóknum?", "opts": ["Kynlæg innstunga þýðir að lyfið fer beint í lykilsvæði heilans", "Líffræðileg pösun á CS þýðir að ekki er hægt að nota CS í meðferð lystarleysis", "Kynlæg innstunga hefur engin áhrif á lystarleysi", "Matarlíkar CS framkalla matarlægar CR og ganga þar af leiðandi gegn meðferð lystarleysis sem felst í því að forðast mat"], "ans": 3, "exp": "Rannsóknir á lystarleysi (anorexia nervosa) hafa sýnt að matarlíkar CS (t.d. sjón og lykt af mat) geta framkallað matarlæg CR (munnvatn, insúlín-losun) sem ganga þvert gegn lystarleysisstefnu. Þetta sýnir hvernig líffræðileg pösun á CS getur gert meðferð erfiðari — matarlægar skyldrænar viðbrögð eru líffræðilega forhlutaðar og erfitt að slökkva.", "src": "K"}]}, {"id": "val", "title": "Val, samræming og skilyrtar styrkingar", "subtitle": "Ch9 + Ch10", "questions": [{"q": "Hvað er samræmingarreglan (matching law) og hvernig lýsir hún hegðun á samhliða styrkingarháttum?", "opts": ["Hlutfall hegðunar á hvert valmöguleika jafngildir hlutfalli styrkingarinnar — B1/(B1+B2) = R1/(R1+R2)", "Lífvera velur alltaf þann valmöguleika sem gefur sterkasta styrki", "Samræmingarreglan lýsir aðeins hegðun á FR styrkingarháttum", "Lífvera velur alltaf þann valmöguleika sem hefur hæstu tíðni"], "ans": 0, "exp": "Samræmingarreglan (matching law) sem Herrnstein (1961) sýndi: hlutfall viðbragða á hvert valmöguleika jafngildir hlutfalli styrkinga sem fæst þar. B1/(B1+B2) = R1/(R1+R2). Þetta þýðir að lífvera skiptir hegðun sinni hlutfallslega á milli valmöguleika í samræmi við styrkingartíðni hvers.", "src": "K"}, {"q": "Hvað er yfirsamræming (overmatching) og vansamræming (undermatching) og hvað veldur þeim?", "opts": ["Yfirsamræming: lífvera velur alltaf þann betra; vansamræming: lífvera velur alltaf þann verri", "Yfirsamræming: lífvera víkur meira til betra valmöguleikans en samræming spáir; vansamræming: lífvera víkur minna; stærð styrkis og veghindranir geta valdið þessu", "Yfirsamræming og vansamræming eru eingöngu rannsóknarlegar villur", "Yfirsamræming kemur aðeins fram á FR háttum; vansamræming á VI"], "ans": 1, "exp": "Yfirsamræming (overmatching): lífvera víkur meira til betra valmöguleikans en samræmingarreglan spáir. Vansamræming (undermatching): lífvera víkur minna en spáð. Orsakir: stærð styrks (magnitude), gæði styrks, veghindranir (response cost) á að skipta milli valmöguleika, og seinkun (delay). Beint samræming er sjaldgæfara en þessar breytileika.", "src": "K"}, {"q": "Hvað er seinkun á styrkingu (delay of reinforcement) og hvernig hefur hún áhrif á val?", "opts": ["Seinkun eykur virðisgildi styrks — lífvera metur meira þann styrk sem kemur seinna", "Seinkun hefur engin áhrif á val ef styrkurinn er nógu sterkur", "Seinkun minnkar virðisgildi styrkis — lengri seinkun leiðir til minna áhrifa og lífvera vill fremur skjótvirkt styrk", "Seinkun hefur aðeins áhrif á virkar hegðun, ekki skyldrænar"], "ans": 2, "exp": "Seinkun á styrkingu (delay of reinforcement) minnkar virðisgildi styrksins. Lengri seinkun leiðir til minna áhrifa á val og hegðun — lífvera kýs fremur skjótvirkt styrk yfir seinkað styrk jafnvel þótt seinkaðari styrkurinn sé sterkari (seinkun á afslætti / delay discounting). Þetta er grundvallarhugtak í rannsóknum á sjálfsstjórnun.", "src": "K"}, {"q": "Hvað er hlutfallsleg viðbragðstíðni (relative response rate) og hvernig mælum við hana á samhliða styrkingarháttum?", "opts": ["Tíðni á einum valmöguleika án samanburðar við annan", "Meðaltíðni hegðunar yfir alla valmöguleika", "Hversu oft lífvera skiptir á milli valmöguleika á tímaeiningu", "B1/(B1+B2) — tíðni á einum valmöguleika deilt með heildartigðni; mælist með því að skrá hversu oft lífvera velur hvert valmöguleika"], "ans": 3, "exp": "Hlutfallsleg viðbragðstíðni: B1/(B1+B2) — tíðni viðbragða á einum valmöguleika deilt með heildartigðni á báðum valmöguleikum. Mælist á samhliða styrkingarháttum þar sem tvær eða fleiri hegðanir (B1, B2) eru í boði samtímis, hverri með sér styrkingarskilmálum (R1, R2).", "src": "K"}, {"q": "Hvað er skilyrt styrkir (conditioned reinforcer) og hvað ræður styrkleika hans?", "opts": ["Hlutlægar áreiti sem hefur öðlast styrkingarmátt vegna pörunar við upprunalegan styrk; styrkleiki ræðst af tíðni pörunar, fjölda upprunalegar styrkar sem pörað er við, og núverandi þörf (deprivation)", "Skilyrt styrkir er alltaf sterkari en upprunalegi styrkir", "Skilyrt styrkir er eins sterkur og upprunalegi styrkir ef pörunin var fullnægjandi", "Styrkleiki skilyrts styrkis ræðst eingöngu af fjölda pöringa"], "ans": 0, "exp": "Skilyrt styrkir (conditioned reinforcer): hlutlægt áreiti sem hefur öðlast styrkingarmátt vegna pörunar við upprunalega styrki. Styrkleiki ræðst af: 1) tíðni pörunar við upprunalega styrki, 2) fjöldi og fjölbreytni upprunalegrra styrkar sem pörað er við (gildistyggingargildi / token generalized reinforcer er sterkur vegna þess að pörað er við marga styrka), og 3) núverandi þreytu (deprivation).", "src": "K"}, {"q": "Hvað er alhæfður skilyrt styrkir (generalized conditioned reinforcer) og hvers vegna er peningar gott dæmi?", "opts": ["Skilyrt styrkir sem hefur verið gefinn svo oft að hann er orðinn jafnsterkur upprunalega styrk", "Skilyrt styrkir sem hefur verið pörað við margar mismunandi upprunalegar styrkar — peningar ganga í alla hluti og er þess vegna sterkur styrkir óháð þreytu", "Skilyrt styrkir sem virkar hjá öllum lífverum óháð einstaklingsbundinni sögu", "Peningar eru ekki skilyrt styrkir — þeir eru upprunalegar styrkir"], "ans": 1, "exp": "Alhæfður skilyrt styrkir (generalized conditioned reinforcer) hefur verið pörað við margar mismunandi upprunalegar styrkar. Peningar eru dæmigert dæmi — þú getur fengið mat, skjól, félagslega samskipti o.s.frv. með peningum. Vegna þessa eru peningar sterkir styrkingarmáttir nánast óháð þreytu á einhverjum tilteknum upprunalega styrki.", "src": "K"}, {"q": "Hvað er tóken-hagfræðikerfi (token economy) og hvers vegna virkar það?", "opts": ["Kerfi þar sem peningar eru notaðir til að kaupa hegðun beint", "Kerfi þar sem hegðun er talin og skráð til að mæla framfarir", "Kerfi þar sem tókenar (margar) eru gefnir sem skilyrtir styrkingarmáttir og geta verið skiptir í upprunalegar styrkar; virkar vegna þess að tókenar eru alhæfðir skilyrtar styrkingarmáttir", "Kerfi þar sem upprunaleger styrkir eru gefnir tafarlaust eftir hverja hegðun"], "ans": 2, "exp": "Tóken-hagfræðikerfi (token economy): lífvera fær tókena (margar, punktar, stimpla) eftir æskilega hegðun. Tókenar ganga svo í upprunalegar styrkar (mat, tíma, forréttindi). Virkar vegna þess að tókenar eru alhæfðir skilyrtar styrkingarmáttir — þeir eru sterkir óháð þreytu og gera kleift að styrkja hegðun tafarlaust þótt upprunaleger styrkir sé ekki tiltækur í augnablikinu.", "src": "K"}, {"q": "Hvað er sjálfsstjórnun (self-control) í hegðunarfræðilegum skilningi og hvernig tengist hún afslætti á seinkun?", "opts": ["Sjálfsstjórnun þegar lífvera framkvæmir hegðun sem hefur að markmiði að hafa áhrif á eigin hegðun í framtíðinni", "Sjálfsstjórnun er eingöngu mögulegt hjá mönnum vegna meðvitundar", "Sjálfsstjórnun og ráðist (impulsivity) eru það sama ferli", "Val á stærri seinkaðri styrkir yfir minni tafarlausum styrkir — sjálfsstjórnun þegar maður velur seinkað, ráðist (impulsivity) þegar maður velur tafarlaust"], "ans": 3, "exp": "Sjálfsstjórnun (self-control) í hegðunarfræðilegum skilningi: val á stærri/betri en seinkaðri styrk yfir minni/verri en tafarlausum styrk. Ráðist (impulsivity): val á minni tafarlausum styrk. Hvort tveggja er hlutlægt val sem ræðst af seinkun á afslætti (delay discounting) — hversu mikið lækkar virðisgildi styrks með seinkuninni.", "src": "K"}, {"q": "Hvað er seinkun á afslætti (delay discounting) og hvernig mælist það?", "opts": ["Hvernig virðisgildi styrks lækkar eftir því sem seinkun eykst; mælist með því að bjóða einstakling á milli tafarlaussra og seinkaðra styrkja til að finna indifference point", "Hvernig styrkir er afsláttargreiddur ef lífvera þarf að bíða of lengi", "Hvernig tíðni hegðunar minnkar á seinkuðum styrkingarskilmálum", "Hvernig fjarlægar afleiðingar eru áhrifaríkari en náin afleiðingar"], "ans": 0, "exp": "Seinkun á afslætti (delay discounting): hvernig virðisgildi styrks lækkar eftir því sem seinkun milli hegðunar og styrks eykst. Mælist með hyperbólísku afsláttar-líkani: V = A/(1+kD) þar sem A er magn styrks, D er seinkun og k er einstaklingsbundinn afsláttar-stuðull. Hár k = mikil ráðist. Mælt með indifference point verkefnum.", "src": "K"}, {"q": "Hvað er aðlæg hegðun (adjunctive behavior / schedule-induced behavior) og hvaða dæmi má gefa?", "opts": ["Hegðun sem er lærð á hliðar sem liggur á hliðar við marklegðunina", "Hegðun sem kemur fram á hlé milli styrkja á styrkingarháttum og er yfir eðlilegu grunngildi — t.d. ofþvott, ofát, ofneysla vatns hjá rottum á FI hætti", "Hegðun sem kemur fram við hlé á refsingarforðunarháttum", "Hegðun sem er framkvæmd til að fylla tíma á FI hlé — alltaf gagnleg og hlutlæg"], "ans": 1, "exp": "Aðlæg hegðun (adjunctive / schedule-induced behavior): Falk (1961) sýndi að rottur á FI matarhætti drukku gígantískar magnar af vatni á milli matargjafa — polydipsia. Þetta er aðlæg hegðun: hún kemur fram á hlé milli styrka á styrkingarháttum og er langt yfir eðlilegu grunngildi. Dæmi: ofþvott, ofbygging nests, árásargirni. Tengist fíkn.", "src": "K"}, {"q": "Hvað er hlutfallsleg val (concurrent schedules) og hvernig er það notað til að rannsaka samræmingarregluna?", "opts": ["Lífvera þarf að velja á milli tveggja valmöguleika á hverri tilraun", "Hlutfallslegt val þar sem lífvera velur altíðara val alltaf", "Tvær eða fleiri styrkingarháttir eru tiltæk samtímis og lífvera skiptir hegðun sinni á milli þeirra — þetta er tilraunauppstillingin sem notuð er til að prófa samræmingarregluna", "Tvær styrkingarháttir eru sett í samkeppni þar sem lífvera getur eingöngu valið einn"], "ans": 2, "exp": "Samhliða styrkingarháttir (concurrent schedules): tvær eða fleiri styrkingarháttir eru tiltæk samtímis. Lífvera skiptir hegðun sinni á milli þeirra. Þetta er tilraunauppstillingin sem Herrnstein (1961) notaði til að finna og prófa samræmingarregluna — með því að mæla hlutfall viðbragða á hvert valmöguleika og bera það saman við hlutfall styrkinga.", "src": "K"}, {"q": "Hvað er tvöfalda samræming (molar matching) vs. stakar val (molecular choice) munurinn?", "opts": ["Molar og molecular samræming eru það sama — munurinn er eingóngu í mælingum", "Molar samræming á eingóngu við um FI styrkingarhátti", "Molecular samræming er alltaf nákvæmari mæling en molar", "Molar: samræming á heildarlegu stigi yfir langan tíma; molecular: val á milli valmöguleika á hverri einustu val"], "ans": 3, "exp": "Molar samræming: samræmingarreglan á við um heildarhlutfall viðbragða og styrkinga yfir langan tíma — stórt mynstur. Molecular val: hvernig lífvera velur á hverri einustu val á milli valmöguleika — smæsta stigið. Báðar greinar eru nauðsynlegar til fullnægjandi skilnings á hegðun á samhliða styrkingarháttum.", "src": "K"}, {"q": "Hvað er hagræður val (optimal foraging theory) og hvernig tengist hún samræmingarreglunni?", "opts": ["Hagræður val spáir fyrir um að lífvera velur þá hegðun sem hámarkar styrkingartíðni; samræmingarreglan lýsir hlutfallslegri dreifingu sem kemur upp þegar mörg valmöguleika eru í boði", "Hagræður val spáir alltaf sömu niðurstöðu og samræmingarreglan", "Hagræður val á eingángu við um matarleit í náttúrulegum aðstæðum", "Samræmingarreglan er gerðarleg (normative) en hagræður val er lýsandi (descriptive)"], "ans": 0, "exp": "Hagræður val (optimal foraging theory): spáir fyrir um að lífvera velur þá hegðun sem hámarkar styrkingartíðni eða orkuinntöku á tímaeiningu. Samræmingarreglan lýsir hlutfallslegri dreifingu hegðunar þegar mörg valmöguleika eru í boði. Þær eru bæðar viðbrögð við spurningu um val en úr ólíkum sjónarhornum — ein spáir í stað þess að lýsa.", "src": "K"}, {"q": "Hvað er sjálfsstjórnunartilgáta Rachlin og Green (1972) um tafarlausen styrk vs. seinkun?", "opts": ["Lífvera velur alltaf stærri styrk óháð seinkun", "Lífvera velur minni tafarlausan styrk þegar val er gert stutt frá; en stærri seinkuðum þegar val er gert langt frá — sýnir breytilegar forstig (preference reversal)", "Sjálfsstjórnun er aðeins möguleg þegar styrkurinn er stór", "Preference reversal kemur eingóngu fram þegar munurinn á styrkjum er lítill"], "ans": 1, "exp": "Rachlin og Green (1972) sýndu preference reversal: þegar val er gert langt fram í tíma velur lífvera stærri seinkuðan styrk (sjálfsstjórnun). En þegar val er gert rétt áður en styrkir er fáanlegur, víkur val í átt að minni tafarlausum styrk. Þetta sýnir hvernig tímafjarlegur sjónarhorn hefur áhrif á val og er grunnur sjálfsstjórnunarrannsókna.", "src": "K"}, {"q": "Hvað er tóken (token) og hvernig er hægt að nota tókena sem brú milli seinkuðrar styrkingar og tafarlaus hegðunar?", "opts": ["Tókenar eru gefnir í stað upprunalegar styrkar og hafa sama áhrif og þeir", "Tókenar eru eingángu notaðir þegar upprunaleger styrkir er ekki tiltækur", "Tókenar eru strax gefnir eftir hegðun og síðar skiptir í upprunalega styrki — þeir brúa seinkun þar sem tafarlæg skilyrt styrkir heldur hegðun á meðan upprunalegi styrkir bíður", "Tókenar hafa aðeins áhrif á hegðun ef þeir eru gjaldgengir strax"], "ans": 2, "exp": "Tókenar (tokens) eru gefnir tafarlaust eftir hegðun og síðar skiptir í upprunalegar styrkar. Þeir brúa þannig seinkun: þar sem tafarlæg skilyrt styrkingin (tóken) heldur hegðun á meðan upprunalegi styrkir bíður. Þetta er grundvöllur tóken-hagfræðikerfa og útskýrir hvers vegna þau virka jafnvel þótt upprunaleger styrkir komi seinna.", "src": "K"}, {"q": "Hvað sýndi Hermstein (1970) með 'meiotekjur' (income maximization) og val?", "opts": ["Lífvera velur alltaf þann valmöguleika sem gefur mest á hvert einasta svar", "Lífvera velur alltaf þann valmöguleika sem hefur hæsta hlutfall", "Herrnstein sýndi að val er aldrei hlutfallsleg samræmingarreglunni", "Þegar lífvera getur valið á milli valmöguleika, þróast val sem hámarkar heildarstyrkingarinntekur yfir tímabilið — samræming er afleiðing þessa"], "ans": 3, "exp": "Herrnstein (1970) lagði fram útlagningu á samræmingarregluna: lífvera þróar hegðunardreifingu sem hámarkar heildarstyrkingarinntekur yfir tímabilið. Samræming er afleiðing þessa hámarks — það er ekki sérstakt 'samræmingarkerfi' heldur einfaldlega niðurstaða þess að lífvera svarar þangað sem styrking er aðgengilegust.", "src": "K"}, {"q": "Hvað er breytt val (changed preferences) og hvernig tengist hún sjálfsstjórnun?", "opts": ["Val breytist þegar tímalegt fjarlægi frá styrk breytist — lífvera sýnir ráðist (impulsivity) þegar styrk er nálægt og sjálfsstjórnun þegar styrk er fjarri", "Val breytist eingángu þegar styrkurinn sjálfur breytist", "Breytt val kemur eingóngu fram á FI styrkingarháttum", "Sjálfsstjórnun þýðir alltaf val á stærri styrki"], "ans": 0, "exp": "Breytt val (preference reversal): val á milli tveggja styrkja breytist eftir tímafjarlegum fjarlægi frá styrkjunum. Þegar báðir eru fjarlægir: lífvera velur stærra seinkuðan (sjálfsstjórnun). Þegar minni tafarlægi nálgast: val snýst og lífvera velur minni tafarlægi (ráðist). Þetta er kjarni sjálfsstjórnunarfræðinnar.", "src": "K"}, {"q": "Hvað eru tvær gerðir af seinkun á afslætti (hyperbolic vs. exponential) og hvað þýðir munurinn?", "opts": ["Hyperbólísk og exponential gefa alltaf sömu spár", "Hyperbólísk: nýtt virðisgildi minnkar hratt fyrst en smám saman hægar — spáir preferred reversal; exponential: jöfn lækkun — spáir engar preference reversals", "Exponential líkanið er nákvæmara á mannlegar gögn", "Hyperbólísk líkanið á eingángu við um dýr"], "ans": 1, "exp": "Hyperbólísk seinkun á afslætti: V = A/(1+kD) — virðisgildi lækkar hratt í byrjun en hægar seinna. Þetta spáir preference reversal: þegar báðir styrkir eru fjarlægir, er stærri enn betri; en þegar minni nálgast, fær hann tímabundið yfirhand. Exponential líkanið: V = Ae^(-kD) — jöfn lækkun — spáir engar preference reversals. Mannleg gögn styðja hyperbólíska líkanið.", "src": "K"}, {"q": "Hvað er skilyrt seinkun á afslætti og hvernig tengt hún fíkni?", "opts": ["Fíklar sýna veikari seinkun á afslætti en samanburðarhópar", "Seinkun á afslætti er óskyld fíkni", "Fíklar sýna sterkari seinkun á afslætti (hærra k) — þeir meta framtíðarlegar afleiðingar minna en samanburðarhópar", "Skilyrt seinkun á afslætti þýðir að lyfið breytir afsláttarmætti"], "ans": 2, "exp": "Fíklar sýna marktækt sterkari seinkun á afslætti (hærra k gildi) samanborið við samanburðarhópa — þeir meta framtíðarlegar afleiðingar minna og leggja meira á tafarlægar umbætur. Þetta er mælt með delay discounting verkefnum. Rannsóknir sýna að hár k-gildi er bæði forspárþáttur fíknivanda og afleiðing neyslu.", "src": "K"}, {"q": "Hvað er heildarhagræðing (molar maximization) og hvernig skýrir hún samræmingu?", "opts": ["Heildarhagræðing spáir alltaf þversagnarkenndar niðurstöður samanborið við samræmingu", "Lífvera hámarkar styrkingarinntekur á hverri einustu val, ekki heildinni", "Heildarhagræðing á eingángu við um matarleitarhegðun", "Lífvera dreifir hegðun þannig að heildarstyrkingarinntekur á tímaeiningu eru hámarkaðar — samræming er afleiðing þessa dreifingarstefnu"], "ans": 3, "exp": "Heildarhagræðing (molar maximization): lífvera dreifir hegðun á milli valmöguleika þannig að heildarstyrkingarinntekur á tímaeiningu eru hámarkaðar. Samræming (matching) kemur fram sem afleiðing þessarar dreifingarstefnu — þegar lífvera dreifir hegðun hlutfallslega við styrkingarhlutfall er heildarstyrkingartíðni hámarkað. Þetta gefur samræmingu undirbakgskenningunna.", "src": "K"}]}, {"id": "malhegdun", "title": "Málhegðun, líkingarnám og reglur", "subtitle": "Ch11 + Ch12", "questions": [{"q": "Hvað eru Skinner-flokkar málhegðunar (verbal operants) og hverjir eru helstu flokkar þeirra?", "opts": ["Hegðunarflokkar sem eru skilgreindir af virkni þeirra — mand, tact, echoic, intraverbal, textual — hverju stjórnað af mismunandi forinstigunum", "Orðaflokkar eins og nafnorð, sagnir og lýsingarorð", "Hegðunarflokkar skilgreindir af málfræðilegri uppbyggingu setningar", "Flokkar málhegðunar skilgreindir af hljóðfræðilegum eiginleikum"], "ans": 0, "exp": "Skinner (1957) skilgreindi málhegðun (verbal behavior) í virknilegum flokkar eftir forinstigu og afleiðingum — ekki eftir málfræðilegum eiginleikum. Helstu flokkar: mand (stjórnað af þörf og gefur einstakling það sem hann þarfnast), tact (stjórnað af óskilyrtri viðbragðsinstigunum við hlutum/atburðum), echoic (stjórnað af hljóðrænum líkani), intraverbal (stjórnað af öðrum orðum), og textual (lestur).", "src": "K"}, {"q": "Hvað er mand og hvernig er hann frábrugðinn tact?", "opts": ["Mand: málhegðun sem lýsir heiminum; tact: málhegðun sem biður um eitthvað", "Mand: málhegðun stjórnað af þörf/hvataaðgerð og styrkt af ákveðnum afleiðingum — 'gjef mér vatn'; tact: styrkt af ósértækum félagslegum styrkjum þegar lýst er heiminum", "Mand og tact eru það sama — munurinn er eingángu í formi", "Tact er styrkt af ákveðnum afleiðingum; mand er styrkt af ósértækum félagslegum styrkjum"], "ans": 1, "exp": "Mand: málhegðun stjórnað af hvataaðgerð (þörf, fráreiti) og styrkt af ákveðnum afleiðingum sem uppfylla þörfina — t.d. 'gjef mér vatn' þegar þyrst er, styrkt af því að fá vatn. Tact: málhegðun framkölluð af óskilyrttum viðbragðsinstigunum (hlutur/atburður í heiminum) og styrkt af ósértækum félagslegum styrkjum — t.d. 'þar er hundur' þegar hund sér.", "src": "K"}, {"q": "Hvað er echoic og intraverbal og hverjir eru munir þeirra?", "opts": ["Echoic: málhegðun um echo-þemu; intraverbal: málhegðun um innri hugsunanir", "Echoic og intraverbal eru það sama — bæðar stjórnaðar af öðrum orðum", "Echoic: málhegðun sem líkar hljóðrænn fyrirmynd — stjórnað af öðrum talandi; intraverbal: málhegðun stjórnað af öðrum orðum en án point-to-point samsvörunar", "Intraverbal líkar hljóðrænn fyrirmynd; echoic svarar á öðrum orðum"], "ans": 2, "exp": "Echoic: málhegðun stjórnað af hljóðrænum líkani (talandi) þar sem viðbragðið líkir nákvæmlega samsvörun við líkanið — endurtekur það sem sagt er. Intraverbal: málhegðun stjórnað af öðrum orðum en þar sem ekki er point-to-point samsvörun — t.d. svara spurningum, ljúka setningum, segja stuttar sögur.", "src": "K"}, {"q": "Hvað er líkingarnám (observational learning / modeling) og hvernig skýrir hegðunarfræðin það?", "opts": ["Líkingarnám er eingángu mögulegt hjá mönnum með fullyróðna heilans", "Líkingarnám þarf alltaf beina þjálfun og getur aldrei orðið af einni athugun", "Hegðunarfræðin getur ekki skýrt líkingarnám vegna þess að það er innræn ferli", "Lærðar hegðanir sem koma fram eftir að horft er á líkan (model) framkvæma þær — hegðunarfræðin skýrir þetta með því að líkan sér sem SD og styrkir/refsir viknar"], "ans": 3, "exp": "Líkingarnám (observational learning / modeling): lífvera tileinkar sér hegðun eftir að horfa á líkan framkvæma hana. Hegðunarfræðin skýrir þetta með: 1) líkan sér sem SD sem stillir sér stað fyrir hegðun, 2) niðurstöður sem líkanið fær (vikariant reinforcement) hafa áhrif á lífveruna, og 3) líkingarnám getur verið styrkt af félagslegum styrkjum. Bandura og Walters (1963) sýndu þetta með Bobo-dúkkatilraunum.", "src": "K"}, {"q": "Hvað eru samgildar aðferðir (equivalence-based instruction) og hvernig þær ná yfir meiri en þær sem voru þjálfaðar?", "opts": ["Þegar þjálfun á tilteknum tengslum milli áreita leiðir til óþjálfaðra tengslum vegna samgildis — þrjár gerðir mynda net af tengslum", "Samgildar aðferðir þjálfa alla tengsl beint án hlé", "Samgildar aðferðir eru aðeins notaðar í tungumálanámi", "Samgildar aðferðir krefjast þess að öll tengsl séu þjálfuð eitt og eitt"], "ans": 0, "exp": "Samgildar aðferðir (equivalence-based instruction): þegar þjálfun á A→B og B→C tengslum leiðir til óþjálfaðra tengslum A→C (þvergengi), B→A og C→B (samhverfa), og A→A o.s.frv. (endurspeglun). Þetta gefur ríkt nám úr fárri þjálfun. Notað til að kenna orðaforða, hugtök og flókin sambönd.", "src": "K"}, {"q": "Hvað er reglustýrð hegðun (rule-governed behavior) og hvernig er hún frábrugðin skilyrðingastýrðri hegðun (contingency-shaped)?", "opts": ["Reglustýrð hegðun er alltaf nákvæmari en skilyrðingastýrð", "Reglustýrð: hegðun stjórnað af mállegar lýsingum á skilmálum; skilyrðingastýrð: hegðun mótað beint af reynslu af skilmálum — mismunandi áhrif á hegðun", "Skilyrðingastýrð hegðun krefst tungumáls; reglustýrð þarf það ekki", "Reglustýrð og skilyrðingastýrð hegðun hafa alltaf sömu afleiðingar"], "ans": 1, "exp": "Reglustýrð hegðun (rule-governed behavior): hegðun stjórnað af mállegar lýsingum á skilmálum (reglur) — t.d. 'ef þú gerir X þá færðu Y'. Skilyrðingastýrð hegðun (contingency-shaped): hegðun mótað beint af reynslu af skilmálunum. Munur: reglustýrð hegðun þróast hraðar en er oft ósveigjanlegri og líklegri til að viðhaldast þótt skilmálarnir breytist.", "src": "K"}, {"q": "Hvað sýndu Ayllon og Azrin (1964) um aðskilnaðarreglur (chaining) í tóken-hagfræðikerfi?", "opts": ["Ayllon og Azrin sýndu að tóken-hagfræðikerfi virka eingángu hjá geðsjúkum", "Aðskilnaðarreglur þjálfa hegðanir í þverstæðri röð", "Þjálfun á hegðunarkeðjum þar sem hvert hlekk er styrkt og leiðir til næsta hlekkjar — þetta er grunnur að því að kenna flóknar hegðanir", "Keðjur í hegðunargreiningu þurfa alltaf upprunalegar styrkar í hverjum hlekk"], "ans": 2, "exp": "Ayllon og Azrin (1964) sýndu notkun hegðunarkeðja í tóken-hagfræðikerfi á geðdeild. Í keðju (chaining): hvert hlekk virkrar hegðunar leiðir til næsta SD og að lokum til styrkis. Við getum þjálfað keðjur í bak-á-vik röð (backward chaining) eða frá upphafi (forward chaining). Þetta gerir kleift að kenna flóknar, fjölskiptar hegðanir.", "src": "K"}, {"q": "Hvað er textual hegðun (textual behavior) samkvæmt Skinner og hvernig tengist hún lestrarnámi?", "opts": ["Textual hegðun er eingángu þegar maður skrifar texta", "Textual hegðun þarf meðfætt tungumálahæfileika", "Textual hegðun kemur ekki undir virknigreiningu", "Lestur þar sem skrifaðar textaformar stjórna orðræðu — point-to-point samsvörun á milli texta og lesinna orða; lærist í gegnum greinistyrk"], "ans": 3, "exp": "Textual hegðun (textual behavior): lestur þar sem skrifaðar textaformar (SD) stjórna orðræðu (R) með point-to-point samsvörun — hvert bókstafur/orð í texta samsvarar hljóðrænum viðbragði í lestri. Textual hegðun lærist í gegnum greinistyrk: við styrkjum nákvæmar þýðingar á textanum. Þetta er grundvöllur hegðunarlegrar nálgunar við lestrarnám.", "src": "K"}, {"q": "Hvað er autoclitics og hvernig gegna þær hlutverki í máltjáningu?", "opts": ["Málhegðun sem breytir virkni annarrar málhegðunar eða gefur til kynna styrk talarans — 'ég held að', 'ég er viss um', 'ekki'", "Autoclitics eru meðfædd málfræðileg reglur", "Autoclitics eru eingángu notaðar þegar talari er óviss um eitthvað", "Autoclitics eru sama og echoic hegðun"], "ans": 0, "exp": "Autoclitics er málhegðun sem breytir, lýsir eða hefur áhrif á aðra málhegðun. Til dæmis: 'ég held að X' (gefur til kynna óvissu um tact X), 'ekki X' (breytir virkni mands), 'X og Y' (tengir saman tvær málhegðanir). Autoclitics gegna hlutverki málfræðilegra og merkingarfræðilegra hlutverka í heilbrigðri málnotkun.", "src": "K"}, {"q": "Hvað er vikariant styrkir (vicarious reinforcement) og refsiing í líkingarnámi?", "opts": ["Vikariant styrkir þýðir að lífvera fær styrk fyrir hvert annað svar", "Þegar lífvera sér líkan fá styrk eða refsingu og breytir eigin hegðun í samræmi við það — sýnir Bandura að niðurstöður líkans hafa áhrif á áhorfanda", "Vikariant styrkir á eingángu við um kynlægar hegðanir", "Lífvera verður að fá beina styrk til að hún muni líkingarnám"], "ans": 1, "exp": "Vikariant styrkir (vicarious reinforcement): þegar lífvera sér líkan fá styrk fyrir tiltekna hegðun, eykst líkur á að lífveran framkvæmi sömu hegðun — þótt hún hafi aldrei sjálf fengið styrk fyrir hana. Vikariant refsing hefur gagnstæð áhrif. Bandura sýndi þetta í Bobo-dúkkatilraunum: börn sem sáu líkan refsað voru minna líkleg til að sýna árásarsemi.", "src": "K"}, {"q": "Hvað er samgildi (stimulus equivalence) og hvernig tengist það tungumáli samkvæmt Sidman?", "opts": ["Samgildi þýðir að öll áreiti eru eins og geta skipt um hlutverk", "Samgildi þróast eingángu þegar þjálfun á öllum mögulegum tengslum", "Þegar áreiti mynda jafngildar flokkar án beinar þjálfunar á öllum samböndunuð — Sidman lagði til að þetta sé grundvöllur merkingarfræðinnar", "Sidman hafnar hugmyndinni um samgildi"], "ans": 2, "exp": "Stimulus equivalence (Sidman): áreiti mynda jafngilda flokkar þegar endurspeglun (A=A), samhverfa (A=B þá B=A) og þvergengi (A=B og B=C þá A=C) geta sýndar án beinar þjálfunar. Sidman lagði til að þetta sé grundvöllur merkingarfræðinnar og tungumáls — orð og hlutur geta verið hluti af sama jafngilda flokki án þess að tengsl þeirra hafi verið beinlínis þjálfuð.", "src": "K"}, {"q": "Hvað er point-to-point samsvörun (point-to-point correspondence) og hvers vegna er hún mikilvæg í echoic og textual hegðun?", "opts": ["Point-to-point samsvörun þýðir að allt viðbragðið á sér stað á einum tíma", "Point-to-point samsvörun er eingángu til í skriflegum málnotun", "Echoic og textual þarfnast engrar samsvörunar", "Hvert þáttur í SD (hljóð eða textabókstafur) samsvarar hvert þáttur í viðbragðinu — þetta gerir kleift nákvæmt eftirherma og lestur"], "ans": 3, "exp": "Point-to-point samsvörun: hvert þáttur í forinstigunum (SD) samsvarar hvert þáttur í viðbragðinu — t.d. í echoic samsvarar hvert hljóð í líkaninu hvert hljóð í eftirhermunum, í textual samsvarar hvert orð/bókstafur í texta hvert orð í lesnum viðbragði. Þetta er lykileinkenni echoic og textual og aðskilur þær frá intraverbal.", "src": "K"}, {"q": "Hvað er félagsleg styrking (social reinforcement) og hvernig er hún grundvöllur málhegðunar?", "opts": ["Styrking sem kemur frá öðrum einstaklingum — hlýja, athygli, samþykki — og er grundvöllur málhegðunar vegna þess að málhegðun krefst hlustanda", "Félagsleg styrking er eingángu form skilyrttrar styrkingarinnar", "Félagsleg styrking er ekki eins virkur og upprunaleger styrkir", "Málhegðun þarfnast ekki félagslegrar styrkingarinnar"], "ans": 0, "exp": "Félagsleg styrking (social reinforcement): styrking sem kemur frá öðrum — hlýja, athygli, samþykki, viðbrögð. Hún er grundvöllur málhegðunar: málhegðun krefst hlustanda (mediator) sem gefur styrkjanda viðbrögðin. Án félagslegrar styrkingarinnar myndi málhegðun slökkva. Þetta er eitt af því sem aðskilur málhegðun frá öðrum virkum hegðunum.", "src": "K"}, {"q": "Hvað eru mismunandi gerðir líkingarnáms (types of modeling) og hvernig eru þær mismunandi?", "opts": ["Beint líkingarnám er eingángu mögulegt hjá mönnum", "Beint líkingarnám: athugar fyrirmynd sem líkir nákvæmlega; útdregið líkingarnám: lærir reglu eða meginreglu út frá nokkrum dæmum; táknrænt: líkingarnám í gegnum hugmyndir", "Táknrænt líkingarnám þarfnast beinna þjálfunar", "Allar gerðir líkingarnáms gefa sömu niðurstöður"], "ans": 1, "exp": "Bandura aðgreinir: 1) Beint líkingarnám (live modeling): athugar beinan fyrirmynd, 2) táknrænt líkingarnám (symbolic): líkingarnám í gegnum myndir, lýsingar, kvikmyndir, 3) útdregið líkingarnám (abstract): lærir reglur eða meginreglur út frá nokkrum dæmum — þ.e. sameiginleg eiginleikar margra líkana eru lærðir sem regla sem alhæfist á nýjar aðstæður.", "src": "K"}, {"q": "Hvað er keðja mands og tacts (mand-tact chain) og hvernig kemur hún fram í samræðum?", "opts": ["Mands og tacts geta aldrei komið saman", "Tact kemur alltaf á eftir mand í samræðum", "Í samræðum víxlast mands og tacts: mand biður um upplýsingar ('hvernig gengur?'), tact veitir þær ('ég er hress'); þetta er grundvöllur samræðuhegðunar", "Keðja mands og tacts er eingángu í skriflegu máli"], "ans": 2, "exp": "Í samræðum koma mands og tacts víxlast saman: 'Hvernig gengur?' (mand — biður um tact-svar frá öðrum), 'Ég er hress takk' (tact — lýsir innri ástandi), 'Hvað gerðir þú í gær?' (mand), 'Ég fór í bíó' (tact) o.s.frv. Þetta keðja er grundvöllur flókinnar samræðuhegðunar og kann á það að hegðunargreining geti skýrt allt samtal.", "src": "K"}, {"q": "Hvað sýndi Savage-Rumbaugh rannsóknin á bonóbónum um málhegðun hjá dýrum?", "opts": ["Bonóbóar geta lært fullkomið tungumál eins og menn", "Savage-Rumbaugh sýndi að dýr geta aldrei lært málhegðun", "Kanzi lærði eingángu eftir gríðarlegar beinnakstar þjálfunar", "Bonóbóinn Kanzi lærði að nota táknrænar samskiptatöflur (lexigrams) án beinnakstar þjálfunar — með því að horfa á móður sína þjálfaða"], "ans": 3, "exp": "Savage-Rumbaugh og félagar sýndu að bonóbóinn Kanzi lærði að nota lexigrams (táknrænar samskiptatöflur) án beinnakstar þjálfunar — með því að horfa á móður sína Matata þjálfaða. Kanzi sýndi einnig skilning á töluðu máli á nýgæðastigi. Þetta sýnir líkingarnám og mögulegar merkjafylgdarlegar takmarkanir á málnotkun hjá dýrum.", "src": "K"}, {"q": "Hvað eru reglur (rules) í hegðunarfræðilegum skilningi og hvernig eru þær frábrugðnar lýsingum á skilmálum (contingency descriptions)?", "opts": ["Reglur eru mállegar lýsingar á skilmálum; þær eru frábrugðnar almennum lýsingum á því að reglur benda beint á samband hegðunar og afleiðinga (if-then form)", "Reglur og lýsingar á skilmálum eru það sama", "Reglur eru eingángu samfélagslegar og hafa engar hegðunarfræðilegar afleiðingar", "Lýsingar á skilmálum eru alltaf nákvæmari en reglur"], "ans": 0, "exp": "Reglur í hegðunarfræðilegum skilningi eru mállegar lýsingar á skilmálum: 'Ef þú gerir X þá færðu Y'. Þær eru tegund av contingency descriptions — mállegar framsetningar á sambandi hegðunar og afleiðinga. Þær geta stjórnað hegðun jafnvel án þess að einstaklingurinn hafi upplifað skilmálana beint — þetta er grundvöllur reglustýrðrar hegðunar.", "src": "K"}, {"q": "Hvað er intraverbal keðja (intraverbal chain) og hvernig gerir hún langa ræðu mögulega?", "opts": ["Intraverbal keðja krefst átaklegar styrkingunar á hverjum hlekk", "Öll mállegar viðbrögð þar sem hvert orð/setning er SD fyrir næstu — þetta gerir langan framsöguræður, ljóð og sögur mögulegar án þess að hlustandi þurfi að gefa styrk við hvert skref", "Intraverbal keðja er eingángu möguleg þegar talari les texta", "Intraverbal keðja þróast einungis hjá mönnum með hátt þroskastig"], "ans": 1, "exp": "Intraverbal keðja: öll mállegar viðbrögð þar sem hvert orð eða setning verður SD sem kallar fram næstu. Þetta gerir langa framsöguræður, ljóð, sögur og talningu mögulegar: 'Einn' → SD → 'tveir' → SD → 'þrir' o.s.frv. Hlustandi þarf ekki að gefa styrk við hvert skref — keðjan er sjálf-styrkt af forinsigu hvers hlekkjar.", "src": "K"}, {"q": "Hvað eru önnur stigs reglur (augmenting rules) samkvæmt Hayes, Zettle og Rosenfarb (1989)?", "opts": ["Reglur sem auka umfang annarrar reglna", "Reglur sem kenna öðrum hvernig á að gera reglur", "Reglur sem bætast við aðrar reglur og gera þær líklegri til að stjórna hegðun — t.d. 'reglur frá treystu uppsprettum eru áreiðanlegri'", "Önnur stigs reglur eru eingángu mögulegar hjá fullorðnum"], "ans": 2, "exp": "Augmenting rules (Hayes et al.): reglur sem bætast við aðrar reglur og breyta styrkleika þeirra sem forinstigu. T.d. 'reglur frá læknum eru áreiðanlegri' eykur líkur á að 'farðu á gangandi hreyfingu' stjórni hegðun. Þetta er mikilvægt í skilningi á hvernig menningarleg og fagleg yfirvald hafa áhrif á hegðun í gegnum mállegar reglur.", "src": "AI"}, {"q": "Hvað er RFT (relational frame theory) og hvernig víkkar hún út Skinners hugmyndir um málhegðun?", "opts": ["RFT hafnar Skinners hugmyndum um málhegðun algerlega", "RFT og Skinners kenning eru nákvæmlega eins", "RFT er eingángu þýðingarmikill fyrir klínískar meðferðir, ekki grunnfræðina", "RFT: tungumáli er háðir af öfluga tengslum milli áreita í ólíkum tengslum-ramma; víkkar Skinner með því að skýra samgildi og flóknari máltjáningu"], "ans": 3, "exp": "RFT (Relational Frame Theory — Hayes, Barnes-Holmes, Roche): tungumáli er lýst sem ferjuhegðun (derived relational responding) þar sem orð og hugtök tengjast í ólíkum tengslum-ramma (coordination, opposition, comparison, hierarchy o.s.frv.). RFT víkkar Skinner með því að gefa meir nákvæma lýsingu á hvernig samgildi, analogical reasoning og flókin máltjáning þróast.", "src": "K"}]}, {"id": "beitt", "title": "Beitt hegðunargreining", "subtitle": "Ch13 + Ch14", "questions": [{"q": "Hvað eru þrjú stig vals (three levels of selection) og hvernig útskýra þær mannlega hegðun?", "opts": ["Náttúruval (kynæðisfræðilegt), virkni skilyrðing (ontogenetískt) og menningarval (menningarlegt) — þrjú óháð en tengsleg þróunarleg ferli", "Einstaklingsbundið val, félagslegt val og menningarlegt val — þrjú stig í þeirri röð", "Erfðir, umhverfi og menning — þrjú jafngilt stig", "Náttúruval og menningarval eru það sama ferli á ólíkum tímakvörðum"], "ans": 0, "exp": "Þrjú stig vals (three levels of selection) samkvæmt Skinner: 1) náttúruval (phylogenetic) — velur genotýpu og kynæðisfræðilegar hegðanir, 2) virkni skilyrðing (ontogenetic) — velur hegðun einstaklings á líftíma, og 3) menningarval (cultural) — velur hegðunarmynstur sem eru þjálfuð og miðluð í menningarlegum hópum. Þrjú óháð en gagnvirk ferli.", "src": "K"}, {"q": "Hvað er menningarleg þróun (cultural evolution) og hvernig er hún frábrugðin líffræðilegri þróun?", "opts": ["Menningarleg þróun er eingángu kenning og á sér ekki stað", "Menningarleg þróun á sér stað þegar hegðunarmynstur breytast og eru valin í hópum vegna afleiðinga þeirra fyrir hópinn — hraðari en líffræðileg þróun", "Menningarleg og líffræðileg þróun eru það sama ferli", "Menningarleg þróun ræðst eingángu af einstaklingshegðun, ekki hóphegðun"], "ans": 1, "exp": "Menningarleg þróun (cultural evolution): hegðunarmynstur og venjur þróast og eru valin í menningarlegum hópum vegna afleiðinga þeirra fyrir hópinn. Menningarleg þróun er mun hraðari en líffræðileg þróun vegna þess að hún þarfnast ekki líffræðilegrar erfðabreytingar — hún er miðluð með líkingarnámi, tungumáli og menningarlegum stofnunum.", "src": "K"}, {"q": "Hvað er ABA (applied behavior analysis) og hverjar eru þær sjö eiginleikar sem Baer, Wolf og Risley (1968) skilgreindu?", "opts": ["ABA er eingángu notað til að meðhöndla einhverfu", "ABA þarf alltaf notkun á refsingunni til að vera áhrifaríkt", "Beitt sviðið sem beitir hegðunarfræðilegum lögum til að breyta félagslega mikilvægri hegðun; sjö eiginleikar: beitt, hegðunarlegt, greinanlegt, notaðar, tæknileg, hugmyndafræðilega skipulagt, áhrifaríkt", "Sjö eiginleikar ABA eru: áreiðanlegt, gáfulegt, nákvæmt, prófanlegt, skýrt, endurtekið, mælt"], "ans": 2, "exp": "Baer, Wolf og Risley (1968) skilgreindu sjö eiginleika ABA: 1) beitt (applied) — félagslega mikilvæg, 2) hegðunarlegt (behavioral) — mælanleg hegðun, 3) greinanlegt (analytic) — sýnir orsakatengsl, 4) notaðar (technological) — skipuleg lýsing, 5) tæknilegt (conceptually systematic) — tengist hegðunarfræðilegum meginreglum, 6) áhrifaríkt (effective) — breytir hegðun nægilega, 7) almælt (generality) — viðheldst og alhæfist.", "src": "K"}, {"q": "Hvað er virknigreining á hegðun (functional behavioral assessment / FBA) og hvers vegna er hún grundvöllur ABA meðferðar?", "opts": ["FBA er eingángu notað til að greina geðsjúkdóma", "FBA á sér stað eftir að meðferð er ráðsett", "FBA þarf alltaf beinar tilraunir og getur aldrei verið gert með viðtali", "Mat sem bær kennsl á virkni erfiðrar hegðunar (fá athygli, forðast verkefni, fá hlut, sjálfsörvun) og gefur leiðbeiningar um meðferð"], "ans": 3, "exp": "Virknigreining á hegðun (functional behavioral assessment / FBA): mat sem bær kennsl á hvaða virkni erfiðleg hegðun gegnir — fá athygli, forðast verkefni, fá hlut/áreitni, sjálfsörvun. FBA er grundvöllur ABA vegna þess að virkni segir okkur hvað heldur hegðuninni uppi og þar af leiðandi hvaða meðferð mun vera áhrifaríkust.", "src": "K"}, {"q": "Hvað er DRO (differential reinforcement of other behavior) og hvenær er það notað?", "opts": ["Styrkir er gefinn þegar marklegðun hefur ekki átt sér stað á tilteknu tímabili — eykur aðra hegðun og minnkar marklegðun án beinnakstar refsingarinnar", "DRO styrkir aðeins marklegðun þegar hún á sér stað", "DRO notar refsingu til að minnka marklegðun", "DRO gefur styrk eingángu þegar alternativ hegðun á sér stað"], "ans": 0, "exp": "DRO (differential reinforcement of other behavior): styrkir er gefinn þegar marklegðun (target behavior sem við viljum minnka) hefur EKKI átt sér stað á tilteknu tímabili. Ef marklegðun kemur fram, byrjar tímabilið aftur. DRO eykur aðra hegðun (öll hegðun nema marklegðunin) og minnkar marklegðun án þess að beita beinnaksti refsingu.", "src": "K"}, {"q": "Hvað er FCT (functional communication training) og hvernig tengist hún FBA?", "opts": ["FCT er þjálfun í málfræði og orðaforða", "Kennir félagslega viðeigandi samskiptahegðun sem þjónar sömu virkni og erfiðleg hegðun — FBA afhjúpar virkni, FCT kennir viðeigandi form", "FCT notar refsingu til að þvinga rétta samskipti", "FCT er notað eingángu þegar einstaklingar hafa engin mál"], "ans": 1, "exp": "FCT (functional communication training): kennir félagslega viðeigandi samskiptahegðun sem þjónar sömu virkni og erfiðleg hegðun. FBA afhjúpar virkni (t.d. 'þetta er til að forðast verkefni'), FCT kennir viðeigandi alternativ (t.d. 'ég þarf hlé'). Við styrkjum nýja samskiptahegðun og þar með minnkar erfiðleg hegðun sem þjónaði sömu virkni.", "src": "K"}, {"q": "Hvað er PECS (picture exchange communication system) og hvernig tengist það mand-þjálfun?", "opts": ["PECS er eingángu notað til að kenna lestur", "PECS er form tact-þjálfunar þar sem einstaklingar labela hluti", "Samskiptakerfi þar sem einstaklingar skipta myndum við samskiptafélaga til að biðja um hluti — þetta er mand-þjálfun vegna þess að mynd er gefin til að fá ákveðinn hlut", "PECS þarfnast ekki beins stuðnings frá þjálfara"], "ans": 2, "exp": "PECS (picture exchange communication system): einstaklingar skipta myndum við samskiptafélaga til að biðja um hluti eða athafnir. Þetta er mand-þjálfun í hegðunarfræðilegum skilningi: myndin er notuð (eins og mand) til að fá ákveðið hlut eða athöfn (styrk) sem uppfyllir þörfina. PECS er sérstaklega notað hjá einstaklingum með einhverfu og aðrar samskiptaskerðingar.", "src": "K"}, {"q": "Hvað er þrjú-þáttta virknigreining (ABC analysis) og hvernig er hún notuð klínískt?", "opts": ["ABC greining er klínískt mat á hegðun, sérhæfni og samskiptum", "ABC notar aðeins beinar tilraunir til að bera kennsl á virkni", "ABC greining er eingángu notuð hjá börnum með þroskafrávik", "Greining á Antecedent (forvirkni), Behavior (hegðun) og Consequence (afleiðing) — notuð til að bera kennsl á hvata og upphafsaðstæður erfiðrar hegðunar"], "ans": 3, "exp": "ABC greining (Antecedent-Behavior-Consequence): kerfisbundin greining á forinstigunum, hegðuninni og afleiðingunum. Klínískt notuð til að: 1) bera kennsl á mögulega forinstiga (hvað gerist rétt áður en erfiðleg hegðun kemur fram), 2) skilgreina hegðunina nákvæmlega, og 3) bera kennsl á afleiðingar sem gætu viðhaldið hegðuninni. Þetta er grunnurinn að FBA.", "src": "K"}, {"q": "Hvað er hlíðarspenna (establishing operations) í klínískri ABA og hvernig breyta við þær til að draga úr erfiðlegri hegðun?", "opts": ["EO eykur gildi ákveðinna styrkja og líkur á tengdri hegðun — við breytum EO til að draga úr motivational value erfiðlegrar hegðunar (t.d. gerum forðunarhegðun óþarfa með því að breyta verkefnum)", "EO eru eingángu notaðar til að bæta up neikvæðar meðferðaráhrif", "EO breytum við eingángu með lyfjagjöf", "EO hafa engin hagnýt notagildi í ABA"], "ans": 0, "exp": "Establishing operations (EO) í klínískt: við getum drept úr erfiðlegri hegðun með því að breyta EO sem heldur henni uppi. T.d. ef erfiðleg hegðun þjónar forðunarvirkni (forðast erfiðleg verkefni), getum við 1) breytt verkefnunum þannig að þau séu minna óþægileg (draga úr EO), 2) gefið EO-þversögnarlegar aðstæður þar sem forðun þjónar ekki tilgangi.", "src": "K"}, {"q": "Hvað eru menningarleg hegðun (cultural practices) og hvernig eru þær valin samkvæmt hegðunarfræðilegum sjónarmiðum?", "opts": ["Menningarleg hegðun er eingángu skilyrt af náttúruvali", "Hegðunarmynstur sem þjóna virkni í menningarlegum hópum og eru valin vegna afleiðinga þeirra fyrir hópinn — stofnanir og lög eru dæmi um menningarlegar hegðunarmynstur", "Menningarleg hegðun er aldrei beint mælanleg í hegðunarfræðilegum rannsóknum", "Menningarleg hegðun þróast aðeins þegar hópar eru einangraðir frá öðrum"], "ans": 1, "exp": "Menningarleg hegðun (cultural practices): hegðunarmynstur sem þjóna virkni í menningarlegum hópum og eru valin vegna afleiðinga þeirra fyrir hópinn. Hegðunarfræðileg sjónarmiðin: menningarlegar hegðanir eru virkar hegðanir sem eru valin af afleið ingum þeirra á hópstig — t.d. tungumálareglur, menningarlegir siðir, og lög. Þær ganga í arv með líkingarnámi og mállegum miðlun.", "src": "K"}, {"q": "Hvað er biðlagsmiðuð meðferð (contingency management) í meðferð fíknar?", "opts": ["Meðferð sem einbeita sér eingángu að hugrænum þáttum fíknar", "Meðferð sem notast við lyfjameðferð án hegðunarþátta", "Notkun styrkingarskilmála til að breyta fíknihegðun — t.d. gjefa styrk (peninga, forréttindi) fyrir edrúmennsku og refsa (taka styrk) fyrir neyslu", "Biðlagsmiðuð meðferð krefst alltaf leggunar á sjúkrahús"], "ans": 2, "exp": "Biðlagsmiðuð meðferð (contingency management): notkun styrkingarskilmála til að breyta fíknihegðun. Þekkt dæmi: voucher-based reinforcement (Higgins et al.) þar sem þátttakendur fá verðmæti (vouchers) fyrir neikvæðar lyfjarannsóknir (edrúmennsku). Rannsóknir sýna að þetta er mjög áhrifaríkt til að draga úr neyslu á stuttum tíma.", "src": "K"}, {"q": "Hvað er BST (behavioral skills training) og hvaða fjórir þáttar eru í henni?", "opts": ["BST notar eingángu refsingu og mótun", "BST er eingángu notað í dýraþjálfun", "BST er form orðræðumeðferðar sem notar kognitíva tækni", "Þjálfunaraðferð sem notar leiðbeiningar, fyrirmynd, æfing og endurgjöf — ein áhrifaríkasta leiðin til að kenna nýjar kunnáttur"], "ans": 3, "exp": "BST (behavioral skills training) er þjálfunaraðferð með fjórum þáttum: 1) leiðbeiningar (instructions) — skýra hvernig hegðun er framkvæmd, 2) fyrirmynd (modeling) — sýna hegðunina, 3) æfing (rehearsal) — þátttakandi æfir, 4) endurgjöf (feedback) — leiðrétting og styrking. BST er ein áhrifaríkasta leiðin til að kenna nýjar kunnáttur og krefst ekki þess að þátttakendur lesi eða skili sér fyrirfram.", "src": "K"}, {"q": "Hvað er þrjú stig forvarna (three levels of prevention) í lýðheilsuvísindum og hvernig tengist ABA þeim?", "opts": ["Fyrirbyggjandi (prevent onset), byrjun meðferðar snemma (detect early), og draga úr skaða (reduce harm); ABA kemur við sögu á öllum þremur stigum", "ABA er eingángu notað á þriðja stigi (reduce harm)", "ABA hefur engin tengsl við lýðheilsuvísindi", "Þrjú stig forvarna eru eingángu líkamleg heilsa, ekki hegðun"], "ans": 0, "exp": "Þrjú stig forvarna: 1) Fyrsta stig: koma í veg fyrir að vandamál komi upp, 2) Annað stig: greina og meðhöndla snemma, 3) Þriðja stig: draga úr langtímaskaða. ABA tengist öllum þremur: forvarnar-þjálfun (1. stig), snemma inngrip í einhverfumeðferð (2. stig), og meðferð viðvarandi erfiðleika (3. stig).", "src": "K"}, {"q": "Hvað eru menningarleg skilmálar (cultural contingencies) og hvernig hafa þær áhrif á einstaklinga?", "opts": ["Menningarleg skilmálar eru eingángu formlegir lagar og reglur", "Heildarkerfi af skipulagðar styrkingum og refsingum sem hópar og stofnanir setja upp til að stjórna hegðun meðlima — þær hafa víðtæk áhrif á einstaklinga", "Menningarleg skilmálar hafa engin áhrif á hegðun einstaklinga", "Einstaklingar geta alltaf valið hvort þeir fara eftir menningarlegum skilmálum"], "ans": 1, "exp": "Menningarleg skilmálar (cultural contingencies): heildarkerfi af skipulagðar styrkingum og refsingum sem hópar, stofnanir og menning setja upp til að stjórna hegðun meðlima. Dæmi: skólakerfi, réttarkerfi, félagslegar viðmiðunarreglur. Þær hafa víðtæk áhrif á einstaklinga vegna þess að við erum öll hluti af þessum kerfum frá fæðingu.", "src": "K"}, {"q": "Hvað eru helstu áskoranir við alhæfingu (generalization) í ABA meðferð?", "opts": ["Alhæfing gerist alltaf sjálfkrafa eftir þjálfun", "Alhæfing er eingángu vandamál hjá börnum með einhverfu", "Hegðun lærð í þjálfunarlokum alhæfist ekki sjálfkrafa — við þurfum að forrita alhæfingu með mörgum þjálfurum, aðstæðum og ályktunarlegum vísbendingum", "Alhæfing þarfnast ikke sértækrar forritunnar"], "ans": 2, "exp": "Helstu áskoranir við alhæfingu í ABA: hegðun lærð í þjálfunarlokum alhæfist ekki sjálfkrafa yfir í öðrum aðstæðum, með öðrum þjálfurum, eða á öðrum tíma. Við þurfum að forrita alhæfingu beint: nota marga þjálfurar, marga staðsetningar, marga áreitisform, og gefa stuðning í náttúrulegum aðstæðum (in vivo) til að tryggja alhæfingu.", "src": "K"}, {"q": "Hvað er ABA meðferð í einhverfu (EIBI / early intensive behavioral intervention) og hvað sýna rannsóknirnar?", "opts": ["EIBI notar eingángu refsingu til að minnka erfið hegðun", "EIBI hefur verið sýnt að vera áhrifaríkt eingángu á stuttum tíma", "EIBI er eingángu tæknilegt nám og sýnir engar vísbendingar af áhrifum á þroska", "Umfangsmikil ABA meðferð sem hefst snemma — 20-40 klst/viku — og sýnir umtalsverðar framfarir í þroskun, máli og sjálfstæðni hjá börnum með einhverfu"], "ans": 3, "exp": "EIBI (early intensive behavioral intervention): umfangsmikil ABA meðferð (20-40 klst/viku) sem hefst snemma (yngri en 5 ára) í einhverfumeðferð. Lovaas (1987) og síðar rannsóknir sýna umtalsverðar framfarir í IQ, máltjáningu, leik og sjálfstæðni. Þetta er eitt best-supported íhlutanna í einhverfumeðferð samkvæmt gagnasöfnum.", "src": "K"}, {"q": "Hvað er hlutlæg virknigreining (descriptive functional assessment) og hvernig er hún frábrugðin tilraunavirknigreiningu (experimental FA)?", "opts": ["Hlutlæg: fylgist með og skráir hegðun í náttúrulegum aðstæðum til að bera kennsl á mynsturn; tilraunafræðileg: meðhöndlar umhverfisbreytur tilrauna til að staðfesta virkni", "Hlutlæg greining er alltaf nákvæmari en tilraunafræðileg", "Tilraunafræðileg greining er eingángu möguleg í rannsóknarstofunni", "Báðar eru nákvæmlega eins nákvæmar"], "ans": 0, "exp": "Hlutlæg virknigreining (descriptive FA): fylgist með og skráir hegðun í náttúrulegum aðstæðum — bera kennsl á mynstur í tengslum við forvirkni og afleiðingar. Gefur frábægar hugmyndir en getur ekki sýnt orsakatengsl. Tilraunafræðileg virknigreining (experimental FA / Iwata et al. 1982): meðhöndlar umhverfisbreytur til að staðfesta virkni — getur sýnt orsakatengsl en er tímafrekar.", "src": "K"}, {"q": "Hvað er PBIS (positive behavioral interventions and supports) og hvernig tengist það ABA?", "opts": ["PBIS er lyfjameðferð á skólastigi", "Kerfislæg nálgun sem notar ABA-meginreglur á skólastigi til að kenna félagslega hegðun og draga úr erfiðlegri hegðun — þrjú stig: allir, áhættu, einstaklingar", "PBIS notar eingángu refsingu til að draga úr erfiðlegri hegðun", "PBIS er eingángu fyrir börn með sérþarfir"], "ans": 1, "exp": "PBIS (positive behavioral interventions and supports): kerfislæg nálgun sem notar ABA-meginreglur á skólastigi. Þrjú stig: 1) Tier 1: allir nemendur — kenna og styrkja jákvæða hegðun, 2) Tier 2: áhættu-nemendur — styðjandi meðferð, 3) Tier 3: einstaklingar með þarfir — einstaklingsbundin ABA meðferð. PBIS er nú vísað til í margri skólalagssetningu í Bandaríkjunum.", "src": "K"}, {"q": "Hvað er OBM (organizational behavior management) og hvernig beitir hún hegðunarfræðilegum meginreglum á vinnustaðinn?", "opts": ["OBM er form mannauðsstjórnunar sem notar klínískar aðferðir", "OBM er eingángu notað í framleiðslufyrirtækjum", "Beiting ABA-meginreglna á vinnustaðinn til að bæta framleiðni, öryggi og starfsánægju — notar mats, styrking, endurgjöf og skipulagsbreytingar", "OBM notar eingángu refsingu og eftirlit til að bæta framleiðni"], "ans": 2, "exp": "OBM (organizational behavior management): beiting ABA-meginreglna á vinnustaðinn. Aðferðir: 1) mat á vinnulegu umhverfi og styrkingarskilmálum, 2) endurgjöf (feedback) um frammistöðu, 3) styrkingarskilmálar til að auka æskilega vinnuhegðun, 4) skipulagsbreytingar til að mynda viðeigandi aðstæður. Sýnt að auka framleiðni, öryggi og starfsánægju.", "src": "K"}, {"q": "Hvað er þrjú stig valsins (three levels of selection) og hvernig skýra þær menningarlegar breytingar?", "opts": ["Menningarlegar breytingar verða eingángu vegna náttúruvalsins", "Þrjú stig valsins útskýra eingángu einstaklishegðun, ekki hóphegðun", "Menningarlegar breytingar verða eingángu þegar leiðtogar taka ákvarðanir", "Náttúruval, virkni skilyrðing og menningarval — menningarlegar breytingar verða þegar hegðun hópa er valin eða vístuð af afleiðingum þeirra á hópinn"], "ans": 3, "exp": "Menningarlegar breytingar (cultural change) skýrist af þriðja stigi valsins — menningarval: hegðunarmynstur hópa eru valin vegna afleiðinga þeirra á hópinn. Þetta á sér stað í gegnum: miðlun með málhegðun og líkingarnámi, kerfislægar styrkingarskilmálar sem hópar setja upp (lög, siðareglur), og kynslóð-yfir-kynslóð yfirfærslu á venjum. Þetta er hluti Skinners þrjú þróunarleg stig.", "src": "K"}]}, {"id": "profspurningar", "title": "Prófspurningar kennara", "subtitle": "Sýnishorn af prófi", "questions": [{"q": "Í tilraun með skyldræna skilyrðingu er bjalla (CS) pöruð við mat (US). Hvert er óskilyrtt viðbragð (UR)?", "opts": ["Munnvatn sem myndast sjálfkrafa við mat", "Munnvatn sem myndast við bjölluna", "Bjallan sem hringir", "Hegðun sem er lærð í gegnum pörunina"], "ans": 0, "exp": "Óskilyrtt viðbragð (UR) er það viðbragð sem kemur sjálfkrafa og ósjálfrátt við óskilyrtta áreitinu (US). Hér er matið US og munnvatnið sem myndast sjálfkrafa við matinn er UR. Skilyrt viðbragð (CR) er munnvatn við bjölluna sem þróast eftir pörun.", "src": "P"}, {"q": "Hvað er CS í skyldrænum skilyrðingum?", "opts": ["Áreiti sem framkallar sterk óskilyrð viðbrögð", "Hlutlægt áreiti sem upphaflega hefur lítil eða engin áhrif á viðbragðið en öðlast getu til að framkalla viðbragð eftir pörun við US", "Áreiti sem er gefið eftir viðbragðið", "Hlutlægt áreiti sem hefur alltaf framkallað viðbragðið"], "ans": 1, "exp": "CS (conditioned stimulus / skilyrt áreiti) er hlutlægt áreiti sem upphaflega hefur lítil eða engin áhrif á viðbragðið en öðlast getu til að framkalla skilyrt viðbragð (CR) eftir endurtekna pöruna við US. Bjalla í Pavlovs tilraun er klassískt dæmi.", "src": "P"}, {"q": "Hvað gerist þegar CS er framkvæmd margsinnis án þess að US fylgi?", "opts": ["Skyldræn alhæfing — CR breifist á fleiri áreiti", "Sjálfvirk endurkoma — CR eykst tímabundið", "Skyldræn slokknun — CR minnkar og hverur", "Hömlun — CR er inhibited af nýjum CS"], "ans": 2, "exp": "Þegar CS er framkvæmd endurtekið án US á sér stað skyldræn slokknun (respondent extinction): CR minnkar smám saman og hverur. Þetta þýðir ekki að CS-US tengslum hafi verið þurrkað út — sjálfvirk endurkoma (spontaneous recovery) getur komið fram eftir hvíld.", "src": "P"}, {"q": "Hvað er sjálfvirk endurkoma (spontaneous recovery)?", "opts": ["CR eykst í fullum styrk þegar US er gefinn aftur", "CR hverfur alveg og kemur aldrei aftur", "CR kemur fram við nýt áreiti sem líkist upprunalega CS", "CR kemur aftur fram í veikara formi eftir hvíldartíma eftir slokknun"], "ans": 3, "exp": "Sjálfvirk endurkoma: CR kemur aftur fram í veikara formi eftir hvíldartíma eftir slokknun — þótt CS-US hafi ekki verið pöruð á ný á hvíldartímanum. Þetta sýnir að slokknun felur í sér nýtt nám (inhibition) en þurrkar ekki út upprunalegu CS-CR tengslin.", "src": "P"}, {"q": "Hvað þýðir CS-US skilmáli (contingency) í skyldrænum skilyrðingum samkvæmt Rescorla (1968)?", "opts": ["Tölfræðileg tengsl milli CS og US — hvort CS spáir fyrir um komu US betur en tilviljun", "Fjöldi skipta sem CS og US eru pöruð", "Styrkur US miðað við þyngd CR", "Hversu lengi CS er til staðar áður en US kemur"], "ans": 0, "exp": "Rescorla (1968) sýndi að skilyrðing byggist á skilmála (contingency) — tölfræðilegum samhengi: CS skyldir spá fyrir um US betur en tilviljun til þess að skilyrðing þróist. Pörun ein og sér (contiguity) er ekki nóg — CS þarf að vera forspárgildi um US.", "src": "P"}, {"q": "Hvað er hömlun (blocking) í skyldrænum skilyrðingum?", "opts": ["Þegar CS er of veikur til að framkalla CR", "Þegar CS1 hefur verið skilyrtur, hindrar hann CS2 frá að öðlast skilyrðingargildi þótt CS2 sé pörað við US", "Þegar CS og US koma of sjaldan saman", "Þegar CR er sterkari en UR"], "ans": 1, "exp": "Hömlun (blocking / Kamin 1969): þegar CS1 hefur þegar verið skilyrtur, hindrar hann CS2 frá að öðlast skilyrðingargildi jafnvel þótt CS2 sé pörað við sama US. CS1 spáir nú þegar fyrir um US — CS2 bætir engu nýju við. Þetta sýnir að skilyrðing ræðst af spágildi, ekki pöruna eingángu.", "src": "P"}, {"q": "Hvað er annars stigs skyldræn skilyrðing?", "opts": ["Þegar US er gefinn tvisvar sinnum á hvert pörunartilvik", "Þegar CR er pöruð við nýtt áreiti", "Þegar CS1 (þegar skilyrtur) verður US fyrir nýtt áreiti CS2 — CS2 öðlast skilyrðingargildi án þess að vera pörað við upprunalega US", "Þegar skilyrðing þarf tvær pöranir til að þróast"], "ans": 2, "exp": "Annars stigs skyldræn skilyrðing: CS1 (sem þegar hefur verið skilyrtur við US) verður US í pöruna við nýtt áreiti CS2. CS2 öðlast þar af leiðandi skilyrðingargildi án þess að vera nokkru sinni pörað við upprunalega US. Þetta útskýrir hvernig skilyrðing dreifist í flókið umhverfi.", "src": "P"}, {"q": "Hvaðan kemur bragðviðbjóður (conditioned taste aversion) og hvers vegna er hann áhugaverður?", "opts": ["Lífvera þjánaðist við mat og forðast matarstig", "Lífvera fær óþægilega upplifun strax eftir að borða mat", "Lífvera forðast alla nýja mat vegna kynæðisfræðilegrar varkárni", "Lífvera forðast bragð sem tengdist veikindi — þróast jafnvel þótt tímar líðu milli CS og US, sýnir líffræðilegar forhlutanir"], "ans": 3, "exp": "Bragðviðbjóður (conditioned taste aversion / CTA): Garcia og Koelling sýndu að lífvera getur lært að forðast bragð sem tengdist veikindi jafnvel þótt klukkustundir líðu milli CS (bragð) og US (veikindi). Þetta brýtur grunnreglur hefðbundinnar skilyrðingar (þarfnast venjulega sekúndna) og sýnir líffræðilegar forhlutanir á námi.", "src": "P"}, {"q": "Hvað er greinistyrking (differential reinforcement) og hvernig tengist hún mótun?", "opts": ["Þegar ein hegðun er styrkt en önnur ekki — mótun notar greinistyrk til að þróa nýja hegðun smám saman", "Þegar allar hegðanir eru styrkt jafnt án greinar", "Þegar styrkir er gefinn eingángu þegar hegðun er fullkomin", "Þegar refsing er notuð til að draga úr hegðun samhliða styrkingu annarrar"], "ans": 0, "exp": "Greinistyrking (differential reinforcement): ein hegðun eða form hegðunar er styrkt á meðan önnur er ekki. Mótun (shaping) notar kerfisbundna greinistyrk til að þróa nýja hegðun smám saman: við styrkjum fyrst nálganir að markmiðshegðun, síðan krefumst við meira nákvæmni. Breytileiki í hegðun er nauðsynlegur.", "src": "P"}, {"q": "Hvað er slokknunartoppur (extinction burst)?", "opts": ["Minnkun á hegðun þegar styrkir er tekinn burtu", "Aukning á tíðni, krafti eða breytileika hegðunar þegar styrkir er tekinn burtu", "Endurkoма hegðunar löngu eftir slokknun", "Aukning á öðrum hegðunum þegar markhegðun er slökkt"], "ans": 1, "exp": "Slokknunartoppur (extinction burst): þegar styrkir er tekinn burtu frá áður styrktri hegðun, eykst hegðunin tímabundið — tíðni, kraftur og breytileiki aukast. Þetta er dæmigert fyrsta viðbragð við slokknun áður en hegðun fer að minnka. Foreldrar og kennarar þurfa að þekkja þetta til að standa við slokknunarmeðferð.", "src": "P"}, {"q": "Hvað er hlutfallslegar styrkingaráhrif (PRE)?", "opts": ["Hegðun styrkt við hvert tilvik sýnir meira viðnám en hlutfallslega styrkt", "CRF og hlutfallsleg styrkt leiða til sama viðnáms", "Hegðun styrkt hlutfallslega (intermittent) sýnir meira viðnám gegn slokknun en hegðun styrkt við hvert tilvik (CRF)", "PRE á eingángu við um FI styrkingarhátta"], "ans": 2, "exp": "Partial reinforcement effect (PRE): hegðun sem hefur verið styrkt hlutfallslega (intermittent reinforcement — ekki við hvert tilvik) sýnir meira viðnám gegn slokknun en hegðun styrkt við hvert tilvik (CRF). Þetta er eitt mikilvægasta fyrirbærið í hegðunarfræði og útskýrir hvers vegna fölt hegðunarmynstur eru svo viðvarandi.", "src": "P"}, {"q": "Hvað eru fjórir grundvallarskilmálar í virkri skilyrðingu?", "opts": ["Mótun, slokknun, keðjun og greinistyrking", "CRF, FR, VR og FI", "Áreitastýring, alhæfing, aðgreining og samgildi", "Jákvæð styrking, neikvæð styrking, jákvæð refsing og neikvæð refsing"], "ans": 3, "exp": "Fjórir grundvallarskilmálar í virkri skilyrðingu: 1) jákvæð styrking — styrkir bætist við, hegðun eykst, 2) neikvæð styrking — fráreiti hverfur, hegðun eykst, 3) jákvæð refsing — fráreiti bætist við, hegðun minnkar, 4) neikvæð refsing — styrkir hverfur, hegðun minnkar. 'Jákvæð' = bætt við; 'neikvæð' = tekið burtu.", "src": "P"}, {"q": "Hvað er mótun (shaping) og hvernig er hún notuð til að kenna nýja hegðun?", "opts": ["Kerfisbundin notkun greinistyrkingar til að þróa nýja hegðun smám saman með því að styrkja nálganir að markmiðshegðun", "Beint kennsla á nýja hegðun með því að gefa styrk þegar hún kemur fram", "Notkun refsingarinnar til að leiðbeina hegðun í rétta átt", "Líkingarnám þar sem lífvera fylgist með líkani og líkir á eftir"], "ans": 0, "exp": "Mótun (shaping): kerfisbundin notkun greinistyrkingar þar sem við styrkjum nálganir að markmiðshegðun smám saman. Við byrjum að styrkja það sem lífveran getur þegar gert og þróum þar frá. Krefst þess að við höfum nákvæmlega skilgreint markmiðshegðunina og fylgist vel með hegðun til að velja hvenær við gerum kröfur stærri.", "src": "P"}, {"q": "Hvað er fastur hlutfallsháttur (FR) og hvaða mynstur hegðunar þróast?", "opts": ["Styrkur fæst eftir breytilegan fjölda hegðana — þróar jafna hegðun", "Styrkur fæst eftir föstan fjölda hegðana — þróar þétta hegðun með stuttum hlé eftir styrk", "Styrkur fæst við fyrstu hegðun eftir fast tímabil — þróar scallop-mynstur", "Styrkur fæst við hverja hegðun — þróar hægu, óstöðugleg hegðun"], "ans": 1, "exp": "Fastur hlutfallsháttur (FR): styrkur fæst eftir föstan, fyrirfram ákveðinn fjölda hegðana. Þróar þétta, hraða hegðun með stuttum post-reinforcement pause (PRP) eftir hvern styrk. FR 50 þýðir 50 hegðanir á styrk. PRP eykst með stærð FR-gildisins.", "src": "P"}, {"q": "Hvað er breytilegur hlutfallsháttur (VR) og hvers vegna þróar hann hæstu tíðni?", "opts": ["Styrkur fæst eftir föstan fjölda hegðana — þróar þétta hegðun", "Styrkur fæst við fyrstu hegðun eftir breytilegt tímabil — þróar jafna hegðun", "Styrkur fæst eftir breytilegan fjölda hegðana með meðaltali — þróar hæstu tíðni vegna þess að hvert viðbragð getur verið styrkt", "Styrkur fæst við hvert annað viðbragð — þróar langsamlega hegðun"], "ans": 2, "exp": "Breytilegur hlutfallsháttur (VR): styrkur fæst eftir breytilegan fjölda hegðana með meðaltali (t.d. VR 20). Þróar hæstu tíðni vegna þess að hvert viðbragð gæti verið styrkt — lífvera veit aldrei hvenær styrk kemur. Engin PRP. Spilakassar eru klassískt dæmi.", "src": "P"}, {"q": "Hvað er fastur tímaháttur (FI) og hvaða mynstur kemur fram?", "opts": ["Styrkur fæst við hvern fjórða hegðun — þróar þétta hegðun", "Styrkur fæst eftir breytilegt tímabil — þróar jafna hegðun", "Styrkur fæst við hverja hegðun — þróar hægu, stöðuglega hegðun", "Styrkur fæst við fyrstu hegðun eftir fast tímabil — þróar scallop-mynstur með PRP"], "ans": 3, "exp": "Fastur tímaháttur (FI): styrkur fæst við fyrstu hegðun eftir fast, fyrirfram ákveðið tímabil (t.d. FI 1 min). Þróar scallop-mynstur (FI scallop): lítil eða engin hegðun rétt eftir styrk (PRP), smám saman aukist hegðun, hraðar mest rétt fyrir tímamark.", "src": "P"}, {"q": "Hvað er breytilegur tímaháttur (VI) og hvers vegna er hann notaður í rannsóknum?", "opts": ["Styrkur fæst við fyrstu hegðun eftir breytilegt tímabil með meðaltali — þróar jafna, stöðuga hegðun — gagnlegur til að skapa stöðugt grunnstig", "Styrkur fæst eftir föstan fjölda hegðana — þróar þétta hegðun", "Styrkur fæst við hvert þriðja viðbragð — þróar hlutfallsleg mynstur", "Styrkur fæst við hverja hegðun — mun hraðara en aðrir hættir"], "ans": 0, "exp": "Breytilegur tímaháttur (VI): styrkur fæst við fyrstu hegðun eftir breytilegt tímabil með meðaltali (t.d. VI 2 min). Þróar jafna, stöðuga hegðun án merkjanlegra hlé. Gagnlegur í rannsóknum vegna þess að hann skapar stöðugt grunnstig sem auðveldar mat á áhrifum annarra breytna.", "src": "P"}, {"q": "Hvað er hlé eftir styrk (post-reinforcement pause / PRP) og við hvaða styrkingarhátt er það mest áberandi?", "opts": ["Hlé áður en styrkurinn fæst — fyrirbæri á öllum styrkingarháttum", "Hlé á hegðun tafarlaust eftir styrk — mest áberandi á föstum hætti (FR og FI), eykst með stærð FR-gildisins", "Hlé á hegðun eftir slokknunartíma — ekki tengt styrkingarháttum", "Hlé sem kemur fram eingángu á CRF styrkingarháttum"], "ans": 1, "exp": "Post-reinforcement pause (PRP): hlé á hegðun sem kemur tafarlaust eftir styrk á föstum hætti. Mest áberandi á FR hætti — stærra FR gildi gefur lengra hlé (t.d. PRP á FR 100 er lengra en á FR 10). Kemur einnig fram á FI. Á breytilegum hætti (VR, VI) er PRP minna eða ekki til staðar.", "src": "P"}, {"q": "Hvað er hlutfallsþreyting (ratio strain)?", "opts": ["Þreyta af of mikilli hegðun á stuttum tíma — minnkar við hvíld", "Þegar lífvera fær of marga styrki of hratt og þar af leiðandi missir áhuga", "Brotnaður mynstur hegðunar þegar hlutfallsháttur er aukinn of hratt — langan hlé, óregluleg hegðun, loks slokknun", "Þegar hlutfallsháttur er of lítill og lífvera þarf meira í hvert skipti"], "ans": 2, "exp": "Hlutfallsþreyting (ratio strain): þegar hlutfallsháttur er aukinn of hratt (t.d. farið beint úr FR 5 í FR 100) brotnar hegðunarmynstrið: fyrst langt PRP, svo óregluleg hegðun, og loks slokknun. Þetta sýnir að við þurfum að þjálfa upp í hærra hlutfall smám saman (gradual progression).", "src": "P"}, {"q": "Hvað er áreitastýring (stimulus control) og hvernig þróast hún?", "opts": ["Þegar áreiti framkallar hegðun beint án náms", "Þegar hegðun er stjórnað af meðfæddri tilhneigingu", "Þegar lífvera forðast ákveðin áreiti vegna refsingarsögu", "Þegar tíðni eða form hegðunar breytist kerfisbundið við tilteknar áreitaíhlutir vegna sögu greinistyrkingar"], "ans": 3, "exp": "Áreitastýring þróast þegar hegðun hefur verið styrkt í návist tiltekinna áreita (SD) en ekki í návist annarra (S∆). Yfir tíma verður hegðunin líklegari í návist SD og ólíklegri í návist S∆. Styrk greinistyrkingar ræður hversu skýr áreitastýringin verður.", "src": "P"}, {"q": "Hvað er greinireiti (SD) og hvernig er hann frábrugðinn S-delta (S∆)?", "opts": ["SD: áreiti í návist þess sem hegðun er styrkt; S∆: áreiti í návist þess sem hegðun er ekki styrkt eða er minna styrkt", "SD: áreiti sem framkallar hegðun beint; S∆: áreiti sem hindrar hegðun", "SD og S∆ eru það sama — bæðar stjórna hegðun á sama hátt", "S∆ framleiðir hegðun; SD hindrar hana"], "ans": 0, "exp": "Greinireiti (SD): áreiti í návist þess sem hegðun hefur verið styrkt — hækkar líkur á hegðun. S-delta (S∆): áreiti í návist þess sem hegðun hefur verið slökkt eða ekki styrkt — lækkar líkur á hegðun. Þau tvö saman mynda grein og eru grundvöllur aðgreiningar.", "src": "P"}, {"q": "Hvað er alhæfingargradienti (generalization gradient) og hvað sýna þeir?", "opts": ["Myndrit sem sýnir hversu sterk skilyrðing þróast yfir þjálfunartíma", "Myndrit sem sýnir styrk hegðunar við áreiti sem eru í mismiklum fjarlægð frá upprunalega SD — sýnir að alhæfing minnkar með fjarlægð", "Myndrit sem sýnir hvernig hegðun þróast yfir tíma á styrkingarháttum", "Myndrit sem sýnir hversu mörg áreiti geta stjórnað sömu hegðun"], "ans": 1, "exp": "Alhæfingargradienti: myndrit sem sýnir styrk hegðunar (eða tíðni) við áreitasett sem eru í mismikilli fjarlægð frá upprunalega SD á áreitissvið (e.g. bylgjulengd, stærð, lit). Hæsta punkturinn er venjulega við upprunalega SD og hegðun minnkar smám saman við áreiti sem fjarlægjast SD. Guttman og Kalish (1956) sýndu þetta klassískt.", "src": "P"}, {"q": "Hvað er hámarksstigsbreyting (peak shift)?", "opts": ["Hápunktur hegðunar eykst eftir þjálfun", "Hápunktur hegðunar færist í átt að S∆ eftir slokknun", "Hápunktur alhæfingargradientsins færist í gagnstæða átt frá S∆ eftir aðgreiningar-þjálfun — vegna hlutfægs áreitastýringar", "Hápunktur hegðunar helst stöðugur óháð þjálfun"], "ans": 2, "exp": "Hámarksstigsbreyting (peak shift): eftir aðgreiníngar-þjálfun (SD vs. S∆) færist hápunktur alhæfingargradientsins í gagnstæða átt frá S∆ — þ.e. lífvera bregst sterkast við áreiti sem er enn fjær S∆ en upprunalega SD var. Þetta sýnir hlutfæga áreitastýringu (relative control) frekar en algilda (absolute).", "src": "P"}, {"q": "Hvað er villulaus aðgreining (errorless discrimination training)?", "opts": ["Aðferð þar sem refsing er notuð til að stoppa S∆-viðbrögð", "Aðferð þar sem við styrkjum bæði SD og S∆-viðbrögð til að kenna aðgreiningu", "Aðferð þar sem aðgreining þróast án þjálfunar", "Aðferð þar sem S∆ er kynnt smám saman þegar SD-hegðun er sterk — lífvera bregst nánast aldrei við S∆; forðar tilfinningalegum aukaáhrifum"], "ans": 3, "exp": "Villulaus aðgreining (Terrace 1963): S∆ er kynnt smám saman (með dofnun / fading) á meðan SD-hegðun er þegar sterk. Lífvera bregst nánast aldrei við S∆ — þ.e. gervislega engar villur. Kosti: engin tilfinningaleg aukaáhrif tengd S∆ (pirringur, streita) og aðgreining verður nákvæmari. Hagnýtt í ABA og fræðslu.", "src": "P"}, {"q": "Hvað er áreitissamgildi (stimulus equivalence) og hvaða þrjú lykilsambönd þarf að sýna?", "opts": ["Þegar mismunandi áreiti mynda jafngilda flokka; þrjú sambönd: endurspeglun (A=A), samhverfa (ef A=B þá B=A) og þvergengi (ef A=B og B=C þá A=C)", "Þegar tveir áreiti framkalla sömu hegðun vegna pörunar", "Þegar áreiti eru meðvitað túlkuð sem jafngildir", "Þegar áreitastýring flyst sjálfkrafa á öll áreiti"], "ans": 0, "exp": "Áreitissamgildi (stimulus equivalence): mismunandi áreiti mynda jafngilda flokka án þess að öll tengsl hafi verið þjálfuð beint. Þrjú lykilsambönd: 1) endurspeglun (reflexivity) — A=A, 2) samhverfa (symmetry) — ef A=B þá B=A, 3) þvergengi (transitivity) — ef A=B og B=C þá A=C. Þetta er grundvöllur merkingarfræðilegrar hegðunar og tungumáls.", "src": "P"}, {"q": "Hvað er samræmingarreglan (matching law)?", "opts": ["Lífvera velur alltaf þann valmöguleika sem gefur mest á hvert viðbragð", "B1/(B1+B2) = R1/(R1+R2) — hlutfall hegðunar jafngildir hlutfalli styrkinga; Herrnstein (1961)", "Samræmingarreglan lýsir aðeins hegðun á FR styrkingarháttum", "Hlutfall styrkinga jafngildir fjölda valmöguleika"], "ans": 1, "exp": "Samræmingarreglan (matching law) — Herrnstein (1961): B1/(B1+B2) = R1/(R1+R2). Hlutfall viðbragða á einum valmöguleika (B1) af heildinni jafngildir hlutfalli styrkinga þar (R1) af heildinni. Þetta þýðir að lífvera skiptir hegðun sinni hlutfallslega í samræmi við styrkingartíðni.", "src": "P"}, {"q": "Hvað er skilyrt styrkir (conditioned reinforcer) og hvers vegna er hann mikilvægur?", "opts": ["Styrkir sem er alltaf sterkari en upprunalegi styrkir", "Styrkir sem eingángu virkar með summution", "Hlutlægar áreiti sem hefur öðlast styrkingarmátt vegna pörunar við upprunalegan styrk — gerir kleift að styrkja hegðun í fjarlægum aðstæðum", "Áreiti sem er lært sem styrkir vegna þess að önnur lífvera styrkti það"], "ans": 2, "exp": "Skilyrt styrkir (conditioned reinforcer): hlutlægt áreiti sem hefur öðlast styrkingarmátt vegna pörunar við upprunalegar styrkar. Mikilvægur vegna þess að: 1) gerir kleift að styrkja hegðun tafarlaust þótt upprunaleger styrkir sé fjarri, 2) gerir langa hegðunarkeðjur mögulegar, 3) grunnur tóken-hagfræðikerfa.", "src": "P"}, {"q": "Hvað er sjálfsstjórnun (self-control) í hegðunarfræðilegum skilningi?", "opts": ["Val á hegðun sem líkist lögum og reglum", "Sjálfsstjórnun er eingángu mögulegt með meðvitund og vilja", "Sjálfsstjórnun er val á tafarlausum styrk yfir seinkuðum", "Val á stærri seinkaðri styrk yfir minni tafarlausum styrk — gagnstætt ráðist (impulsivity)"], "ans": 3, "exp": "Sjálfsstjórnun (self-control) í hegðunarfræðilegu skilningi: val á stærri/betri en seinkaðri styrk yfir minni/verri en tafarlausum styrk. Ráðist (impulsivity) er val á minni tafarlausum. Seinkun á afslætti (delay discounting) ræður hvort tveggja — hvernig virðisgildi styrks lækkar með seinkuninni.", "src": "P"}, {"q": "Hvað er mand og hvert er forinstig og afleiðing þess?", "opts": ["Mand: málhegðun stjórnað af þörf/hvataaðgerð; afleiðing er ákveðinn styrkir sem uppfyllir þörfina — 'gjef mér vatn'", "Mand: málhegðun stjórnað af hlutum í heiminum; afleiðing er félagsleg samþykkt", "Mand og tact er það sama — bæðar eru stjórnað af óskilyrtum áreitum", "Mand: málhegðun sem biður um ósértækar styrkjar"], "ans": 0, "exp": "Mand: málhegðun stjórnað af hvataaðgerð (þörf) og beinlínis styrkt af ákveðinni afleiðingu sem uppfyllir þörfina. Forinsting: hvataaðgerð (t.d. þorsti). Afleiðing: ákveðinn styrkir (t.d. vatn). Þetta aðskilur mand frá öðrum virknilegum flokkum: afleiðingin er ákveðin og uppfyllir þörfina sem framkallaði hegðunina.", "src": "P"}, {"q": "Hvað er tact og hvert er forinstig þess?", "opts": ["Tact: málhegðun stjórnað af þörf — biður um hlut sem er til staðar", "Tact: málhegðun framkölluð af óskilyrtum viðbragðsinstigunum (hlutum og atburðum í heiminum) og styrkt af ósértækum félagslegum styrkjum", "Tact og mand eru það sama — bæðar eru stjórnað af hlutum í heiminum", "Tact: málhegðun sem líkir öðrum talandi"], "ans": 1, "exp": "Tact: málhegðun framkölluð af óskilyrtum viðbragðsinstigunum — hlutum, atburðum, eiginleikum í heiminum. Forinsting: óskilyrt áreiti (t.d. sjá hund). Afleiðing: ósértækur félagslegur styrkir (hlýja, 'já', samþykki). Tact er grundvöllur merkingafræðilegrar tengingar orða við heiminn.", "src": "P"}, {"q": "Hvað er líkingarnám (observational learning) og hvernig þróast það?", "opts": ["Líkingarnám er eingángu mögulegt þegar lífveran fær beina styrk", "Líkingarnám krefst alltaf beinar þjálfunar frá þjálfara", "Lífvera tileinkar sér nýja hegðun eftir að horfa á líkan framkvæma hana — þróast þegar líkan fær styrk eða refsingu (vikariant reinforcement/punishment)", "Líkingarnám þróast eingángu hjá mönnum vegna tungumáls"], "ans": 2, "exp": "Líkingarnám (observational learning / modeling): lífvera tileinkar sér nýja hegðun eftir að horfa á líkan. Þróast þegar: 1) líkan er sett í gang hegðun (SD), 2) líkan fær styrk (vikariant reinforcement) eða refsingu (vikariant punishment) — áhorfandi lærir af þessum viðbrögðum. Bandura og Walters sýndu þetta með Bobo-dúkkatilraunum.", "src": "P"}, {"q": "Hvað er reglustýrð hegðun (rule-governed behavior) og hvernig er hún frábrugðin skilyrðingastýrðri?", "opts": ["Skilyrðingastýrð: stjórnað af reglum; reglustýrð: mótað af beinum reynslu", "Reglustýrð og skilyrðingastýrð hegðun eru það sama", "Reglustýrð hegðun þarfnast eingángu skilyrðinga án orðræðu", "Reglustýrð: stjórnað af mállegar lýsingum á skilmálum; þróast hraðar en skilyrðingastýrð en er oft ósveigjanlegri"], "ans": 3, "exp": "Reglustýrð hegðun: stjórnað af mállegar lýsingum á skilmálum (reglur, leiðbeiningar). Þróast hraðar en skilyrðingastýrð hegðun. En oft ósveigjanlegri — breytist ekki jafn fljótt þegar skilmálarnir breytast. Skilyrðingastýrð hegðun: mótað beint af reynslu af skilmálunum — seinna að þróast en viðkvæmara fyrir breytingum á skilmálum.", "src": "P"}]}];
